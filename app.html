    const stars = score ? Engine.getStars(score) : 0;
    return `${floorLabel}<div class="ch-row" style="animation-delay:${i * 0.06}s">
      <div class="ch-node ${status}">${isDone ? '\u2713' : isActive ? ch.num : ''}</div>
      <div class="ch-card ${isLocked ? 'is-locked' : ''} ${isActive ? 'is-active' : ''} ${isDone ? 'is-done' : ''}" onclick="App.selectChapter(${i})">
        <div class="ch-top-row">
          <span class="ch-tag ${status} ${ch.free && !isDone ? 'free' : ''}">${isDone ? '\u2705 Completed' : isActive ? (ch.free ? 'Free chapter' : 'Unlocked') : 'Classified'}</span>
          ${isDone ? `<div class="ch-stars">${[1, 2, 3].map(s => `<div class="ch-star">${starSVG(s <= stars)}</div>`).join('')}</div>` : ''}
        </div>
        ${isActive ? '<div class="ch-new-badge">New mission</div>' : ''}
        ${isDone ? '<div class="ch-new-badge" style="color:var(--green);border-color:rgba(52,211,153,0.25);background:rgba(52,211,153,0.06)">Replay</div>' : ''}
        ${isLocked ? '<div class="ch-lock-ico">\uD83D\uDD12</div>' : ''}
        <div class="ch-title">Ch ${ch.num}: ${ch.title}</div>
        <div class="ch-location">${isLocked ? '\uD83D\uDD12 Location classified' : ch.location}</div>
        <div class="ch-desc">${isLocked ? 'Complete prior missions to unlock.' : ch.desc}</div>
        ${isDone ? `<div class="ch-meta"><span class="score">Score: ${score}%</span><span class="xp">+${Engine.getXP(score)} XP</span></div>` : ''}
        ${isActive ? `<div class="ch-meta"><span style="color:var(--cyan)">Mission: ${ch.mission}</span></div>` : ''}
      </div>
    </div>`;
  }).join('');

  return renderHUD(t, `<div class="hud-stat"><div class="dot" style="background:var(--green)"></div>${completed}/${total}</div>`) +
    `<div class="top-bar"><div class="back-btn" onclick="App.navigate('home')">< Home</div><span class="top-title">${t.name}</span><span class="top-xp">${tp.xp} XP</span></div>
    <div class="rank-banner"><div class="rb-icon">${t.icon}</div><div class="rb-info"><div class="rb-rank">Rank: ${t.rankProgression[rankIdx]}</div><div class="rb-name">${t.name} — ${t.role}</div><div class="rb-desc">Work through immersive simulations. Each chapter trains a critical domain, then tests you with a live mission ticket.</div></div></div>
    <div class="summary-row"><div class="sum-card"><div class="sn" style="color:var(--green)">${completed}</div><div class="sl">Done</div></div><div class="sum-card"><div class="sn" style="color:var(--cyan)">${avgScore || '--'}%</div><div class="sl">Avg</div></div><div class="sum-card"><div class="sn" style="color:var(--amber)">${tp.xp}</div><div class="sl">XP</div></div><div class="sum-card"><div class="sn" style="color:var(--purple)">${total - completed}</div><div class="sl">Left</div></div></div>
    <div class="overall-bar"><div class="ob-row"><span>Progress</span><span>${pct}%</span></div><div class="ob-track"><div class="ob-fill" style="width:${pct}%"></div></div></div>
    <div class="ch-list"><div class="ch-spine"></div>${chapters}</div>
    ${renderMapExamButtons(state.track)}
    ${renderCertificateSection(state.track)}`;
}

function renderCertificateSection(trackId) {
  const t = TRACKS[trackId];
  const tp = getTrackProgress(trackId);
  const completed = Object.keys(tp.completed).length;
  const total = t.chapters.length;
  if (completed < total) return '';
  const avgScore = Math.round(Object.values(tp.scores).reduce((a,b) => a+b, 0) / Object.values(tp.scores).length);
  return `<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
    <div class="floor-label">Certification</div>
    <div style="background:linear-gradient(135deg,rgba(52,211,153,0.06),rgba(56,189,248,0.04));border:1px solid rgba(52,211,153,0.25);border-radius:12px;padding:24px;text-align:center">
      <div style="font-size:40px;margin-bottom:10px">\uD83C\uDF93</div>
      <div style="font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px">Course complete!</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">You've completed all ${total} chapters of ${t.name}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green);margin-bottom:16px">Average score: ${avgScore}% \u00B7 Total XP: ${tp.xp}</div>
      <button onclick="App.downloadCertificate()" style="padding:14px 32px;background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.3);color:var(--green);font-family:'Orbitron',sans-serif;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;letter-spacing:1px">Download certificate</button>
    </div>
  </div>`;
}

function renderMapExamButtons(trackId) {
  const examMap = {
    aplus: [{id:'aplus_core1',label:'Core 1 Practice Exam',code:'220-1201'},{id:'aplus_core2',label:'Core 2 Practice Exam',code:'220-1202'}],
    netplus: [{id:'netplus',label:'Network+ Practice Exam',code:'N10-009'}],
    secplus: [{id:'secplus',label:'Security+ Practice Exam',code:'SY0-701'}],
    aiess: [{id:'aiess',label:'AI Essentials Practice Quiz',code:'CompCert'}]
  };
  const exams = examMap[trackId] || [];
  if (!exams.length) return '';
  return `<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
    <div class="floor-label">Practice exams</div>
    ${exams.map(e => {
      const exam = EXAM_DATA[e.id];
      return `<div class="ch-card is-active" style="margin-bottom:8px;cursor:pointer;border-color:rgba(167,139,250,0.3);background:linear-gradient(135deg,var(--panel),rgba(167,139,250,0.03))" onclick="App.startExam('${e.id}')">
        <div class="ch-top-row"><span class="ch-tag" style="color:var(--purple);background:var(--glow-purple);border:1px solid rgba(167,139,250,0.2)">${e.code}</span><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)">${exam.questions.length} questions \u00B7 ${exam.timeMinutes} min</span></div>
        <div class="ch-title">\uD83D\uDCDD ${e.label}</div>
        <div class="ch-desc" style="margin-top:4px">Timed practice exam covering all domains. Pass mark: ${exam.passingScore}%.</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderPaywall() {
  const t = TRACKS[state.track];
  const ch = t.chapters[state.chIdx];
  return renderHUD(t) +
    `<div class="top-bar"><div class="back-btn" onclick="App.navigate('map')">< Map</div><span class="top-title">${t.name}</span><span class="top-xp">Locked</span></div>
    <div class="paywall-card">
      <h3>\uD83D\uDD12 Chapter ${ch.num} is locked</h3>
      <p><strong>${ch.title}</strong> requires a paid subscription. Upgrade to unlock all chapters, simulations, and earn your certificate of completion.</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px">
        <button class="btn-upgrade" onclick="App.upgrade('operator')">Operator — $29/mo (1 course)</button>
        <button class="btn-upgrade" onclick="App.upgrade('commander')">Commander — $49/mo (all courses)</button>
      </div>
      <p style="margin-top:12px;font-size:11px;color:var(--dim)">Free tier includes Chapter 1 of every course.</p>
    </div>`;
}

// MAIN RENDER
function render() {
  const app = $('app');
  const t = state.track ? TRACKS[state.track] : null;
  let html = '';
  switch (state.view) {
    case 'home': html = renderHome(); break;
    case 'map': html = renderMap(); break;
    case 'paywall': html = renderPaywall(); break;
    case 'guide':
      html = renderHUD(t, `<div class="hud-stat"><div class="dot" style="background:var(--green)"></div>Ch ${t.chapters[state.chIdx].num}</div>`) +
        `<div class="top-bar"><div class="back-btn" onclick="App.navigate('map')">< Map</div><span class="top-title">Ch ${t.chapters[state.chIdx].num}: ${t.chapters[state.chIdx].title}</span><span class="top-xp">${getTrackProgress(state.track).xp} XP</span></div>` +
        Engine.renderStudyGuide(t, state.chIdx, state.guide);
      break;
    case 'briefing':
      html = renderHUD(t) +
        `<div class="top-bar"><div class="back-btn" onclick="App.navigate('guide')">< Study guide</div><span class="top-title">Mission briefing</span><span class="top-xp">${t.chapters[state.chIdx].ticket}</span></div>` +
        Engine.renderBriefing(t, state.chIdx);
      break;
    case 'sim':
      html = renderHUD(t, `<div class="hud-stat"><div class="dot" style="background:var(--green)"></div>${state.sim.checklist.filter(c => c.found).length}/${state.sim.checklist.length}</div>`) +
        `<div class="top-bar"><div class="back-btn" onclick="if(confirm('Leave simulation? Progress will be lost.'))App.navigate('map')">< Abort</div><span class="top-title">${t.chapters[state.chIdx].ticket}</span><span class="top-xp">${state.sim.attempts} actions</span></div>` +
        Engine.renderSim(t, state.chIdx, state.sim);
      break;
    case 'debrief':
      html = renderHUD(t) +
        Engine.renderDebrief(t, state.chIdx, state.sim);
      break;
    case 'completed':
      html = renderHUD(t) + renderCompleted();
      break;
    case 'examSelect':
      html = renderExamSelect(); break;
    case 'exam':
      html = renderExamView(); break;
    case 'examResults':
      html = renderExamResults(); break;
    case 'contact':
      html = renderContact(); break;
    case 'auth':
      html = renderAuth(); break;
  }
  app.innerHTML = `<div class="app">${html}</div>`;
  if (state.view === 'sim') { const inp = $('cmdIn'); if (inp) inp.focus(); scrollLog(); }
}

function renderCompleted() {
  const t = TRACKS[state.track];
  const ch = t.chapters[state.chIdx];
  const tp = getTrackProgress(state.track);
  const score = tp.scores[state.chIdx] || 0;
  const stars = Engine.getStars(score);
  const xp = Engine.getXP(score);
  const nextIdx = state.chIdx + 1;
  const hasNext = nextIdx < t.chapters.length;
  const nextCh = hasNext ? t.chapters[nextIdx] : null;
  const nextLocked = hasNext && !canAccess(state.track, nextIdx);
  const allDone = Object.keys(tp.completed).length >= t.chapters.length;

  return `<div style="text-align:center;padding:20px 0;animation:fadeUp .5s ease">
    <div style="font-size:48px;margin-bottom:12px;animation:popIn .6s ease">\u2705</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:6px">Chapter ${ch.num} complete</div>
    <div style="font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px">${ch.title}</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px">Ticket ${ch.ticket} resolved \u2022 Score: ${score}% \u2022 +${xp} XP</div>
    <div style="display:flex;justify-content:center;gap:6px;margin-bottom:24px">
      ${[1,2,3].map((s,i) => `<div style="width:28px;height:28px;animation:starBounce .5s ease ${0.3+i*0.3}s both"><svg viewBox="0 0 36 36"><path d="M18 2l4.9 10 11.1 1.6-8 7.8 1.9 11L18 27.4 8.1 32.4l1.9-11-8-7.8L13.1 12z" fill="${s<=stars?'var(--amber)':'var(--border)'}"/></svg></div>`).join('')}
    </div>
    ${allDone ? `
      <div style="background:linear-gradient(135deg,rgba(52,211,153,0.08),rgba(56,189,248,0.04));border:1px solid rgba(52,211,153,0.25);border-radius:12px;padding:20px;margin-bottom:16px">
        <div style="font-size:32px;margin-bottom:8px">\uD83C\uDF93</div>
        <div style="font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:var(--green);margin-bottom:4px">Course complete!</div>
        <div style="font-size:13px;color:var(--text2)">You've finished all ${t.chapters.length} chapters of ${t.name}. Your certificate is ready.</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-map" onclick="App.navigate('map')" style="flex:1;padding:12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:var(--panel2);border:1px solid var(--border);color:var(--text2)">View chapter map</button>
        <button onclick="App.downloadCertificate()" style="flex:1;padding:12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.3);color:var(--green)">Download certificate</button>
      </div>
    ` : hasNext ? `
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;text-align:left">
        <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:8px">Next mission</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:3px">Ch ${nextCh.num}: ${nextCh.title}</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.5">${nextLocked ? '\uD83D\uDD12 Upgrade required to access this chapter.' : nextCh.desc}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-map" onclick="App.navigate('map')" style="flex:1;padding:12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:var(--panel2);border:1px solid var(--border);color:var(--text2)">Chapter map</button>
        ${nextLocked ? 
          `<button onclick="App.upgrade('operator')" style="flex:1;padding:12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);color:var(--amber)">Upgrade to continue</button>` :
          `<button onclick="App.goNextChapter()" style="flex:1;padding:12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.3);color:var(--cyan)">Start next chapter \u2192</button>`
        }
      </div>
    ` : `
      <button class="btn-map" onclick="App.navigate('map')" style="padding:12px 32px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:var(--panel2);border:1px solid var(--border);color:var(--text2)">Back to chapter map</button>
    `}
  </div>`;
}

function renderExamSelect() {
  const exams = [
    {id:'aplus_core1',icon:'\uD83D\uDC77',color:'cyan'},
    {id:'aplus_core2',icon:'\uD83D\uDDA5\uFE0F',color:'cyan'},
    {id:'netplus',icon:'\uD83D\uDCE1',color:'green'},
    {id:'secplus',icon:'\uD83D\uDEE1\uFE0F',color:'red'}
  ];
  return renderHUD(null) +
    `<div class="top-bar"><div class="back-btn" onclick="App.navigate('home')">< Home</div><span class="top-title">Practice exams</span><span class="top-xp">\uD83D\uDCDD</span></div>
    <div class="exam-select"><div class="es-header"><h2>Practice exams</h2><p>Timed, multiple-choice exams covering each certification. Original questions — not actual exam content.</p></div>
    <div class="es-grid">${exams.map(e => {
      const exam = EXAM_DATA[e.id];
      return `<div class="es-card" onclick="App.startExam('${e.id}')"><div class="es-ico" style="background:var(--glow-${e.color});border-color:rgba(56,189,248,0.2)">${e.icon}</div><div class="es-info"><h3>${exam.title}</h3><div class="es-meta">${exam.code} · ${exam.questions.length} questions · ${exam.timeMinutes} min · Pass: ${exam.passingScore}%</div><div class="es-desc">Covers all exam domains with original scenario-based questions.</div></div></div>`;
    }).join('')}</div></div>`;
}

function renderExamView() {
  if (!state.exam) return '';
  const exam = EXAM_DATA[state.exam.examId];
  const qIdx = state.exam.qIdx;
  const total = exam.questions.length;
  const m = Math.floor(state.exam.timer/60), s = state.exam.timer%60;
  const answered = state.exam.selected[qIdx] !== undefined;
  return renderHUD(null) +
    `<div class="exam"><div class="exam-hdr"><span class="eh-title">${exam.title}</span><span class="eh-timer${state.exam.timer<300?' low':''}" id="examTimer">${m}:${String(s).padStart(2,'0')}</span></div>
    <div class="exam-prog">${Array.from({length:total},(_,i)=>{let c='exam-pip';if(i===qIdx)c+=' current';else if(state.exam.selected[i]!==undefined){c+=' answered';if(state.exam.selected[i]!==exam.questions[i].ans)c+=' wrong-pip';}return`<div class="${c}"></div>`;}).join('')}</div>
    ${Engine.renderExamQuestion(exam, qIdx, state.exam.selected)}
    <div class="eq-nav"><button class="btn-map" onclick="App.examPrev()" ${qIdx===0?'disabled style="opacity:.3"':''}>< Previous</button>${answered?`<button class="btn-go" onclick="App.examNext()">${qIdx<total-1?'Next question >':'Finish exam'}</button>`:`<div style="flex:1"></div>`}</div>
    </div>`;
}

function renderExamResults() {
  if (!state.exam) return '';
  const exam = EXAM_DATA[state.exam.examId];
  return renderHUD(null) +
    `<div class="top-bar"><div class="back-btn" onclick="App.navigate('examSelect')">< All exams</div><span class="top-title">Results</span><span class="top-xp">\uD83D\uDCDD</span></div>` +
    Engine.renderExamResults(exam, state.exam.selected);
}

function renderContact() {
  return renderHUD(null) +
    `<div class="top-bar"><div class="back-btn" onclick="App.navigate('home')">< Home</div><span class="top-title">Contact us</span><span class="top-xp">\u2709</span></div>
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:12px">
      <h2 style="font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px">Get in touch</h2>
      <p style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6">Have questions, need help, or want to share feedback? Reach out and we'll get back to you within 24 hours.</p>
      <div id="appContactForm" style="display:flex;flex-direction:column;gap:10px">
        <input type="text" id="appName" placeholder="Your name" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text1);outline:none">
        <input type="email" id="appEmail" placeholder="Email address" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text1);outline:none">
        <select id="appTopic" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text2);outline:none"><option value="">Select a topic...</option><option>Technical support</option><option>Billing & subscriptions</option><option>Feedback & suggestions</option><option>Other</option></select>
        <textarea id="appMsg" placeholder="How can we help?" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text1);outline:none;min-height:120px;resize:vertical"></textarea>
        <button onclick="App.sendContact()" style="width:100%;padding:13px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.3);color:#38bdf8;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer">Send message</button>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--panel);border:1px solid var(--border);border-radius:8px"><span style="font-size:18px;width:32px;text-align:center">\u2709</span><div><div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim)">Email</div><div style="font-size:13px;font-weight:500">certopsacademy@gmail.com</div></div></div>
    </div>`;
}

initApp();
})();
</script>
</body></html>
