<script>// Practice Exam Data — Original questions covering exam objectives
// These are NOT actual CompTIA exam questions — they are original study questions
window.EXAM_DATA = {
  aplus_core1: {
    title: "A+ Core 1 Practice Exam",
    code: "220-1201",
    timeMinutes: 45,
    passingScore: 70,
    questions: [
      {d:"Hardware",q:"A server technician needs to install additional RAM. The motherboard manual specifies DDR4 ECC RDIMMs. Which statement is true about this memory type?",opts:["It uses the same notch position as DDR3","It includes an extra chip for single-bit error correction","It cannot be used in dual-channel configuration","It requires a special power connector"],ans:1,exp:"ECC (Error-Correcting Code) memory has an additional memory chip that detects and corrects single-bit errors. DDR4 has a different notch position than DDR3 — they are physically incompatible."},
      {d:"Hardware",q:"A technician is building a RAID array for a file server that needs to survive two simultaneous drive failures. Which RAID level should be used?",opts:["RAID 0","RAID 1","RAID 5","RAID 6"],ans:3,exp:"RAID 6 uses double parity and can survive two simultaneous drive failures. RAID 5 only survives one failure. RAID 0 has no redundancy, and RAID 1 is mirroring (survives one failure per mirror pair)."},
      {d:"Hardware",q:"A user reports their desktop PC randomly shuts down after 20-30 minutes of use. The technician notices excessive dust buildup inside the case. What is the most likely cause?",opts:["Failing power supply capacitors","CPU thermal throttling and shutdown","Faulty RAM causing kernel panic","Hard drive overheating"],ans:1,exp:"Dust buildup blocks airflow, causing the CPU to overheat. When the CPU exceeds its thermal threshold, the system shuts down to prevent damage. Cleaning the dust and reapplying thermal paste should fix this."},
      {d:"Hardware",q:"Which connector type uses a latch mechanism that requires pressing a release button before removal?",opts:["VGA","HDMI","DisplayPort","DVI"],ans:2,exp:"DisplayPort connectors have a physical latch that locks the cable in place. You must press the release button to remove it. Pulling without pressing the button can damage the port. VGA uses thumbscrews, DVI has thumbscrews, HDMI has no latch."},
      {d:"Hardware",q:"A technician is replacing a laptop's storage drive. The original is a 2.5-inch SATA SSD, but the laptop also has an empty M.2 slot. What should the technician verify before purchasing an M.2 drive?",opts:["Whether the M.2 slot supports SATA, NVMe, or both","The color of the M.2 slot","Whether the laptop has USB 3.0 ports","The size of the laptop's battery"],ans:0,exp:"M.2 slots can support SATA (B-key), NVMe (M-key), or both (B+M key). Installing the wrong type won't work — an NVMe drive in a SATA-only M.2 slot won't be detected. Check the laptop's documentation."},
      {d:"Networking",q:"A technician needs to run a network cable through a ceiling space that is used as an air return plenum. What cable type is required?",opts:["Standard Cat6 with PVC jacket","Cat6a with plenum-rated (CMP) jacket","Any shielded twisted pair cable","Fiber optic only"],ans:1,exp:"Plenum spaces require plenum-rated cables (CMP rating) that produce less toxic smoke when burned. Standard PVC-jacketed cables release dangerous fumes and violate fire code when installed in plenum spaces."},
      {d:"Networking",q:"A workstation can ping 8.8.8.8 but cannot access google.com in a web browser. What is the most likely issue?",opts:["The NIC driver is corrupted","DNS resolution is not working","The default gateway is misconfigured","The web browser needs to be reinstalled"],ans:1,exp:"If you can ping by IP address but not reach websites by name, DNS is the issue. The network path works (proven by the ping), but hostname-to-IP translation is failing. Check DNS server settings or try nslookup."},
      {d:"Networking",q:"What is the maximum cable length for a Cat6a Ethernet run including patch cables on both ends?",opts:["55 meters","90 meters","100 meters","150 meters"],ans:2,exp:"The maximum total channel length for Cat6a is 100 meters (328 feet), which includes the horizontal run (90m max) plus patch cables on both ends (5m each). This is the same limit for Cat5e, Cat6, and Cat6a."},
      {d:"Hardware",q:"A laser printer is producing output with a gray background on every page. Which component is most likely causing this?",opts:["Toner cartridge is overfilled","The fuser assembly temperature is too low","The imaging drum is not being fully discharged during the cleaning phase","The transfer roller is applying too much pressure"],ans:2,exp:"A gray background means toner is sticking where it shouldn't. This happens when the drum isn't fully discharged (cleaned) between pages, leaving residual charge that attracts toner. The charge roller or cleaning blade may be worn."},
      {d:"Hardware",q:"A technician receives a server with two power supply units. One PSU shows an amber LED while the other shows green. The server is running normally. What does this indicate?",opts:["Both PSUs have failed","One PSU has failed but the redundant PSU is keeping the server running","The server is in low-power mode","The amber PSU is in standby mode and will activate if the primary fails"],ans:1,exp:"In a redundant PSU configuration, amber typically indicates a fault. The server stays running because the second (green) PSU handles the full load. The faulty PSU should be hot-swapped as soon as a replacement is available."},
      {d:"Networking",q:"A company needs to connect two buildings on a campus that are 800 meters apart with a 10 Gbps link. Which cabling solution is appropriate?",opts:["Cat6a copper","Multi-mode fiber","Single-mode fiber","Cat7 copper"],ans:2,exp:"At 800 meters, copper is out (100m max). Multi-mode fiber maxes at ~550m for 10G. Single-mode fiber easily handles 10G at distances up to 10+ km, making it the correct choice for this campus backbone."},
      {d:"Hardware",q:"During a motherboard replacement, a technician notices the new board has an LGA 1700 socket but the existing CPU is LGA 1200. What should the technician do?",opts:["Install the CPU — it will work in compatibility mode","Use a socket adapter to convert 1200 to 1700","The CPU and motherboard are incompatible — a new CPU is needed","Bend the pins to fit the new socket"],ans:2,exp:"CPU sockets are physically incompatible across different generations. LGA 1200 (10th/11th gen Intel) cannot fit in LGA 1700 (12th/13th gen). The pin count and physical layout are different. A compatible CPU must be purchased."},
      {d:"Virtualization",q:"A technician is setting up a hypervisor on a server. Which technology must be enabled in BIOS for hardware-assisted virtualization?",opts:["Secure Boot","Intel VT-x / AMD-V","TPM 2.0","UEFI Network Stack"],ans:1,exp:"Hardware-assisted virtualization requires Intel VT-x or AMD-V (AMD Virtualization) to be enabled in BIOS/UEFI. Without this, hypervisors like ESXi, Hyper-V, and KVM cannot run VMs efficiently or may not work at all."},
      {d:"Troubleshooting",q:"A newly installed SSD is not visible in Windows but appears in BIOS. What is the most likely reason?",opts:["The SSD is defective","The SATA cable is loose","The drive needs to be initialized and formatted in Disk Management","Windows doesn't support SSDs"],ans:2,exp:"A new drive that appears in BIOS but not in Windows simply hasn't been initialized yet. Open Disk Management (diskmgmt.msc), initialize the disk (GPT for modern systems), create a partition, and format it."},
      {d:"Troubleshooting",q:"A technician replaces a motherboard in a desktop PC. After reassembly, pressing the power button does nothing — no fans, no lights, no beeps. What should be checked first?",opts:["Replace the CPU","Check that the front panel power button connector is properly seated on the motherboard header","Replace the power supply","Install a new graphics card"],ans:1,exp:"Absolutely no response to the power button most commonly means the front panel header connector is not properly connected to the new motherboard. The pinout may differ from the old board. Check the motherboard manual for the correct pin layout."},
      {d:"Hardware",q:"A server uses hot-swappable drive bays. A technician needs to replace a failed drive. What must be verified BEFORE pulling the drive?",opts:["That the server is powered off","That the correct bay is identified — pulling the wrong drive from a degraded array causes data loss","That all users are logged off","That the BIOS is updated to the latest version"],ans:1,exp:"With hot-swap bays, you don't need to power off. The critical step is verifying you're pulling the CORRECT drive. In a degraded RAID array, pulling the wrong (healthy) drive causes total array failure and data loss."},
      {d:"Networking",q:"An office has 20 VoIP phones that need both network connectivity and power. The network switch supports PoE. What is the benefit of using PoE for these phones?",opts:["PoE provides faster data transfer speeds","PoE eliminates the need for separate power adapters for each phone","PoE encrypts the voice traffic automatically","PoE increases the maximum cable distance beyond 100 meters"],ans:1,exp:"Power over Ethernet (PoE) delivers electrical power along with data over the same Ethernet cable. This eliminates the need for separate power supplies for each VoIP phone, simplifying installation and reducing cable clutter."},
      {d:"Hardware",q:"A user's laptop display shows a very faint image that is only visible when a flashlight is held up to the screen. What is the most likely cause?",opts:["The LCD panel has cracked","The GPU has failed","The display backlight or its driver has failed","The video cable is disconnected"],ans:2,exp:"A faint but visible image means the LCD panel itself is working — it's generating the image. The backlight (or its driver circuit) has failed, so the panel isn't illuminated. On older laptops with CCFL backlights, this could be the inverter."},
      {d:"Troubleshooting",q:"After a power outage, a desktop PC displays 'No boot device found.' The BIOS shows the hard drive is detected. What should the technician try first?",opts:["Replace the hard drive immediately","Check the boot order in BIOS — it may have reset to defaults","Reinstall the operating system","Replace the motherboard battery"],ans:1,exp:"Power outages can cause BIOS settings to reset, especially if the CMOS battery is weak. Check that the boot order lists the correct drive first. If BIOS detects the drive but won't boot from it, the boot order is the most common cause."},
      {d:"Virtualization",q:"What is the primary advantage of using a Type 1 (bare-metal) hypervisor over a Type 2 (hosted) hypervisor in a production server environment?",opts:["Type 1 is free while Type 2 costs money","Type 1 runs directly on hardware without a host OS, providing better performance","Type 1 supports more operating systems as guests","Type 1 is easier to install and configure"],ans:1,exp:"Type 1 hypervisors (ESXi, Hyper-V Server, Xen) run directly on hardware with no host OS overhead. Type 2 (VirtualBox, VMware Workstation) runs on top of a host OS, adding overhead. For production servers, Type 1's direct hardware access provides superior performance."}
    ]
  },
  aplus_core2: {
    title: "A+ Core 2 Practice Exam",
    code: "220-1202",
    timeMinutes: 45,
    passingScore: 70,
    questions: [
      {d:"Operating Systems",q:"A Windows 10 workstation fails to boot and displays a blue screen with 'CRITICAL_PROCESS_DIED.' The technician boots into the Recovery Environment. What should be attempted first?",opts:["Reinstall Windows from scratch","Run Startup Repair from Advanced Options","Replace the hard drive","Reset the BIOS to defaults"],ans:1,exp:"Startup Repair should be the first attempt from WinRE — it automatically fixes common boot issues. If that fails, try sfc /scannow and DISM from the Command Prompt in recovery. A full reinstall is a last resort."},
      {d:"Operating Systems",q:"A Linux administrator needs to change the owner of /var/www to the 'webadmin' user and 'www-data' group. Which command is correct?",opts:["chmod webadmin:www-data /var/www","chown webadmin:www-data /var/www","usermod -G www-data /var/www","ls -la webadmin:www-data /var/www"],ans:1,exp:"chown (change owner) sets the user and group ownership of a file or directory. The syntax is chown user:group path. chmod changes permissions (rwx), not ownership. usermod modifies user accounts, not file ownership."},
      {d:"Security",q:"A company requires that all laptops have their entire hard drives encrypted. Which Windows feature provides full-disk encryption using the TPM chip?",opts:["EFS (Encrypting File System)","Windows Defender","BitLocker","NTFS permissions"],ans:2,exp:"BitLocker provides full-disk encryption and uses the TPM to store the encryption key securely. EFS only encrypts individual files/folders (not the full disk). Windows Defender is antivirus, and NTFS permissions control access but don't encrypt."},
      {d:"Security",q:"A user calls the help desk saying they received a pop-up claiming their computer is infected and they need to call a phone number for support. What type of attack is this?",opts:["Ransomware","Tech support scam / scareware","Phishing email","Rootkit infection"],ans:1,exp:"This is a classic tech support scam using scareware. The pop-up creates urgency by claiming infection, then directs users to call a number where scammers try to gain remote access or sell fake services. The pop-up itself is not a real infection alert."},
      {d:"Operating Systems",q:"A technician needs to repair corrupted Windows system files. The correct order of commands to run is:",opts:["sfc /scannow first, then DISM if sfc fails","DISM /Online /Cleanup-Image /RestoreHealth first, then sfc /scannow","chkdsk first, then sfc /scannow","format C: and then sfc /scannow"],ans:1,exp:"Run DISM first because it repairs the component store (the source files that sfc uses for repairs). If the component store is corrupted, sfc can't fix anything because its repair source is broken. DISM first, then sfc."},
      {d:"Software Troubleshooting",q:"An application worked yesterday but crashes today with 'missing MSVCP140.dll' error. What is the most likely fix?",opts:["Reinstall Windows","Install or repair the Visual C++ Redistributable package","Replace the hard drive","Disable Windows Defender"],ans:1,exp:"MSVCP140.dll is part of the Visual C++ 2015-2022 Redistributable. If this DLL is missing or corrupted, reinstalling the redistributable package from Microsoft restores it. Many applications depend on these runtime libraries."},
      {d:"Operational Procedures",q:"Before performing a major change to a production system, what is the MOST important element to prepare?",opts:["A budget estimate for the change","A rollback/backout plan","An email notification to all users","Updated vendor contact information"],ans:1,exp:"A rollback plan is essential for any production change. If the change fails or causes issues, you need a documented, tested way to undo it and return to the previous working state. Without one, a failed change becomes a prolonged outage."},
      {d:"Security",q:"A company policy states that users must provide a password AND a fingerprint scan to log into their workstations. This is an example of:",opts:["Single sign-on (SSO)","Two-factor authentication (2FA)","Role-based access control","Single-factor authentication with two steps"],ans:1,exp:"This is 2FA because it combines two DIFFERENT factor types: something you know (password) and something you are (biometric fingerprint). Two passwords would NOT be 2FA because they're both 'something you know.'"},
      {d:"Operating Systems",q:"A macOS user needs to securely erase their laptop before returning it to their company. Which built-in macOS feature should be used?",opts:["Time Machine restore","Empty the Trash securely","Erase All Content and Settings / Disk Utility Erase","Delete the user account from System Preferences"],ans:2,exp:"On Apple Silicon Macs, use 'Erase All Content and Settings' from System Preferences. On older Macs, boot to Recovery and use Disk Utility to erase the drive. Simply deleting files or the user account doesn't securely wipe data."},
      {d:"Software Troubleshooting",q:"A Windows PC is running very slowly. Task Manager shows 'Disk' column at 100% constantly, but CPU and memory usage are normal. What is the most effective upgrade?",opts:["Add more RAM","Replace the HDD with an SSD","Install a faster CPU","Add a dedicated graphics card"],ans:1,exp:"Constant 100% disk usage on an HDD is the #1 cause of perceived slowness on modern PCs. The mechanical drive can't keep up with Windows' I/O demands. Replacing it with an SSD is the single most impactful upgrade for perceived performance."},
      {d:"Security",q:"The CompTIA-recommended malware removal procedure requires disabling System Restore BEFORE running antivirus remediation. Why?",opts:["System Restore interferes with the antivirus scan","Malware can hide in restore points and reinfect the system after cleaning","System Restore consumes too much disk space for the scan","System Restore encrypts files that the antivirus needs to scan"],ans:1,exp:"Malware can embed copies of itself in System Restore snapshots. If you clean the active system but leave infected restore points, the malware can return if the user rolls back. Disable restore, clean, then re-enable and create a fresh point."},
      {d:"Operational Procedures",q:"Which backup strategy requires the LEAST amount of storage space for daily backups but takes the LONGEST to restore?",opts:["Full backup daily","Differential backup daily","Incremental backup daily","Mirror backup daily"],ans:2,exp:"Incremental backups only store changes since the LAST backup (full or incremental), using minimal storage. But restoration requires the last full backup PLUS every incremental since — the most tapes/files to process. Differential stores changes since the last full, using more space but simpler restoration."},
      {d:"Operating Systems",q:"A Windows workstation's local Group Policy needs to be edited to enforce a minimum password length of 12 characters. Which tool is used?",opts:["regedit","secpol.msc / Local Security Policy","msconfig","Device Manager"],ans:1,exp:"Local Security Policy (secpol.msc) or Group Policy Editor (gpedit.msc) manages password policies, account lockout settings, audit policies, and user rights. Navigate to Account Policies → Password Policy → Minimum Password Length."},
      {d:"Software Troubleshooting",q:"A user reports that their browser homepage keeps changing to an unfamiliar search engine, and they see extra toolbars they didn't install. This is most likely:",opts:["A browser update that changed defaults","A PUP (Potentially Unwanted Program) or browser hijacker","A DNS configuration change","Normal browser behavior after a Windows update"],ans:1,exp:"Unexpected homepage changes, extra toolbars, and redirected searches are classic symptoms of a browser hijacker / PUP. These are often bundled with free software downloads. Remove via Programs and Features, then reset browser settings."},
      {d:"Operational Procedures",q:"A technician is writing a PowerShell script to check the status of a service on a remote computer. Which cmdlet is most appropriate?",opts:["Get-Service -ComputerName","Invoke-WebRequest","Start-Process -Remote","ping -ComputerName"],ans:0,exp:"Get-Service -ComputerName remotely queries the status of Windows services on another machine. Invoke-Command is also valid for remote execution, but Get-Service has a built-in -ComputerName parameter specifically for this purpose."},
      {d:"Security",q:"A company's wireless network uses WPA2-Enterprise. What additional infrastructure component is required compared to WPA2-Personal?",opts:["A stronger wireless antenna","A RADIUS authentication server","A dedicated VLAN for each user","A VPN concentrator"],ans:1,exp:"WPA2-Enterprise uses 802.1X authentication, which requires a RADIUS server to validate individual user credentials. WPA2-Personal uses a shared pre-shared key (PSK) for all users — no RADIUS needed. Enterprise provides per-user authentication and accountability."},
      {d:"Operating Systems",q:"A technician needs to create a bootable USB drive to install Windows 11. Which file system should the USB drive be formatted as for UEFI boot?",opts:["NTFS","FAT32","exFAT","ext4"],ans:1,exp:"UEFI firmware requires the boot partition to be FAT32. While the Windows installer files are large, the Media Creation Tool handles splitting them. For manual creation, FAT32 is required for UEFI boot — NTFS only works with legacy BIOS/CSM boot."},
      {d:"Software Troubleshooting",q:"A workstation connects to the network but the user's mapped network drives show a red X and are inaccessible. Other users on the same network are fine. What should be checked first?",opts:["Replace the network cable","Verify the user's domain credentials haven't expired","Reinstall the network adapter driver","Reformat the workstation"],ans:1,exp:"Mapped drives with red X on only one workstation (while others work) points to an authentication issue. The user's domain password may have expired or changed, or their cached credentials are stale. Have the user log out and back in, or check AD account status."},
      {d:"Operational Procedures",q:"An organization follows the 3-2-1 backup rule. What does this require?",opts:["3 full backups, 2 incremental, 1 offsite","3 copies of data, 2 different media types, 1 copy offsite","Backup every 3 hours, verify every 2 hours, test every 1 day","3 backup servers, 2 tape libraries, 1 cloud account"],ans:1,exp:"The 3-2-1 rule: maintain 3 copies of your data (original + 2 backups), store on 2 different media types (e.g., disk + tape, or disk + cloud), and keep 1 copy offsite (for disaster recovery). This protects against hardware failure, corruption, and site-level disasters."},
      {d:"Security",q:"A user's workstation has been confirmed to have an active malware infection. According to the CompTIA troubleshooting methodology, what should be done IMMEDIATELY after confirming the infection?",opts:["Run a full antivirus scan","Quarantine the system by disconnecting from the network","Disable System Restore","Educate the end user about safe browsing"],ans:1,exp:"After confirming infection, immediately quarantine (disconnect from network) to prevent the malware from spreading or communicating with command-and-control servers. Then disable System Restore, then remediate. Network isolation is the critical first containment step."}
    ]
  },
  netplus: {
    title: "Network+ Practice Exam",
    code: "N10-009",
    timeMinutes: 45,
    passingScore: 70,
    questions: [
      {d:"Networking Concepts",q:"At which OSI layer does a switch primarily operate when forwarding frames based on MAC addresses?",opts:["Layer 1 — Physical","Layer 2 — Data Link","Layer 3 — Network","Layer 4 — Transport"],ans:1,exp:"Switches operate at Layer 2 (Data Link) and use MAC address tables to forward frames to the correct port. Layer 3 switches can also route using IP addresses, but basic switching is a Layer 2 function."},
      {d:"Networking Concepts",q:"An administrator needs to calculate the number of usable host addresses in a /26 subnet. How many are available?",opts:["26","62","64","254"],ans:1,exp:"/26 means 26 network bits, leaving 6 host bits. 2^6 = 64 total addresses. Subtract 2 (network address and broadcast address) = 62 usable host addresses."},
      {d:"Networking Concepts",q:"A host receives an IP address of 169.254.10.50. What does this indicate?",opts:["The host is configured with a valid static IP","The DHCP server assigned this address from its pool","The host failed to reach a DHCP server and self-assigned via APIPA","This is a valid public IP address"],ans:2,exp:"169.254.x.x is the APIPA (Automatic Private IP Addressing) range. When a DHCP client can't reach a DHCP server, it auto-assigns a link-local address from this range. This allows basic local communication but no routed network access."},
      {d:"Network Implementation",q:"A technician is troubleshooting a fiber optic link with intermittent errors. An optical power meter shows the signal is 6 dB below the expected level. What should be checked first?",opts:["The switch firmware version","Fiber connector end-faces for contamination","The VLAN configuration","The STP topology"],ans:1,exp:"A 6 dB signal loss is significant and suggests a physical issue. Dirty or contaminated fiber connectors are the #1 cause of signal loss in fiber links. Clean the end-faces with a fiber cleaning pen and re-test before checking anything else."},
      {d:"Network Implementation",q:"Which wireless standard introduced MU-MIMO and operates exclusively on the 5 GHz band?",opts:["802.11n (Wi-Fi 4)","802.11ac (Wi-Fi 5)","802.11ax (Wi-Fi 6)","802.11g"],ans:1,exp:"802.11ac (Wi-Fi 5) introduced MU-MIMO (Multi-User MIMO) and operates only on 5 GHz, reaching theoretical speeds of 6.9 Gbps. 802.11ax (Wi-Fi 6) later extended MU-MIMO and added 6 GHz support with Wi-Fi 6E."},
      {d:"Networking Concepts",q:"During the DHCP lease process, the client sends a broadcast to discover available DHCP servers. What is the correct order of the four DHCP messages?",opts:["Offer, Discover, Request, Acknowledge","Discover, Offer, Request, Acknowledge","Request, Discover, Offer, Acknowledge","Discover, Request, Offer, Acknowledge"],ans:1,exp:"DORA: Discover (client broadcasts looking for servers), Offer (server responds with available IP), Request (client formally requests the offered IP), Acknowledge (server confirms the lease). All four messages use UDP on ports 67/68."},
      {d:"Network Security",q:"A network administrator discovers an unauthorized device on the network that is handing out incorrect DHCP leases to clients. What feature should be enabled on the switches to prevent this?",opts:["Port mirroring","DHCP snooping","Spanning Tree Protocol","Link aggregation"],ans:1,exp:"DHCP snooping allows the switch to filter DHCP messages. Only ports connected to legitimate DHCP servers are marked as 'trusted' — all other ports are 'untrusted' and have their DHCP server responses dropped, preventing rogue DHCP servers."},
      {d:"Network Security",q:"A company wants to allow remote employees to securely access internal resources, but only corporate-destined traffic should go through the VPN. Which VPN configuration achieves this?",opts:["Full tunnel VPN","Split tunnel VPN","Site-to-site VPN","Always-on VPN"],ans:1,exp:"Split tunnel routes only corporate-destined traffic through the VPN tunnel while allowing internet traffic to go directly out the user's local connection. Full tunnel routes ALL traffic through VPN. Split tunnel reduces VPN bandwidth usage but is less secure."},
      {d:"Network Troubleshooting",q:"A user can access internal resources by IP address but not by hostname. External websites work fine. What is the most likely issue?",opts:["The user's NIC is failing","The internal DNS server is down or misconfigured","The default gateway is incorrect","The user's IP address has expired"],ans:1,exp:"Internal hostnames resolved by internal DNS, external sites resolved by public DNS (or working forwarders). If internal hostname resolution fails but external works, the internal DNS server is the problem — it may be down, misconfigured, or the client isn't pointed to it."},
      {d:"Networking Concepts",q:"What is the purpose of ARP (Address Resolution Protocol)?",opts:["Assigns IP addresses to new devices on the network","Resolves domain names to IP addresses","Maps IP addresses to MAC addresses on the local network segment","Encrypts traffic between two hosts"],ans:2,exp:"ARP resolves a known IP address to an unknown MAC address on the local network. When a host needs to communicate with another host on the same subnet, it sends an ARP broadcast asking 'Who has this IP?' The target responds with its MAC address."},
      {d:"Network Implementation",q:"A network technician needs to connect two switches with a single logical link that combines four physical Ethernet cables for increased bandwidth and redundancy. Which technology should be used?",opts:["Spanning Tree Protocol","Link Aggregation (LACP/802.3ad)","Port mirroring","VLAN trunking"],ans:1,exp:"Link Aggregation (LACP / 802.3ad) combines multiple physical links into a single logical link, increasing total bandwidth and providing redundancy. If one cable fails, traffic redistributes across remaining links. STP prevents loops but doesn't combine bandwidth."},
      {d:"Network Operations",q:"A network monitoring system sends automated alerts when a device goes offline. Which protocol is used by network devices to send these unsolicited notifications to the management station?",opts:["SNMP traps","ICMP echo","Syslog","TFTP"],ans:0,exp:"SNMP traps are unsolicited notifications sent from network devices (agents) to the SNMP management station (NMS) when predefined events occur (like an interface going down). Unlike SNMP polling, traps are initiated by the device, enabling real-time alerting."},
      {d:"Network Security",q:"Which type of firewall inspects traffic at the application layer and can make decisions based on the content of the data, not just headers?",opts:["Packet filtering firewall","Stateful firewall","Next-generation firewall (NGFW)","Circuit-level gateway"],ans:2,exp:"NGFWs perform deep packet inspection (DPI) at the application layer, analyzing the actual content of traffic. They can identify and block specific applications (like blocking file-sharing apps while allowing web browsing) regardless of the port used."},
      {d:"Network Troubleshooting",q:"A network link between two switches keeps flapping (going up and down repeatedly). Which of the following is the LEAST likely cause?",opts:["A damaged or loose fiber patch cable","A duplex mismatch between the two switch ports","An incorrect VLAN assignment on the port","A failing SFP transceiver module"],ans:2,exp:"VLAN misassignment would cause traffic not to reach the right destinations but wouldn't cause the physical link to flap. Link flapping is a physical or Layer 1/2 issue: bad cables, failing transceivers, duplex mismatches, or auto-negotiation problems."},
      {d:"Networking Concepts",q:"A network uses the address space 10.0.0.0/8. How many total host addresses are available in this network?",opts:["254","65,534","16,777,214","4,294,967,296"],ans:2,exp:"/8 means 8 network bits and 24 host bits. 2^24 = 16,777,216 total addresses. Subtract 2 (network and broadcast) = 16,777,214 usable hosts. The 10.0.0.0/8 range is the largest private IP range available."},
      {d:"Network Operations",q:"After a router configuration change, users report they can no longer reach a specific remote subnet. The traceroute stops at the router. What should be checked on the router?",opts:["The router's DNS settings","The routing table for a missing or incorrect route to that subnet","The switch port VLAN assignment","The user's local firewall settings"],ans:1,exp:"If traceroute reaches the router but goes no further, the router doesn't know how to reach the destination subnet. Check the routing table for a missing static route or a failed dynamic routing adjacency to the next hop for that subnet."},
      {d:"Network Implementation",q:"What is the primary purpose of a VLAN trunk port?",opts:["To connect end-user devices to the network","To carry traffic from multiple VLANs over a single physical link between switches","To provide Power over Ethernet to connected devices","To mirror traffic for network monitoring"],ans:1,exp:"Trunk ports carry tagged traffic from multiple VLANs over a single physical link, typically between switches or between a switch and a router. Each frame is tagged with its VLAN ID (802.1Q) so the receiving switch knows which VLAN it belongs to."},
      {d:"Network Security",q:"A security administrator implements ACLs on a router. The rules are: 1) Permit HTTP from 10.0.1.0/24. 2) Permit HTTPS from 10.0.1.0/24. 3) Deny all. A user at 10.0.1.50 reports they cannot use SSH. Why?",opts:["SSH uses the same port as HTTPS","The implicit deny at the end blocks SSH since no permit rule exists for it","The user's IP is not in the 10.0.1.0/24 range","ACLs don't affect SSH traffic"],ans:1,exp:"ACLs are processed top-to-bottom, first match wins, with an implicit deny all at the end. SSH (port 22) doesn't match rule 1 (HTTP/80) or rule 2 (HTTPS/443), so it hits the deny all. To allow SSH, a specific permit rule must be added before the deny."},
      {d:"Network Troubleshooting",q:"A user's network connection works intermittently — sometimes fast, sometimes very slow with packet loss. A cable tester shows the cable passes continuity but a TDR test reveals an impedance mismatch at 47 meters. What does this indicate?",opts:["The cable is too long","There is a kink, crush, or splice in the cable at the 47-meter mark","The patch panel port is bad","The switch port needs a firmware update"],ans:1,exp:"TDR (Time Domain Reflectometer) sends a signal and measures reflections. An impedance mismatch at a specific distance indicates physical cable damage at that point — a kink, crush, splice, or manufacturing defect. The cable should be replaced."},
      {d:"Networking Concepts",q:"Which protocol synchronizes clocks across all network devices and is critical for correlating log timestamps during security incident investigation?",opts:["SNMP","NTP","SMTP","FTP"],ans:1,exp:"NTP (Network Time Protocol) synchronizes system clocks across the network. Accurate time synchronization is critical for log correlation during incident investigation — if device clocks are out of sync, piecing together an attack timeline becomes extremely difficult."}
    ]
  },
  secplus: {
    title: "Security+ Practice Exam",
    code: "SY0-701",
    timeMinutes: 45,
    passingScore: 70,
    questions: [
      {d:"General Security Concepts",q:"An organization's web server is taken offline by a massive flood of traffic from thousands of compromised devices. Which type of attack is this?",opts:["SQL injection","Man-in-the-middle","Distributed Denial of Service (DDoS)","Cross-site scripting (XSS)"],ans:2,exp:"A DDoS attack uses many compromised systems (a botnet) to flood a target with traffic, overwhelming its capacity and making it unavailable to legitimate users. The 'distributed' aspect means the traffic comes from many sources, making it harder to block."},
      {d:"General Security Concepts",q:"A developer stores user passwords as SHA-256 hashes with unique random salts. What security benefit does the salt provide?",opts:["It encrypts the password for transmission","It prevents two users with the same password from having the same hash","It makes the password longer and more complex","It allows the password to be recovered if forgotten"],ans:1,exp:"A salt is random data added to each password before hashing. Even if two users have the same password, their different salts produce different hashes. This defeats rainbow table attacks and pre-computed hash lookups."},
      {d:"Threats and Vulnerabilities",q:"An attacker sends a crafted email to the CFO that appears to come from the CEO, requesting an urgent wire transfer to a specific account. This is an example of:",opts:["Smishing","Vishing","Whaling / Business Email Compromise","Tailgating"],ans:2,exp:"Whaling targets high-value individuals (C-suite executives) with highly targeted, convincing attacks. Business Email Compromise (BEC) specifically involves impersonating a trusted party to authorize fraudulent financial transactions. This is one of the costliest attack types."},
      {d:"Security Architecture",q:"An organization implements a security model where no user or device is automatically trusted, regardless of whether they are inside or outside the corporate network. Every access request must be verified. This describes:",opts:["Defense in depth","Zero trust architecture","Network Access Control (NAC)","Demilitarized zone (DMZ)"],ans:1,exp:"Zero trust follows the principle of 'never trust, always verify.' Unlike traditional perimeter security (which trusts internal traffic), zero trust requires authentication and authorization for every access request, regardless of the user's network location."},
      {d:"Security Operations",q:"During an incident response investigation, a forensic engineer needs to capture evidence from a running server. According to the order of volatility, which should be captured FIRST?",opts:["Hard drive contents","System RAM and running processes","Server configuration files","Network connection logs from the SIEM"],ans:1,exp:"Order of volatility: CPU registers/cache → RAM → swap/temp files → disk → logs → physical configuration. RAM is the most volatile non-register evidence — it's lost when the system is powered off. Capture it first, then disk (which persists)."},
      {d:"General Security Concepts",q:"Which cryptographic concept ensures that a sender cannot deny having sent a message?",opts:["Confidentiality","Integrity","Non-repudiation","Availability"],ans:2,exp:"Non-repudiation prevents a party from denying their actions. Digital signatures provide non-repudiation — only the sender's private key could have created the signature, proving they sent it. This is legally important for contracts and financial transactions."},
      {d:"Threats and Vulnerabilities",q:"A penetration tester discovers that a web application allows them to enter ' OR 1=1-- into the login form and gain access without valid credentials. What type of vulnerability is this?",opts:["Cross-site scripting (XSS)","SQL injection","Buffer overflow","Directory traversal"],ans:1,exp:"SQL injection occurs when user input is directly included in SQL queries without sanitization. The payload ' OR 1=1-- modifies the query logic to always return true, bypassing authentication. The fix is parameterized queries / prepared statements."},
      {d:"Security Architecture",q:"A company places its public-facing web server in a network segment between two firewalls — one facing the internet and one facing the internal network. What is this network segment called?",opts:["VLAN","DMZ (Demilitarized Zone)","Honeynet","Extranet"],ans:1,exp:"A DMZ (also called a screened subnet) sits between the external and internal firewalls. It hosts public-facing services while preventing direct access to the internal network. If the web server is compromised, the attacker is still isolated from internal resources."},
      {d:"Security Operations",q:"A SIEM alert shows that a user account logged in from two different countries within a 10-minute window. This is an example of what type of detection?",opts:["Signature-based detection","Impossible travel time detection","Heuristic scanning","Sandboxing"],ans:1,exp:"Impossible travel detection flags when the same account authenticates from geographically distant locations in a timeframe that makes physical travel impossible. This indicates the account credentials have been compromised and are being used by an attacker in another location."},
      {d:"Security Program Management",q:"An organization decides to purchase cyber insurance to cover potential costs from a data breach. In risk management terms, this is an example of:",opts:["Risk acceptance","Risk avoidance","Risk mitigation","Risk transference"],ans:3,exp:"Risk transference shifts the financial impact of a risk to a third party — in this case, the insurance company. The risk still exists, but the financial burden is shared. Other examples: outsourcing security operations, using a cloud provider's shared responsibility model."},
      {d:"Threats and Vulnerabilities",q:"An attacker leaves USB drives labeled 'Employee Salary Data 2026' in the company parking lot, hoping employees will plug them into their work computers. This attack technique is called:",opts:["Phishing","Baiting","Pretexting","Shoulder surfing"],ans:1,exp:"Baiting exploits human curiosity by leaving malware-infected physical media (USB drives, CDs) in places targets will find them. The enticing label increases the chance someone will plug it in. The USB drive may contain malware that auto-executes or a malicious payload."},
      {d:"Security Architecture",q:"Which access control model assigns permissions based on a user's job function, and when they change roles, their previous access is revoked and new access is granted?",opts:["Discretionary Access Control (DAC)","Mandatory Access Control (MAC)","Role-Based Access Control (RBAC)","Rule-based access control"],ans:2,exp:"RBAC assigns permissions to roles (e.g., 'Accountant,' 'HR Manager'), and users are assigned to roles. When someone changes positions, they're removed from the old role and added to the new one. This simplifies access management and enforces least privilege."},
      {d:"Security Operations",q:"A security team discovers that an attacker maintained access to the network for 6 months before being detected. The attacker gradually exfiltrated data while avoiding detection. This type of threat is classified as:",opts:["Script kiddie attack","Denial of service","Advanced Persistent Threat (APT)","Insider threat"],ans:2,exp:"APTs are characterized by sophisticated, prolonged, stealthy attacks typically conducted by well-resourced threat actors (often nation-states). They maintain persistence, move laterally, and exfiltrate data over extended periods while actively evading detection."},
      {d:"General Security Concepts",q:"A web application uses HTTPS. What does this provide compared to HTTP?",opts:["Faster page loading times","Encryption of data in transit between browser and server","Authentication of the user's identity","Protection against SQL injection attacks"],ans:1,exp:"HTTPS adds TLS/SSL encryption to HTTP, protecting data in transit from eavesdropping and tampering. It encrypts the communication channel between the browser and web server. It does NOT protect against application-level attacks like SQL injection or XSS."},
      {d:"Security Program Management",q:"Which security framework uses the five functions: Identify, Protect, Detect, Respond, and Recover?",opts:["ISO 27001","CIS Controls","NIST Cybersecurity Framework (CSF)","COBIT"],ans:2,exp:"The NIST CSF organizes security activities into five core functions: Identify (asset management, risk assessment), Protect (access control, awareness), Detect (monitoring, detection processes), Respond (response planning, communications), Recover (recovery planning, improvements)."},
      {d:"Threats and Vulnerabilities",q:"A company's vulnerability scanner identifies that several servers are running an outdated version of OpenSSL with a known critical vulnerability. What is the appropriate remediation?",opts:["Disable OpenSSL on all servers","Patch or upgrade OpenSSL to a version that fixes the vulnerability","Add a firewall rule to block SSL traffic","Ignore it — the vulnerability may not be exploitable"],ans:1,exp:"Known vulnerabilities in critical libraries like OpenSSL should be patched immediately. Disabling SSL breaks all encrypted communication. Firewall rules don't fix the underlying vulnerability. Ignoring known critical vulnerabilities violates security best practices and compliance requirements."},
      {d:"Security Architecture",q:"An IDS (Intrusion Detection System) alerts on suspicious traffic but does NOT block it. What would need to be deployed instead to automatically block the malicious traffic?",opts:["A firewall","An IPS (Intrusion Prevention System)","A SIEM","A VPN concentrator"],ans:1,exp:"IDS is passive — it detects and alerts only. IPS is inline and active — it detects AND blocks/drops malicious traffic automatically. An IPS sits in the traffic path and can take immediate action, while an IDS typically monitors a copy of the traffic."},
      {d:"Security Operations",q:"During a forensic investigation, what is the purpose of creating a cryptographic hash of a disk image?",opts:["To encrypt the evidence so it can't be tampered with","To compress the image for storage","To verify the integrity of the evidence — proving it hasn't been modified","To authenticate the identity of the investigator"],ans:2,exp:"Hashing the forensic image (typically SHA-256) creates a fingerprint. If the hash of the image matches the hash of the original disk, it proves the evidence is an exact, unmodified copy. This is critical for chain of custody and court admissibility."},
      {d:"Security Program Management",q:"An organization's data classification policy defines levels of sensitivity. Which of the following is typically the HIGHEST classification level in a corporate environment?",opts:["Public","Internal","Confidential","Restricted / Top Secret"],ans:3,exp:"Common corporate classification: Public (no impact if disclosed) → Internal (low impact) → Confidential (moderate impact) → Restricted/Top Secret (severe impact if disclosed). Government equivalents: Unclassified → Confidential → Secret → Top Secret."},
      {d:"Threats and Vulnerabilities",q:"An attacker intercepts communication between a user and their bank's website by positioning themselves between the two parties, reading and modifying traffic in real-time. This is a:",opts:["Replay attack","On-path / Man-in-the-middle attack","Birthday attack","Brute force attack"],ans:1,exp:"An on-path (man-in-the-middle) attack positions the attacker between two communicating parties, allowing them to intercept, read, and potentially modify traffic in real-time. HTTPS and certificate pinning help prevent this by ensuring the encryption endpoint is legitimate."}
    ]
  },
  aiess: {
  id:'aiess',name:'AI Essentials Practice Quiz',code:'CompCert',timeMinutes:30,passingScore:70,
  questions:[
    {d:"AI Concepts",q:"Which type of AI is designed to perform a single specific task, like filtering spam or recommending movies?",opts:["General AI (AGI)","Narrow AI (ANI)","Super AI","Conscious AI"],ans:1,exp:"Narrow AI (ANI) is designed for one specific task. All current AI systems are narrow AI. General AI (AGI), which could perform any intellectual task, does not yet exist."},
    {d:"AI Concepts",q:"What powers AI assistants like ChatGPT and Copilot?",opts:["Expert systems","Robotic process automation","Large Language Models (LLMs)","Rule-based engines"],ans:2,exp:"Large Language Models (LLMs) are trained on massive text datasets and predict the most likely next words. They power modern AI assistants like ChatGPT, Claude, Copilot, and Gemini."},
    {d:"AI Concepts",q:"In machine learning, what is the difference between supervised and unsupervised learning?",opts:["Supervised uses more computing power","Supervised learns from labeled data with known answers; unsupervised finds patterns in unlabeled data","Unsupervised is more accurate than supervised","There is no difference"],ans:1,exp:"Supervised learning uses labeled data (input + known correct output) to learn. Unsupervised learning finds hidden patterns in data without labels — useful for clustering and anomaly detection."},
    {d:"AI Concepts",q:"A company trains a model to predict which customers will cancel their subscription. This is an example of:",opts:["Unsupervised clustering","Reinforcement learning","Supervised classification","Generative AI"],ans:2,exp:"Predicting churn (cancel yes/no) using historical data with known outcomes is supervised classification — the model learns from labeled examples of customers who did or did not cancel."},
    {d:"AI Concepts",q:"What does 'overfitting' mean in machine learning?",opts:["The model is too simple to learn patterns","The model memorizes training data but performs poorly on new data","The model takes too long to train","The model produces biased outputs"],ans:1,exp:"Overfitting occurs when a model learns the training data too well (including noise) but fails to generalize to new, unseen data. It performs great on training data but poorly in production."},
    {d:"AI in Practice",q:"Which component of a prompt tells the AI what perspective or expertise to adopt?",opts:["Constraints","Context","Task","Role/Persona"],ans:3,exp:"The Role/Persona component (e.g., 'You are a senior network engineer') tells the AI what perspective and expertise level to adopt, improving the relevance and quality of responses."},
    {d:"AI in Practice",q:"A user writes: 'Tell me about dogs.' Why is this a poor prompt?",opts:["It's too short","It mentions animals","It lacks specificity — no context, format, or constraints","It uses informal language"],ans:2,exp:"The prompt is too vague. Better: 'Write a 200-word summary of the top 5 dog breeds for families with children, including temperament and size.' Specific prompts get specific, useful answers."},
    {d:"AI in Practice",q:"What prompting technique asks the AI to 'think step by step' through a complex problem?",opts:["Zero-shot prompting","Few-shot prompting","Chain-of-thought prompting","Temperature adjustment"],ans:2,exp:"Chain-of-thought prompting asks the AI to reason through a problem step by step, which improves accuracy on complex tasks like math, logic, and multi-step analysis."},
    {d:"AI in Practice",q:"Before deploying AI-generated prompt templates to a support team, what should you do FIRST?",opts:["Deploy immediately to save time","Test the templates against real examples","Remove all human review steps","Share on social media"],ans:1,exp:"Always test AI templates against real-world examples before deploying. This catches inaccuracies, inappropriate responses, and edge cases that could damage customer relationships."},
    {d:"AI in Practice",q:"Which AI productivity tool is integrated into Microsoft 365 for document drafting and spreadsheet analysis?",opts:["ChatGPT","GitHub Copilot","Microsoft Copilot","Grammarly"],ans:2,exp:"Microsoft Copilot is integrated directly into Microsoft 365 apps (Word, Excel, PowerPoint, Outlook) for AI-assisted document creation, data analysis, and email drafting."},
    {d:"AI Ethics",q:"An AI hiring tool rejects more candidates from certain demographics despite equal qualifications. This is caused by:",opts:["Insufficient computing power","Bias in the training data","Too many parameters","Low temperature setting"],ans:1,exp:"If training data reflects historical biases (e.g., past hiring favored one group), the AI learns and replicates those patterns. The fix: diverse training data, bias audits, and human oversight."},
    {d:"AI Ethics",q:"Which AI ethics principle states that users should know when they are interacting with an AI system?",opts:["Accountability","Fairness","Transparency","Privacy"],ans:2,exp:"Transparency means users should be informed when they're interacting with AI rather than a human. This includes AI-generated content, chatbots, and automated decision-making."},
    {d:"AI Ethics",q:"A company wants to use customer data to train an AI model. Under GDPR, what must they ensure?",opts:["Data can be used for any purpose without consent","Data should only be used for stated purposes with appropriate consent","AI training is exempt from GDPR","Only structured data requires consent"],ans:1,exp:"GDPR requires purpose limitation — data can only be used for the purposes stated when it was collected. Using customer data for AI training may require additional consent and data protection measures."},
    {d:"AI Ethics",q:"What is the MOST important safeguard when AI is used for high-stakes decisions like hiring or lending?",opts:["Faster processing speed","Human oversight and review","Lower AI costs","More training data"],ans:1,exp:"Human-in-the-loop oversight is critical for high-stakes decisions. AI can assist and recommend, but a qualified human should review and approve decisions that significantly impact people's lives."},
    {d:"AI Ethics",q:"An employee pastes confidential customer records into a public AI chatbot. What is the PRIMARY risk?",opts:["The AI will respond slowly","Customer data may be stored, leaked, or used for model training","The AI will give a wrong answer","Nothing — AI tools are always secure"],ans:1,exp:"Public AI tools may store inputs, use them for training, or expose them through data breaches. Sensitive data (PII, PHI, financial) should never be entered into public AI tools without explicit approval and privacy controls."},
    {d:"AI Concepts",q:"What does 'garbage in, garbage out' mean in the context of AI?",opts:["AI models produce trash outputs intentionally","If the input data is poor quality, the AI outputs will also be poor","AI systems need to be recycled regularly","Only clean data can be stored in databases"],ans:1,exp:"AI outputs are only as good as the input data. If training data has errors, biases, duplicates, or missing values, the model will learn those problems and produce unreliable outputs."},
    {d:"AI Concepts",q:"A dataset has 15% missing values in a critical column. What is the BEST first step?",opts:["Delete all rows with missing values","Fill all missing values with zero","Investigate why the data is missing before choosing a fix","Ignore the missing values"],ans:2,exp:"First understand WHY data is missing — is it random, systematic, or a collection error? The cause determines the best fix. Blindly deleting or filling can introduce bias."},
    {d:"AI Ethics",q:"An AI generates a confident, detailed citation to a research paper — but the paper doesn't exist. This is called:",opts:["Overfitting","A hallucination","Bias","Underfitting"],ans:1,exp:"AI hallucination is when a model generates plausible-sounding but fabricated information. LLMs predict likely text patterns without verifying facts. Always verify AI-generated citations against primary sources."},
    {d:"AI in Practice",q:"A company implements AI ticket routing. 10% of tickets have low AI confidence scores. What should happen to those tickets?",opts:["Route them randomly","Delete them","Send them to a human review queue","Ignore them"],ans:2,exp:"Tickets below the confidence threshold should be routed to a human for manual review. This ensures accuracy while still automating the high-confidence majority. The human corrections also improve the model over time."},
    {d:"AI Ethics",q:"When introducing AI tools to a workplace, what is the MOST effective approach to reduce employee resistance?",opts:["Mandate AI use with no training","Replace resistant employees","Provide hands-on training and show how AI makes their jobs easier","Deploy AI tools silently without telling anyone"],ans:2,exp:"Change management requires communication and training. Show employees how AI assists their work (not replaces them), provide hands-on practice, and start with small pilots before company-wide rollout."}
  ]
  }
};

<script>// Simulation Engine — handles study guide rendering, simulation logic, and debrief
window.Engine = {
  // Study Guide
  renderQuiz(quiz, qid, answers) {
    if (!quiz) return '';
    const a = answers[qid];
    const ci = quiz.opts.findIndex(o => o.c);
    return `<div class="qb"><div class="qb-l">Knowledge check</div><div class="qb-q">${quiz.q}</div><div class="qopts">${quiz.opts.map((o, i) => {
      let c = 'qo'; if (a !== undefined) { c += ' chosen'; if (i === ci) c += ' correct'; else if (i === a && !o.c) c += ' wrong'; }
      return `<div class="${c}" onclick="App.answerQuiz('${qid}',${i})"><span class="lt">${o.l}</span>${o.t}</div>`;
    }).join('')}</div>${a !== undefined ? `<div class="qexpl ${quiz.opts[a].c ? 'right' : 'wronge'}">${quiz.opts[a].c ? quiz.right : quiz.wrong}</div>` : ''}</div>`;
  },

  renderStudyGuide(track, chIdx, state) {
    const ch = track.chapters[chIdx];
    const sg = ch.studyGuide;
    const sec = sg.sections[state.secIdx];
    state.secRead.add(state.secIdx);
    const rPct = Math.round((state.secRead.size / sg.sections.length) * 100);
    let body = sec.content;
    if (sec.quiz) body += this.renderQuiz(sec.quiz, `q_${chIdx}_${state.secIdx}`, state.quizAnswers);
    return `<div class="guide">
      <div class="guide-banner"><div class="banner-top"><div class="cls">Training manual — Chapter ${ch.num}</div><div class="docid">${sg.docId}</div><h1>${ch.title}</h1><div class="sub">${sg.subtitle}</div></div><div class="banner-meta"><span>${track.name} (${track.code})</span><span>|</span><span>${ch.examDomain}</span><span>|</span><span>${sg.sections.length} sections</span></div></div>
      <div class="snav">${sg.sections.map((s, i) => `<div class="snav-btn ${i === state.secIdx ? 'active' : ''}" onclick="App.goSection(${i})">${state.secRead.has(i) ? '<span class="ck">\u2713</span>' : ''}${s.title}</div>`).join('')}</div>
      <div class="sec"><div class="sec-hdr"><h2><span class="num">${state.secIdx + 1}/${sg.sections.length}</span>${sec.title}</h2><span class="rt">${sec.rt}</span></div><div class="sec-body">${body}</div></div>
      <div class="pf"><div class="pf-top"><span class="pfl">Study progress</span><span class="pfp">${rPct}%</span></div><div class="pf-bar"><div class="pf-fill" style="width:${rPct}%"></div></div><div class="pf-btns"><button class="btn-map" onclick="App.navigate('map')">Chapter map</button>${state.secIdx < sg.sections.length - 1 ? `<button class="btn-go" onclick="App.goSection(${state.secIdx + 1})">Next section ></button>` : `<button class="btn-go" onclick="App.navigate('briefing')">Deploy to simulation ></button>`}</div></div>
    </div>`;
  },

  renderBriefing(track, chIdx) {
    const ch = track.chapters[chIdx];
    const sim = ch.simulation;
    const objCount = sim.checklist ? sim.checklist.length : 6;
    return `<div class="brief"><div class="brief-top"><div class="pri">${ch.priority}</div><div class="tkt">${ch.ticket}</div><h2>${ch.mission}</h2><div class="sloc">${sim.location}</div></div><div class="brief-body"><div class="narr">${sim.narrative}</div><h4>Your mission</h4><div class="obj-row"><div class="bl"></div>Diagnose the root cause of the issue</div><div class="obj-row"><div class="bl"></div>Take appropriate corrective actions</div><div class="obj-row"><div class="bl"></div>Verify the fix and close the ticket</div><div style="margin-top:16px;padding:12px 14px;background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--purple);line-height:1.6"><strong>${objCount} hidden objectives</strong> will be scored after the mission. Use the right tools in the right order. Your performance is being tracked — the full checklist reveals after you're done.</div><div class="brief-btns"><button class="btn-deploy" onclick="App.navigate('sim')">Deploy</button></div></div></div>`;
  },

  matchInput(input, responseMap) {
    const l = input.toLowerCase();
    for (const m of responseMap) { if (m.keys.some(k => l.includes(k))) return m.resp; }
    return 'unknown';
  },

  processSimInput(input, simState, simData, toolIdx) {
    if (!input.trim()) return;
    simState.attempts++;
    simState.log.push({ sn: 'you', msg: input });

    const isToolClick = toolIdx !== undefined && toolIdx >= 0;
    const actionToolCount = simData.tools.filter(t => !['radio','dispatch'].includes(t.id)).length;
    const isDispatchTool = isToolClick && toolIdx >= actionToolCount;

    // Determine checklist target and response
    let targetItems = [];
    let response = null;

    if (isToolClick && !isDispatchTool) {
      // Tool button: direct mapping — tool position = checklist position
      const checklistIdx = toolIdx;
      if (checklistIdx < simState.checklist.length) {
        targetItems = [checklistIdx];
        // Last action tool also completes remaining items
        if (toolIdx === actionToolCount - 1) {
          for (let j = toolIdx + 1; j < simState.checklist.length; j++) {
            if (!simState.checklist[j].found) targetItems.push(j);
          }
        }
      }
      // Find the UNIQUE response for this checklist index
      // (the response whose match array includes this index)
      for (const [rk, rv] of Object.entries(simData.responses)) {
        if (rv.match && rv.match.includes(checklistIdx)) { response = rv; break; }
      }
      if (!response) {
        // Fallback: use keyword matching
        const rk = this.matchInput(input, simData.responseMap);
        response = simData.responses[rk] || simData.responses.unknown;
      }
    } else if (isDispatchTool) {
      // Dispatch/radio tool — no checklist target, find dispatch response
      const rk = this.matchInput(input, simData.responseMap);
      response = simData.responses[rk] || simData.responses.dispatch || simData.responses.unknown;
    } else {
      // Free text input — use keyword matching
      const rk = this.matchInput(input, simData.responseMap);
      response = simData.responses[rk] || simData.responses.unknown;
      const isDispatchLike = ['unknown','dispatch','lead','manager','security','check_servers','call_dispatch'].includes(rk);
      if (!isDispatchLike) {
        if (response.match && response.match.length > 0) {
          targetItems = response.match.filter(idx => simState.checklist[idx] && !simState.checklist[idx].found);
        }
        const l = input.toLowerCase();
        simState.checklist.forEach((c, i) => {
          if (!c.found && c.keys.some(k => l.includes(k)) && !targetItems.includes(i)) {
            targetItems.push(i);
          }
        });
      } else if (rk === 'unknown') {
        simState.wrong++;
        simState.log.push({ sn: response.sn, msg: response.msg });
        return simState;
      }
    }

    // Strict order enforcement
    if (targetItems.length > 0) {
      const nextRequired = simState.checklist.findIndex(c => !c.found);
      const minTarget = Math.min(...targetItems);
      if (nextRequired >= 0 && minTarget > nextRequired) {
        simState.wrong++;
        const nextStep = simState.checklist[nextRequired];
        const nudges = [
          `Hold on — you're skipping ahead. You need to <strong>${nextStep.text.toLowerCase()}</strong> first.`,
          `Not yet. Before you can do that, you should <strong>${nextStep.text.toLowerCase()}</strong>.`,
          `Good instinct, but the sequence matters here. Focus on: <strong>${nextStep.text.toLowerCase()}</strong>.`,
          `Slow down — in a real scenario you'd need to <strong>${nextStep.text.toLowerCase()}</strong> before this step.`
        ];
        simState.log.push({ sn: 'dispatch', msg: nudges[simState.attempts % nudges.length] });
        return simState;
      }
      // Complete the target checklist items
      targetItems.forEach(idx => { if (simState.checklist[idx]) simState.checklist[idx].found = true; });
    }

    simState.log.push({ sn: response.sn, msg: response.msg });
    if (simState.checklist.every(c => c.found)) {
      simState.complete = true;
    }
    return simState;
  },

  renderSim(track, chIdx, simState) {
    const ch = track.chapters[chIdx];
    const sim = ch.simulation;
    const found = simState.checklist.filter(c => c.found).length;
    const total = simState.checklist.length;
    const pct = Math.round((found / total) * 100);
    const allDone = simState.complete;
    // Progress thresholds for rack visual updates
    const halfDone = found >= Math.ceil(total / 2);

    let rackHTML = '';
    if (sim.rackLayout && sim.rackLayout.length > 0) {
      const cols = sim.rackLayout.length <= 3 ? 'col3' : '';
      rackHTML = `<div class="env"><div class="env-hdr"><span class="loc">${sim.location}</span>${allDone ? '<span class="ok-tag">\u2713 Resolved</span>' : found > 0 ? '<span class="alrt" style="color:var(--amber);animation:none">\u26A0 Investigating...</span>' : '<span class="alrt">\u26A0 Active alert</span>'}</div><div class="rack-bay ${cols}">${sim.rackLayout.map(r => {
        // Dynamic rack state based on progress
        let rackClass = '';
        let statusClass = r.status;
        let statusText = r.status === 'ok' ? 'Online' : r.status === 'crit' ? 'Alert' : 'Warning';
        if (allDone) { rackClass = 'fixed'; statusClass = 'ok'; statusText = 'OK'; }
        else if (halfDone && r.status !== 'ok') { rackClass = ''; statusClass = 'warn'; statusText = 'In progress'; }
        else if (r.status !== 'ok') { rackClass = 'trouble'; }

        return `<div class="rack ${rackClass}" onclick="App.simCmd('Inspect ${r.label}')"><div class="rack-label">${r.label}</div><div class="rack-units">${r.units.map(u => {
          if (u.t === 'empty') return '<div class="ru empty"></div>';
          // Dynamic LED colors based on progress
          let leds = '';
          if (u.leds) {
            leds = u.leds.map(origLed => {
              let ledColor = origLed;
              if (allDone) ledColor = 'g';
              else if (halfDone && (origLed === 'r' || origLed === 'off')) ledColor = 'a';
              else if (halfDone && origLed === 'a') ledColor = 'g';
              return `<div class="led ${ledColor}"></div>`;
            }).join('');
          }
          return `<div class="ru ${u.t}">${leds ? `<div class="leds">${leds}</div>` : ''}</div>`;
        }).join('')}</div><div class="rack-status ${statusClass}">${statusText}</div></div>`;
      }).join('')}</div></div>`;
    }

    // Track used tools — display in shuffled order
    const usedTools = simState.usedTools || {};
    const toolOrder = simState.toolOrder || sim.tools.map((_,i) => i);

    return `<div class="sim">${rackHTML}
      <div class="mt"><div class="mt-hdr"><span>Mission progress</span><span class="pct">${found}/${total} objectives</span></div><div class="mt-bar"><div class="mt-fill" style="width:${pct}%"></div></div><div class="mt-objs">${simState.checklist.map((c, i) => `<div class="mt-obj ${c.found ? 'done' : ''}">${c.found ? '\u2713' : '\u25CB'} Objective ${i + 1}</div>`).join('')}</div></div>
      <div class="rlog" id="rlog">${simState.log.map(l => `<div class="rl"><span class="sn ${l.sn}">[${l.sn}]</span><span class="mg2">${l.msg}</span></div>`).join('')}</div>
      <div class="tbelt">${toolOrder.map(origIdx => {
        const t = sim.tools[origIdx];
        const isUsed = usedTools[t.id];
        return `<div class="tl ${isUsed ? 'active' : ''}" onclick="App.useTool('${t.id}')" style="${isUsed ? 'opacity:.55;border-color:rgba(52,211,153,0.3);color:var(--green);background:var(--glow-green)' : ''}">${isUsed ? '\u2713' : t.ico} ${t.label}</div>`;
      }).join('')}</div>
      <div class="abar"><input type="text" id="cmdIn" placeholder="Describe your action..." onkeydown="if(event.key==='Enter')App.doCmd()"/><button onclick="App.doCmd()">Execute</button></div>
    </div>`;
  },

  calcScore(simState) {
    const f = simState.checklist.filter(c => c.found).length;
    return Math.max(0, Math.round((f / simState.checklist.length) * 100) - simState.wrong * 4);
  },
  getStars(s) { return s >= 90 ? 3 : s >= 70 ? 2 : s >= 40 ? 1 : 0; },
  getXP(s) { return Math.round(s * 2.8); },

  // Practice Exam
  renderExamQuestion(exam, qIdx, selected) {
    const q = exam.questions[qIdx];
    const answered = selected[qIdx] !== undefined;
    return `<div class="eq-card"><div class="eq-top"><span class="eq-domain">${q.d}</span><span class="eq-count">Question ${qIdx+1} of ${exam.questions.length}</span></div><div class="eq-q">${q.q}</div><div class="eq-opts">${q.opts.map((o,i)=>{
      let c='eq-opt';if(answered){c+=' chosen';if(i===q.ans)c+=' correct';else if(i===selected[qIdx])c+=' wrong';}
      return`<div class="${c}" onclick="App.examAnswer(${i})"><span class="eq-lt">${String.fromCharCode(65+i)}</span><span>${o}</span></div>`;
    }).join('')}</div>${answered?`<div class="eq-expl ${selected[qIdx]===q.ans?'right':'wronge'}">${q.exp}</div>`:''}</div>`;
  },

  renderExamResults(exam, selected) {
    const total = exam.questions.length;
    let correct = 0;
    const domainScores = {};
    exam.questions.forEach((q,i) => {
      if (!domainScores[q.d]) domainScores[q.d] = {total:0,correct:0};
      domainScores[q.d].total++;
      if (selected[i] === q.ans) { correct++; domainScores[q.d].correct++; }
    });
    const pct = Math.round((correct/total)*100);
    const passed = pct >= exam.passingScore;
    return `<div class="er-card"><div class="er-badge" style="border-color:${passed?'rgba(52,211,153,0.4)':'rgba(248,113,113,0.4)'}"><span style="font-size:36px">${passed?'\u2705':'\u274C'}</span></div>
      <div class="er-status" style="color:${passed?'var(--green)':'var(--red)'}">${passed?'PASSED':'NOT YET — KEEP STUDYING'}</div>
      <div class="er-title">${exam.title}</div>
      <div class="er-score-big">${pct}%</div>
      <div class="er-detail">${correct}/${total} correct · Passing: ${exam.passingScore}%</div>
      <div class="er-domains"><div class="er-dh">Domain breakdown</div>${Object.entries(domainScores).map(([d,s])=>{
        const dp=Math.round((s.correct/s.total)*100);
        return`<div class="er-dom"><div class="er-dom-top"><span>${d}</span><span>${s.correct}/${s.total} (${dp}%)</span></div><div class="er-dom-bar"><div class="er-dom-fill" style="width:${dp}%;background:${dp>=70?'var(--green)':'var(--red)'}"></div></div></div>`;
      }).join('')}</div>
      <div class="er-actions"><button class="retry" onclick="App.retakeExam()">Retake exam</button><button class="nxt" onclick="App.navigate('examSelect')">All exams</button></div>
    </div>`;
  },

  starSVG(filled) {
    return `<svg viewBox="0 0 36 36"><path d="M18 2l4.9 10 11.1 1.6-8 7.8 1.9 11L18 27.4 8.1 32.4l1.9-11-8-7.8L13.1 12z" fill="${filled ? 'var(--amber)' : 'var(--border)'}"/></svg>`;
  },

  renderDebrief(track, chIdx, simState) {
    const ch = track.chapters[chIdx];
    const score = this.calcScore(simState);
    const stars = this.getStars(score);
    const xp = this.getXP(score);
    const nextCh = chIdx < track.chapters.length - 1 ? track.chapters[chIdx + 1] : null;
    return `<div class="db">
      <div class="db-badge">${track.icon}</div>
      <div class="db-rank">${score >= 90 ? 'Outstanding' : score >= 70 ? 'Mission complete' : score >= 40 ? 'Developing' : 'Needs review'}</div>
      <div class="db-ttl">Ticket ${ch.ticket} resolved</div>
      <div class="db-sub">${ch.mission}</div>
      <div class="db-stars">${[1, 2, 3].map((s, i) => `<div class="db-star ${s <= stars ? 'earned' : ''}" style="animation-delay:${0.3 + i * 0.3}s">${this.starSVG(s <= stars)}</div>`).join('')}</div>
      <div class="db-grid"><div class="db-stat"><div class="n" style="color:var(--cyan)">${score}</div><div class="l">Score</div></div><div class="db-stat"><div class="n" style="color:var(--amber)">+${xp}</div><div class="l">XP earned</div></div><div class="db-stat"><div class="n" style="color:var(--green)">${simState.attempts}</div><div class="l">Actions</div></div></div>
      <div class="db-cl"><h4>Checklist revealed</h4>${simState.checklist.map((c, i) => `<div class="db-ci ${c.found ? 'pass' : 'fail'}" style="animation-delay:${1 + i * .1}s"><span class="mk">${c.found ? '\u2713' : '\u2717'}</span>${c.text}</div>`).join('')}</div>
      <div class="db-acts"><button class="retry" onclick="App.navigate('briefing')">Retry mission</button>${nextCh ? `<button class="nxt" onclick="App.completeChapter()">Next mission ></button>` : `<button class="nxt" onclick="App.navigate('map')">Back to map</button>`}</div>
    </div>`;
  }
};
</script>
<script>// CertOps Academy — Main Application (Supabase Backend)
(function() {

const $ = id => document.getElementById(id);
const SUPABASE_URL = 'https://dfbylunacfziuejbfbqw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmYnlsdW5hY2Z6aXVlamJmYnF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MDEwMDgsImV4cCI6MjA4OTI3NzAwOH0.vJe3HjGHKHgVuzeAIIibt3833Xxo0M8DIsbORBEN32g';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = { email: '', name: 'Cadet', plan: 'free', isAdmin: false, id: null };
let progress = {};
let authReady = false;

// Admin hash check
async function hashStr(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Load profile from Supabase
async function loadProfile(userId) {
  const { data } = await sb.from('profiles').select('*').eq('id', userId).single();
  if (data) {
    user.id = data.id;
    user.email = data.email || '';
    user.name = data.name || data.email?.split('@')[0] || 'Cadet';
    user.plan = data.plan || 'free';
    user.isAdmin = data.is_admin || false;
  }
}

// Load all progress from Supabase
async function loadProgress(userId) {
  const { data } = await sb.from('progress').select('*').eq('user_id', userId);
  progress = {};
  if (data) {
    data.forEach(row => {
      progress[row.track_id] = {
        completed: row.completed || {},
        scores: row.scores || {},
        xp: row.xp || 0
      };
    });
  }
  // Cache in localStorage
  localStorage.setItem('certops_progress', JSON.stringify(progress));
}

// Save progress for a track to Supabase
async function saveProgress() {
  localStorage.setItem('certops_progress', JSON.stringify(progress));
  if (!user.id) return;
  for (const [trackId, tp] of Object.entries(progress)) {
    await sb.from('progress').upsert({
      user_id: user.id,
      track_id: trackId,
      completed: tp.completed,
      scores: tp.scores,
      xp: tp.xp
    }, { onConflict: 'user_id,track_id' });
  }
}

// Save plan to Supabase profile
async function savePlan(plan) {
  user.plan = plan;
  if (user.id) {
    await sb.from('profiles').update({ plan: plan }).eq('id', user.id);
  }
}

function getTrackProgress(trackId) {
  if (!progress[trackId]) progress[trackId] = { completed: {}, xp: 0, scores: {} };
  return progress[trackId];
}

// Initialize — check session
async function initApp() {
  const app = $('app');
  app.innerHTML = '<div class="app" style="text-align:center;padding:60px 20px"><div style="font-family:Orbitron,sans-serif;font-size:20px;margin-bottom:12px">\u2699 CertOps<span style="color:var(--cyan)">Academy</span></div><div style="color:var(--text2);font-size:13px">Loading...</div></div>';

  // Check URL params
  const urlParams = new URLSearchParams(window.location.search);

  // Check for existing session
  const { data: { session } } = await sb.auth.getSession();

  if (session) {
    await loadProfile(session.user.id);
    await loadProgress(session.user.id);

    // Admin mode check
    if (urlParams.has('admin') && !user.isAdmin) {
      const adminId = prompt('Admin Login — Enter your admin ID:');

        const adminPass = prompt('Enter admin password:');
        const idHash = await hashStr(adminId);
        const passHash = await hashStr(adminPass || '');
        if (idHash === '3a14dace6fdbe67fae9e015f6b35027f8fea064be9a62efd936dfbeeca1f23ea' && passHash === '38ca5c1f8348125fe2afc6fdf0f706e8d644bad1eac13bdad7550fbdc87240e8') {
          user.isAdmin = true;
          user.plan = 'commander';
          await sb.from('profiles').update({ is_admin: true, plan: 'commander' }).eq('id', user.id);
        } else {
          alert('Invalid credentials.');
        }
      }
    }

    // Detect return from Stripe payment

    if (paidPlan && (paidPlan === 'operator' || paidPlan === 'commander')) {
      await savePlan(paidPlan);
      window.history.replaceState({}, '', 'app.html');

    authReady = true;
    state.view = 'home';
    render();
  } else {
    // No session — show auth screen
    authReady = true;

}

// Auth functions
async function doSignup(email, password, name) {
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) { alert(error.message); return; }
  if (data.user) {
    // Update name in profile
    setTimeout(async () => {
      await sb.from('profiles').update({ name: name || email.split('@')[0] }).eq('id', data.user.id);
    }, 1000);
    alert('Account created! Check your email to confirm, then log in.');

}

async function doLogin(email, password) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { alert(error.message); return; }
  if (data.session) {
    await loadProfile(data.session.user.id);

function canAccess(trackId, chIdx) {
  if (user.isAdmin) return true;
  const ch = TRACKS[trackId].chapters[chIdx];
  if (ch.free) return true;
  if (user.plan === 'commander') return true;
  if (user.plan === 'operator') return true; // simplified — in production, check which track they purchased
  return false;
}

function getChapterStatus(trackId, chIdx) {
  const tp = getTrackProgress(trackId);
  // Always show completed chapters as done, even for admin
  if (tp.completed[chIdx]) return 'done';
  // Admin can access any chapter — show as active instead of locked
  if (user.isAdmin) return 'active';
  // Active = first non-completed chapter
  const firstIncomplete = TRACKS[trackId].chapters.findIndex((_, i) => !tp.completed[i]);
  if (chIdx === firstIncomplete) return 'active';
  if (chIdx < firstIncomplete) return 'done';
  return 'locked';
}

function initSim() {
  const sim = TRACKS[state.track].chapters[state.chIdx].simulation;
  // Shuffle action tools, keep dispatch/radio at the end
  const actionIdxs = [];
  const radioIdxs = [];
  sim.tools.forEach((t, i) => {
    if (['radio','dispatch'].includes(t.id)) radioIdxs.push(i);
    else actionIdxs.push(i);
  });
  for (let i = actionIdxs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [actionIdxs[i], actionIdxs[j]] = [actionIdxs[j], actionIdxs[i]];
  }
  const toolOrder = [...actionIdxs, ...radioIdxs];
  state.sim = {
    checklist: sim.checklist.map(c => ({ ...c, found: false })),
    log: [
      { sn: 'dispatch', msg: `Dispatch: ticket <strong>${TRACKS[state.track].chapters[state.chIdx].ticket}</strong> assigned. ${sim.narrative.replace(/<[^>]+>/g, '')}` },
      { sn: 'dispatch', msg: 'Use your tools or type commands. Good luck.' }
    ],
    attempts: 0, wrong: 0, complete: false, usedTools: {}, toolOrder
  };
}
