    {num:2,title:"Cryptography & PKI",location:"SOC — Crypto lab",floor:1,ticket:"SEC-1015",mission:"TLS certificate expired on customer portal — HTTPS broken",priority:"Priority 1 — Critical",free:false,desc:"Encryption types, hashing, digital certificates, PKI infrastructure, and key management.",examDomain:"Domain 1: General Security Concepts",
      studyGuide:{docId:"DOC-SEC-0200",subtitle:"Symmetric/asymmetric encryption, hashing algorithms, PKI, and certificate management.",sections:[{id:"encryption",title:"Encryption fundamentals",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Symmetric</strong> = same key encrypts and decrypts (AES-256, 3DES). Fast, used for bulk data. <strong>Asymmetric</strong> = public/private key pair (RSA, ECC). Slower, used for key exchange and digital signatures. <strong>Hybrid</strong> = use asymmetric to exchange symmetric key, then symmetric for data (how TLS works).</div></div>`},{id:"hashing",title:"Hashing & integrity",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>MD5</strong> = 128-bit, broken (collisions found). <strong>SHA-1</strong> = 160-bit, deprecated. <strong>SHA-256/SHA-3</strong> = current standard. Hashing is <strong>one-way</strong> — you can't reverse a hash. Used for password storage, file integrity, digital signatures.</div></div>`,quiz:{q:"Which algorithm is a one-way function used to verify data integrity?",opts:[{l:"A",t:"AES-256",c:false},{l:"B",t:"RSA-2048",c:false},{l:"C",t:"SHA-256",c:true},{l:"D",t:"Diffie-Hellman",c:false}],right:"SHA-256 is a hashing algorithm — it produces a fixed-length digest from any input. It's one-way (irreversible) and used to verify integrity.",wrong:"SHA-256 is a hash function. AES is symmetric encryption, RSA is asymmetric, Diffie-Hellman is key exchange."}},{id:"pki",title:"PKI & certificates",rt:"3 min",content:`<p>Public Key Infrastructure manages digital certificates for secure communication.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>CA (Certificate Authority)</strong> = trusted issuer. <strong>CSR</strong> = Certificate Signing Request. <strong>CRL</strong> = Certificate Revocation List. <strong>OCSP</strong> = Online Certificate Status Protocol. Certificate types: <strong>DV</strong> (domain validated), <strong>OV</strong> (organization), <strong>EV</strong> (extended validation). <strong>Wildcard</strong> (*.domain.com) and <strong>SAN</strong> (Subject Alternative Name) certificates cover multiple domains.</div></div>`}]},

    {num:3,title:"Identity & access management",location:"SOC — IAM console",floor:1,ticket:"SEC-1028",mission:"Privilege escalation detected — service account compromised",priority:"Priority 1 — Critical",free:false,desc:"Authentication methods, authorization models, MFA, SSO, and directory services.",examDomain:"Domain 2: Threats, Vulnerabilities, and Mitigations",
      studyGuide:{docId:"DOC-SEC-0300",subtitle:"Authentication, authorization, access control models, and identity management.",sections:[{id:"authn",title:"Authentication methods",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t">Authentication factors: <strong>Something you know</strong> (password, PIN). <strong>Something you have</strong> (smart card, token, phone). <strong>Something you are</strong> (biometrics). <strong>MFA</strong> = two or more different factors. Password + security question = NOT MFA (both are 'something you know').</div></div>`},{id:"authz",title:"Authorization models",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>RBAC</strong> (Role-Based) = permissions based on job role. <strong>DAC</strong> (Discretionary) = owner controls access. <strong>MAC</strong> (Mandatory) = system enforces labels (Top Secret, Secret, etc.). <strong>ABAC</strong> (Attribute-Based) = policies based on attributes (time, location, department). <strong>Least privilege</strong> = minimum access needed to do the job.</div></div>`,quiz:{q:"A user needs access only to files required for their job function. Which principle?",opts:[{l:"A",t:"Separation of duties",c:false},{l:"B",t:"Least privilege",c:true},{l:"C",t:"Need to know",c:false},{l:"D",t:"Mandatory access control",c:false}],right:"Least privilege = minimum permissions needed to perform job duties. This limits blast radius if the account is compromised.",wrong:"Least privilege means giving minimum necessary access. It's the foundation of access control."}},{id:"sso",title:"SSO & federation",rt:"2 min",content:`<p><strong>SSO</strong> = single sign-on, one login for multiple apps. <strong>SAML</strong> = XML-based, enterprise SSO. <strong>OAuth</strong> = authorization (not authentication). <strong>OpenID Connect</strong> = authentication on top of OAuth. <strong>LDAP</strong> = directory access protocol (Active Directory).</p>`}]},
      simulation:{location:"SOC — IAM console",narrative:`EDR alert: a <strong>service account</strong> (svc-backup) has been observed making Active Directory queries it shouldn't be — <strong>enumerating all user accounts and group memberships</strong>. This service account should only have backup permissions. Someone has compromised it and is performing <strong>reconnaissance for privilege escalation</strong>. Contain it now.`,objectives:["Analyze the anomalous AD queries","Verify service account compromise","Disable the compromised account","Check for privilege escalation","Reset credentials and apply least privilege","Verify containment and document"],

        tools:[{id:"siem",label:"SIEM analysis",ico:"\uD83D\uDD0D",cmd:"Analyze the anomalous Active Directory queries in SIEM"},{id:"trace",label:"Trace source",ico:"\uD83D\uDCCD",cmd:"Trace the source IP and session of the compromised access"},{id:"disable",label:"Disable account",ico:"\u26D4",cmd:"Disable the compromised svc-backup service account"},{id:"escalation",label:"Check escalation",ico:"\u26A0\uFE0F",cmd:"Check for privilege escalation attempts in AD"},{id:"harden",label:"Reset & harden",ico:"\uD83D\uDD10",cmd:"Reset credentials and apply least privilege permissions"},{id:"radio",label:"IR Lead",ico:"\uD83D\uDCE1",cmd:"Escalate to IR team"}],
        responseMap:[{keys:["analyze","ad","query","siem","ldap","anomalous","enumerate","recon"],resp:"analyze"},{keys:["trace","source","where","ip","origin","compromised","login"],resp:"trace"},{keys:["disable","account","svc","service","lock","deactivate"],resp:"disable"},{keys:["privilege","escalation","admin","elevated","group","domain admin"],resp:"escalation"},{keys:["reset","credentials","password","least privilege","permissions","restrict","harden"],resp:"harden"},{keys:["verify","containment","report","document","incident","clean","confirm"],resp:"report"},{keys:["ir lead","radio","help","escalate"],resp:"lead"}],
        responses:{analyze:{sn:"system",msg:"SIEM shows svc-backup running LDAP queries: <strong>(&(objectClass=user))</strong> — enumerating ALL user objects. Also querying <strong>memberOf for Domain Admins group</strong>. This is classic recon for privilege escalation. 847 queries in 12 minutes.",match:[0]},trace:{sn:"system",msg:"Source IP: <strong>10.0.3.45</strong> — a workstation assigned to an intern. Login timestamp: 02:14 AM (outside business hours). The intern's account was likely also compromised — used to pivot to the service account.",match:[1]},disable:{sn:"system",msg:"Service account <strong>svc-backup: DISABLED</strong> in Active Directory. All active sessions terminated. Intern account <strong>jdoe: DISABLED</strong> pending investigation. Both accounts locked out.",match:[2]},escalation:{sn:"system",msg:"AD audit log check: <strong>NO privilege escalation succeeded</strong>. The attacker queried Domain Admin membership but did not modify any groups. We caught it during recon phase — before actual escalation.",match:[3]},harden:{sn:"system",msg:"New svc-backup account created with <strong>least privilege</strong>: backup permissions only, no interactive login, no LDAP read on user objects. Password: 32-character random, stored in vault. Intern account remains locked pending HR investigation.",match:[4]},report:{sn:"success",msg:"Incident report SEC-1028 filed. Attack chain: compromised intern creds → lateral movement to service account → AD enumeration. Caught during recon phase. Recommended: MFA on all service accounts, restrict interactive login. <strong>Incident contained and documented.</strong>",match:[5]},lead:{sn:"dispatch",msg:"Service account compromise is serious — they're looking for Domain Admin. Disable the account immediately, then trace how they got in.",match:[]},unknown:{sn:"dispatch",msg:"Start with the SIEM alerts. What queries is the service account running? That tells you what the attacker is after.",match:[]}}

    {num:4,title:"Network security architecture",location:"SOC — Architecture console",floor:1,ticket:"SEC-1041",mission:"Firewall misconfiguration — sensitive data exposed to internet",priority:"Priority 1 — Critical",free:false,desc:"Firewalls, IDS/IPS, network segmentation, zero trust, and DMZ architecture.",examDomain:"Domain 3: Security Architecture",
      studyGuide:{docId:"DOC-SEC-0400",subtitle:"Network security design, firewall rules, segmentation, and defense in depth.",sections:[{id:"firewalls",title:"Firewall types & rules",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Packet filtering</strong> = stateless, checks headers. <strong>Stateful</strong> = tracks connections. <strong>Application/proxy</strong> = inspects content. <strong>NGFW</strong> = all of the above + deep packet inspection, IPS, application awareness. Rules: processed <strong>top-to-bottom, first match wins</strong>. Always ends with implicit deny all.</div></div>`},{id:"segmentation",title:"Network segmentation",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>DMZ</strong> = screened subnet between external and internal. Public-facing servers go here. <strong>Zero trust</strong> = never trust, always verify. Every access request is authenticated and authorized regardless of network location. <strong>Microsegmentation</strong> = granular segmentation at workload level.</div></div>`,quiz:{q:"In a zero trust architecture, which statement is true?",opts:[{l:"A",t:"Internal network traffic is automatically trusted",c:false},{l:"B",t:"Trust is based on network location (inside vs outside)",c:false},{l:"C",t:"Every access request must be verified regardless of location",c:true},{l:"D",t:"VPN access grants full network trust",c:false}],right:"Zero trust = 'never trust, always verify.' Network location (inside/outside) is irrelevant. Every request is authenticated, authorized, and encrypted.",wrong:"Zero trust eliminates implicit trust. Being 'inside the network' doesn't mean you're trusted."}},{id:"defense",title:"Defense in depth",rt:"2 min",content:`<p>Layer multiple security controls so no single failure is catastrophic: perimeter firewall → IDS/IPS → network segmentation → host firewall → endpoint protection → application security → data encryption.</p>`}]},

    {num:5,title:"Endpoint & application security",location:"SOC — EDR console",floor:2,floorName:"Incident Response Lab",ticket:"SEC-1054",mission:"Ransomware detected on endpoint — containment needed",priority:"Priority 1 — Critical",free:false,desc:"Endpoint protection, application hardening, patch management, and vulnerability scanning.",examDomain:"Domain 4: Security Operations",
      studyGuide:{docId:"DOC-SEC-0500",subtitle:"Endpoint protection strategies, application security, and patch management.",sections:[{id:"edr",title:"Endpoint detection & response",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Antivirus</strong> = signature-based, catches known threats. <strong>EDR</strong> = behavioral analysis, catches unknown threats by monitoring process activity, file changes, and network connections. <strong>XDR</strong> = extended detection across endpoints, network, cloud, email. EDR provides: real-time monitoring, threat hunting, automated response, forensic investigation.</div></div>`},{id:"hardening",title:"Application hardening",rt:"3 min",content:`<p>Reduce attack surface: <strong>disable unnecessary services</strong>, remove default accounts, apply patches, use application whitelisting, implement input validation, enforce secure coding practices.</p>`,quiz:{q:"Which approach only allows pre-approved applications to run on a system?",opts:[{l:"A",t:"Blacklisting",c:false},{l:"B",t:"Whitelisting/allowlisting",c:true},{l:"C",t:"Sandboxing",c:false},{l:"D",t:"Input validation",c:false}],right:"Whitelisting (allowlisting) only permits explicitly approved applications. Everything else is blocked by default — more secure than blacklisting.",wrong:"Whitelisting = only approved apps run. Blacklisting = known bad apps blocked. Whitelisting is more restrictive."}},{id:"patches",title:"Patch management",rt:"2 min",content:`<p>Unpatched systems are the #1 vulnerability exploited. Patch management cycle: <strong>Identify</strong> (scan for missing patches) → <strong>Test</strong> (validate in staging) → <strong>Deploy</strong> (push to production) → <strong>Verify</strong> (confirm applied).</p>`}]},

    {num:6,title:"Incident response & forensics",location:"IR Lab — Analysis station",floor:2,ticket:"SEC-1067",mission:"Data exfiltration detected — insider threat investigation",priority:"Priority 1 — Critical",free:false,desc:"IR lifecycle, forensic procedures, chain of custody, and evidence handling.",examDomain:"Domain 4: Security Operations",
      studyGuide:{docId:"DOC-SEC-0600",subtitle:"Incident response phases, digital forensics methodology, and evidence handling.",sections:[{id:"lifecycle",title:"IR lifecycle",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t">NIST IR phases: <strong>1. Preparation</strong> (policies, tools, training). <strong>2. Detection & Analysis</strong> (identify and confirm incident). <strong>3. Containment, Eradication, Remediation</strong> (stop the damage, remove threat, restore systems). <strong>4. Post-incident Activity</strong> (lessons learned, documentation). Know this lifecycle cold for the exam.</div></div>`},{id:"forensics",title:"Digital forensics",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Order of volatility</strong>: CPU cache → RAM → swap → running processes → disk → logs → physical config. Capture most volatile first. <strong>Chain of custody</strong> = documented trail of who handled evidence, when, and what was done. <strong>Write-blocker</strong> = prevents modification of disk during imaging. <strong>Forensic image</strong> = bit-for-bit copy of disk (not a regular backup).</div></div>`,quiz:{q:"When collecting digital evidence, which should be captured FIRST?",opts:[{l:"A",t:"Hard disk contents",c:false},{l:"B",t:"System RAM / memory dump",c:true},{l:"C",t:"Log files",c:false},{l:"D",t:"Physical configuration notes",c:false}],right:"RAM is the most volatile — it's lost when power is removed. Capture volatile evidence first (order of volatility: registers → cache → RAM → disk → logs).",wrong:"Order of volatility: RAM before disk. RAM is lost on power-off; disk persists."}},{id:"evidence",title:"Evidence handling",rt:"2 min",content:`<p>Forensic best practices: <strong>never work on original media</strong> — always make a forensic image. Document everything. Maintain <strong>chain of custody</strong>. Store evidence securely. Hash original and image to verify <strong>integrity</strong> (SHA-256).</p>`}]},

e properly — chain of custody is critical. HR and Legal need a complete package.",match:[]},unknown:{sn:"dispatch",msg:"Start with the DLP alert. What data was transferred, where, and by whom?",match:[]}}

    {num:7,title:"Governance, risk & compliance",location:"SOC — GRC dashboard",floor:2,ticket:"SEC-1080",mission:"Compliance audit finding — critical controls missing",priority:"Priority 2 — Urgent",free:false,desc:"Security frameworks, risk management, compliance requirements, and security policies.",examDomain:"Domain 5: Security Program Management",
      studyGuide:{docId:"DOC-SEC-0700",subtitle:"Security frameworks, risk assessment, compliance standards, and policy management.",sections:[{id:"frameworks",title:"Security frameworks",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>NIST CSF</strong> = Identify, Protect, Detect, Respond, Recover. <strong>ISO 27001</strong> = international ISMS standard. <strong>CIS Controls</strong> = prioritized security actions. <strong>NIST SP 800-53</strong> = security controls for federal systems. <strong>COBIT</strong> = IT governance framework. Know which framework applies to which scenario.</div></div>`},{id:"risk",title:"Risk management",rt:"3 min",content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Risk = Threat × Vulnerability × Impact</strong>. Risk responses: <strong>Accept</strong> (do nothing, document), <strong>Mitigate</strong> (reduce likelihood/impact), <strong>Transfer</strong> (insurance, outsource), <strong>Avoid</strong> (eliminate the activity). <strong>Risk register</strong> = document tracking all identified risks, their likelihood, impact, and response. <strong>Business continuity</strong>: <strong>RTO</strong> (Recovery Time Objective) = max acceptable downtime. <strong>RPO</strong> (Recovery Point Objective) = max acceptable data loss. <strong>MTBF</strong> (Mean Time Between Failures) = average time between hardware failures. <strong>MTTR</strong> (Mean Time To Repair) = average time to restore service.</div></div>`,quiz:{q:"An organization decides to purchase cyber insurance to handle potential breach costs. This is an example of?",opts:[{l:"A",t:"Risk acceptance",c:false},{l:"B",t:"Risk avoidance",c:false},{l:"C",t:"Risk mitigation",c:false},{l:"D",t:"Risk transfer",c:true}],right:"Cyber insurance transfers the financial impact of a risk to the insurance provider. The risk still exists, but the financial burden is shared.",wrong:"Insurance = risk transfer. You're shifting the financial impact to the insurer."}},{id:"compliance",title:"Compliance & regulations",rt:"2 min",content:`<p>Key regulations: <strong>GDPR</strong> (EU data privacy), <strong>HIPAA</strong> (healthcare), <strong>PCI-DSS</strong> (payment cards), <strong>SOX</strong> (financial reporting), <strong>FERPA</strong> (education). Each has specific requirements for data handling, breach notification, and security controls.</p>`}]},

y reviewing the audit findings in detail. Understand what needs to be fixed before you start fixing.",match:[]}}

      studyGuide:{docId:"DOC-SEC-0800",subtitle:"Review all security domains before the final SOC crisis assessment.",sections:[{id:"review",title:"Final review",rt:"5 min",content:`<p>Security+ SY0-701 domains: <strong>General Security Concepts (12%)</strong>, <strong>Threats, Vulnerabilities & Mitigations (22%)</strong>, <strong>Security Architecture (18%)</strong>, <strong>Security Operations (28%)</strong>, <strong>Security Program Management (20%)</strong>.</p><div class="fn"><div class="fn-l">Exam strategy</div><div class="fn-t">Security Operations is the largest domain at 28%. Focus on incident response, detection tools, and log analysis. The exam tests practical application — not just memorization. PBQs often involve firewall rules, log analysis, or incident triage.</div></div>`}]},

        responses:{triage:{sn:"system",msg:"Triage: <strong>P1: Ransomware</strong> (active encryption, spreading). <strong>P2: Data exfiltration</strong> (data leaving network). <strong>P3: Compromised creds</strong> (executive accounts). <strong>P4: Firewall rule</strong> (exposure). Contain ransomware first.",match:[0]},isolate:{sn:"system",msg:"EDR isolation: <strong>2 infected endpoints quarantined</strong>. Network access severed. Ransomware processes killed. Encryption stopped at 1,247 files. No spread to file servers confirmed.",match:[1]},creds:{sn:"system",msg:"All 3 executive accounts: <strong>passwords force-reset, sessions terminated, MFA tokens revoked</strong>. Re-enrollment required in person with IT. VPN access from suspicious IPs blocked.",match:[2]},firewall:{sn:"system",msg:"Unauthorized rule allowing 0.0.0.0/0 to internal DB on port 3306: <strong>REMOVED</strong>. Replaced with app-server-only rule. Firewall policy reloaded. Port scan confirms closed.",match:[3]},exfil:{sn:"system",msg:"Outbound connections to 198.51.100.0/24 (foreign C2 range): <strong>BLOCKED at firewall</strong>. 3.7 GB had been exfiltrated before block. DLP policy updated to alert on large outbound transfers.",match:[4]},verify:{sn:"success",msg:"<strong>FULL CONTAINMENT ACHIEVED</strong>: Ransomware stopped, creds reset, firewall closed, exfiltration blocked. Forensic evidence preserved. Incident report initiated. Breach notification team activated. <strong>FINAL ASSESSMENT COMPLETE — Outstanding, Security Engineer!</strong>",match:[5]},lead:{sn:"dispatch",msg:"Multiple vectors, coordinated attack. Triage by impact — ransomware first (active destruction), then exfiltration (data loss), then credentials, then firewall.",match:[]},unknown:{sn:"dispatch",msg:"Active breach. Start with triage — which alert poses the most immediate damage? Prioritize and contain.",match:[]}}

  avatarBg:'linear-gradient(135deg,#4c1d95,#1e1b4b)',
  rankProgression:['AI Recruit','AI Apprentice','AI Practitioner','AI Specialist','AI Lead'],
  chapters:[
    // Chapter 1 — Introduction to AI (FREE)
    {num:1,title:'Introduction to artificial intelligence',location:'Innovation lab — AI briefing room',floor:1,floorName:'AI Fundamentals',ticket:'AI-1001',mission:'Executive needs an AI readiness brief by end of day',priority:'Priority 2 — Urgent',free:true,desc:'What AI is, types of AI, how AI differs from traditional computing, and real-world applications.',examDomain:'Domain 1: AI Concepts',
      studyGuide:{docId:'DOC-AI-0100',subtitle:'Foundational AI concepts, terminology, and the landscape of artificial intelligence.',sections:[
        {id:'whatisai',title:'What is artificial intelligence?',rt:'3 min',content:`<p>AI is technology that enables machines to perform tasks that typically require human intelligence — learning, reasoning, problem-solving, and decision-making.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Narrow AI (ANI)</strong> = designed for one specific task (spam filters, voice assistants, recommendation engines). This is ALL current AI. <strong>General AI (AGI)</strong> = hypothetical AI with human-level reasoning across all domains — does NOT exist yet. <strong>Machine Learning (ML)</strong> = subset of AI where systems learn from data without being explicitly programmed. <strong>Deep Learning</strong> = subset of ML using neural networks with many layers. <strong>Generative AI</strong> = AI that creates new content (text, images, code, audio) based on patterns learned from training data.</div></div>`,quiz:{q:'Which type of AI can perform any intellectual task a human can?',opts:[{l:'A',t:'Narrow AI',c:false},{l:'B',t:'General AI (AGI)',c:true},{l:'C',t:'Machine Learning',c:false},{l:'D',t:'Deep Learning',c:false}],right:'AGI (Artificial General Intelligence) would match human-level reasoning across all domains. It does not exist yet. All current AI is Narrow AI — designed for specific tasks.',wrong:'General AI (AGI) is the theoretical concept of AI matching human intelligence. It does not exist yet — all current AI is narrow AI.'}},
        {id:'llm',title:'Large Language Models',rt:'3 min',content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>LLMs</strong> (Large Language Models) power AI assistants like ChatGPT, Copilot, and Gemini. They are trained on massive text datasets and predict the most likely next word. Key terms: <strong>Training data</strong> = the text the model learned from. <strong>Parameters</strong> = the learned weights (billions of them). <strong>Tokens</strong> = how LLMs break text into pieces. <strong>Context window</strong> = how much text the model can consider at once. <strong>Inference</strong> = when the model generates a response. LLMs do NOT understand meaning — they identify statistical patterns in language.</div></div>`},
        {id:'applications',title:'AI applications today',rt:'2 min',content:`<p>AI is already integrated into many industries:</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Healthcare</strong>: diagnostic imaging, drug discovery, patient triage. <strong>Finance</strong>: fraud detection, algorithmic trading, credit scoring. <strong>Cybersecurity</strong>: threat detection, anomaly analysis, automated response. <strong>Customer service</strong>: chatbots, sentiment analysis, ticket routing. <strong>IT operations</strong>: predictive maintenance, log analysis, automated provisioning. <strong>Content creation</strong>: text generation, image synthesis, code completion.</div></div>`}
      ]},
      simulation:{location:'Innovation lab — Executive briefing room',narrative:`The CTO has requested an <strong>AI readiness assessment brief</strong> for the leadership team. They want to understand what AI can and can't do, which departments could benefit, and what risks to consider. You need to research, compile findings, and prepare a summary before the 4 PM meeting.`,objectives:['Research AI capabilities','Assess department readiness','Identify risks','Prepare brief','Review with CTO','Deliver presentation'],

        tools:[{id:'research',label:'Research AI',ico:'\uD83D\uDD0D',cmd:'Research current AI capabilities and limitations'},{id:'assess',label:'Assess depts',ico:'\uD83D\uDCCA',cmd:'Assess which departments would benefit from AI'},{id:'risks',label:'Risk analysis',ico:'\u26A0\uFE0F',cmd:'Identify AI risks and ethical concerns'},{id:'draft',label:'Draft brief',ico:'\uD83D\uDCDD',cmd:'Draft the executive AI readiness brief'},{id:'review',label:'CTO review',ico:'\uD83D\uDC64',cmd:'Review findings with the CTO'},{id:'radio',label:'Mentor',ico:'\uD83D\uDCE1',cmd:'Call AI mentor for guidance'}],
        responseMap:[{keys:['research','capabilities','limitations','what can','current ai'],resp:'research'},{keys:['assess','department','benefit','use case','opportunity','which team'],resp:'assess'},{keys:['risk','ethical','bias','privacy','concern','danger','problem'],resp:'risks'},{keys:['draft','brief','compile','prepare','summary','write','document'],resp:'draft'},{keys:['review','cto','feedback','check','validate','approve'],resp:'review'},{keys:['deliver','present','meeting','leadership','final','submit'],resp:'deliver'},{keys:['mentor','help','guidance','advice'],resp:'mentor'}],
        responses:{research:{sn:'system',msg:'AI capabilities research complete. <strong>Current AI excels at</strong>: pattern recognition, data analysis, content generation, language translation, code assistance. <strong>AI struggles with</strong>: reasoning about novel situations, understanding context deeply, handling ambiguity, common sense reasoning. AI is a tool — not a replacement for human judgment.',match:[0]},assess:{sn:'system',msg:'Department assessment results: <strong>Customer Support</strong> — high AI potential (chatbots, ticket routing). <strong>IT Operations</strong> — high potential (log analysis, monitoring). <strong>Marketing</strong> — medium potential (content drafting, analytics). <strong>Legal</strong> — low potential initially (high risk, needs human review). <strong>HR</strong> — medium potential (resume screening, scheduling).',match:[1]},risks:{sn:'system',msg:'Risk analysis: <strong>1)</strong> Data privacy — AI tools may send data to external servers. <strong>2)</strong> Bias — AI can inherit biases from training data. <strong>3)</strong> Hallucinations — AI generates confident but incorrect information. <strong>4)</strong> Over-reliance — employees may stop verifying AI outputs. <strong>5)</strong> Compliance — GDPR, HIPAA may restrict AI use with sensitive data.',match:[2]},draft:{sn:'system',msg:'Executive brief drafted: <strong>3-page summary</strong> covering AI capabilities, department opportunities ranked by impact/risk, ethical framework recommendation, phased implementation plan (pilot → expand → optimize), and budget estimate for AI tool licensing.',match:[3]},review:{sn:'system',msg:'CTO feedback: <strong>"Solid analysis. Add a section on competitor AI adoption — the board will ask. Also clarify the data privacy policy before we recommend any specific tools."</strong> Brief updated with competitive landscape and privacy guardrails.',match:[4]},deliver:{sn:'success',msg:'Presentation delivered to leadership team. <strong>Well received</strong> — CTO approved a 90-day AI pilot program starting with Customer Support and IT Operations. You\'ve been assigned as the AI integration lead. <strong>AI-1001 complete.</strong>',match:[5]},mentor:{sn:'dispatch',msg:'Focus on business impact, not technical details. Executives want to know: what does AI save us? What are the risks? Start with research, then build the case.',match:[]},unknown:{sn:'dispatch',msg:'Try researching AI capabilities first, then assess departments, identify risks, and compile your brief.',match:[]}}

    // Chapter 2 — Prompt Engineering
    {num:2,title:'Prompt engineering fundamentals',location:'Innovation lab — AI workstation',floor:1,ticket:'AI-1015',mission:'Customer support team needs AI prompt templates — build and test them',priority:'Priority 2 — Urgent',free:false,desc:'Writing effective prompts, prompt structure, context, constraints, and iterating on outputs.',examDomain:'Domain 2: AI in Practice',
      studyGuide:{docId:'DOC-AI-0200',subtitle:'Crafting effective prompts for AI assistants to get accurate, useful outputs.',sections:[
        {id:'structure',title:'Prompt structure',rt:'3 min',content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t">A good prompt has: <strong>1) Role/Persona</strong> — tell the AI who it is ("You are a senior network engineer"). <strong>2) Task</strong> — what you want done ("Write a troubleshooting guide"). <strong>3) Context</strong> — background information ("for a small business with 50 users"). <strong>4) Constraints</strong> — limits and format ("in under 200 words, bullet points"). <strong>5) Examples</strong> — show the format you want. Better prompts = better outputs. Vague prompts get vague answers.</div></div>`,quiz:{q:'Which prompt component tells the AI what perspective to adopt?',opts:[{l:'A',t:'Task',c:false},{l:'B',t:'Context',c:false},{l:'C',t:'Role/Persona',c:true},{l:'D',t:'Constraints',c:false}],right:'The Role/Persona component sets the AI\'s perspective (e.g., "You are a cybersecurity analyst"). This helps the AI tailor its response to the appropriate expertise level and vocabulary.',wrong:'Role/Persona tells the AI what perspective to adopt. Task is what to do. Context is background. Constraints are limits.'}},
        {id:'techniques',title:'Advanced techniques',rt:'3 min',content:`<p>Beyond basic prompting:</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Chain-of-thought</strong>: ask AI to "think step by step" for complex reasoning. <strong>Few-shot prompting</strong>: provide 2-3 examples of desired input→output. <strong>Zero-shot</strong>: no examples, just instructions. <strong>Temperature</strong>: controls randomness (low = precise, high = creative). <strong>Iteration</strong>: refine prompts based on output — prompt engineering is a conversation, not a one-shot.</div></div>`},
        {id:'pitfalls',title:'Common prompt pitfalls',rt:'2 min',content:`<p>Avoid these mistakes: <strong>1)</strong> Being too vague ("write something about AI"). <strong>2)</strong> Not specifying format (get an essay when you wanted bullet points). <strong>3)</strong> Assuming AI has current knowledge (training data has cutoff dates). <strong>4)</strong> Not verifying outputs (AI hallucinations look confident). <strong>5)</strong> Sharing sensitive data in prompts (it may be stored or used for training).</p>`}
      ]},
      simulation:{location:'Innovation lab — AI workstation',narrative:`The customer support team wants to use AI to help draft responses to common tickets. You need to <strong>build, test, and refine prompt templates</strong> that support agents can use. The templates must be accurate, professional, and include guardrails against bad outputs.`,objectives:['Analyze ticket types','Draft prompt templates','Test outputs','Refine prompts','Add guardrails','Deploy to team'],
        rackLayout:[{label:'Draft',units:[{t:'srv',leds:['a','g']},{t:'srv',leds:['g','g']},{t:'empty'}],status:'crit'},{label:'Test',units:[{t:'srv',leds:['g','a']},{t:'srv',leds:['g','g']},{t:'empty'}],status:'ok'},{label:'Deploy',units:[{t:'srv',leds:['g','g']},{t:'srv',leds:['g','g']},{t:'empty'}],status:'ok'}],
        checklist:[{id:0,text:'Analyze common support ticket categories',keys:['analyze','ticket','categories','common','types','support']},{id:1,text:'Draft initial prompt templates',keys:['draft','prompt','template','write','create','initial']},{id:2,text:'Test prompts against real ticket examples',keys:['test','real','example','try','output','generate']},{id:3,text:'Refine prompts based on test results',keys:['refine','improve','iterate','adjust','fix','better']},{id:4,text:'Add safety guardrails to prevent bad outputs',keys:['guardrail','safety','prevent','limit','restrict','filter']},{id:5,text:'Deploy templates to support team',keys:['deploy','team','roll out','distribute','share','launch']}],
        tools:[{id:'analyze',label:'Analyze tickets',ico:'\uD83D\uDCCB',cmd:'Analyze common support ticket categories'},{id:'draft',label:'Draft prompts',ico:'\u270D\uFE0F',cmd:'Draft initial prompt templates for support'},{id:'test',label:'Test outputs',ico:'\uD83E\uDDEA',cmd:'Test prompts against real ticket examples'},{id:'refine',label:'Refine',ico:'\uD83D\uDD27',cmd:'Refine and improve prompt templates'},{id:'guard',label:'Add guardrails',ico:'\uD83D\uDEE1\uFE0F',cmd:'Add safety guardrails to prompts'},{id:'radio',label:'Mentor',ico:'\uD83D\uDCE1',cmd:'Call AI mentor'}],
        responseMap:[{keys:['analyze','ticket','categories','common','types','support'],resp:'analyze'},{keys:['draft','prompt','template','write','create'],resp:'draft'},{keys:['test','real','example','try','output','generate'],resp:'test'},{keys:['refine','improve','iterate','adjust','fix','better'],resp:'refine'},{keys:['guardrail','safety','prevent','limit','restrict','filter'],resp:'guard'},{keys:['deploy','team','roll out','distribute','share','launch'],resp:'deploy'},{keys:['mentor','help','guidance'],resp:'mentor'}],
        responses:{analyze:{sn:'system',msg:'Ticket analysis complete. Top categories: <strong>1)</strong> Password resets (32%). <strong>2)</strong> Software installation requests (21%). <strong>3)</strong> Connectivity issues (18%). <strong>4)</strong> Hardware replacement (15%). <strong>5)</strong> General how-to questions (14%). Password resets and how-to questions are ideal for AI-assisted responses.',match:[0]},draft:{sn:'system',msg:'Prompt templates drafted. Example: <strong>"You are a friendly IT support agent. The user has submitted a [ticket_type] ticket. Draft a professional response that: 1) Acknowledges their issue, 2) Provides step-by-step resolution, 3) Offers to escalate if unresolved. Keep the tone helpful and under 150 words."</strong>',match:[1]},test:{sn:'system',msg:'Test results: Password reset template — <strong>92% accurate</strong>, responses are professional and clear. Connectivity template — <strong>78% accurate</strong>, some responses suggest steps that don\'t match our network setup. How-to template — <strong>85% accurate</strong>, occasionally references wrong software versions.',match:[2]},refine:{sn:'system',msg:'Refined templates: Added <strong>company-specific context</strong> (VPN name, software versions, network details) to each prompt. Connectivity template now at <strong>94% accuracy</strong>. Added "If unsure, say: I\'ll escalate this to a senior technician" to reduce hallucination risk.',match:[3]},guard:{sn:'system',msg:'Guardrails added: <strong>1)</strong> "Never share internal passwords or credentials." <strong>2)</strong> "Do not guarantee resolution timeframes." <strong>3)</strong> "If the issue involves data loss, always recommend speaking to a live agent." <strong>4)</strong> "Do not provide medical, legal, or financial advice." <strong>5)</strong> Output length capped at 200 words.',match:[4]},deploy:{sn:'success',msg:'Templates deployed to the support team via shared workspace. <strong>Training session completed</strong> — agents understand how to use templates, when to override AI suggestions, and how to report bad outputs. <strong>AI-1015 complete.</strong>',match:[5]},mentor:{sn:'dispatch',msg:'Start by understanding what kinds of tickets come in. Then build prompts tailored to each type. Always test before deploying.',match:[]},unknown:{sn:'dispatch',msg:'Analyze the ticket types first, then draft prompt templates tailored to each category.',match:[]}}
      }

    // Chapter 3 — AI Ethics, Bias & Privacy
    {num:3,title:'AI ethics, bias & privacy',location:'Innovation lab — Compliance office',floor:1,ticket:'AI-1028',mission:'HR flagged bias in AI resume screener — investigate and fix',priority:'Priority 1 — Critical',free:false,desc:'Ethical AI use, algorithmic bias, data privacy, transparency, and responsible deployment.',examDomain:'Domain 3: AI Ethics',
      studyGuide:{docId:'DOC-AI-0300',subtitle:'Understanding bias in AI, ethical frameworks, privacy regulations, and responsible AI deployment.',sections:[
        {id:'bias',title:'AI bias',rt:'3 min',content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>AI bias</strong> occurs when training data reflects existing prejudices. Types: <strong>Selection bias</strong> — training data doesn't represent all groups. <strong>Confirmation bias</strong> — model reinforces existing patterns. <strong>Historical bias</strong> — past discrimination encoded in data. Example: a hiring AI trained on historical data may discriminate against women if past hires were predominantly male. <strong>Mitigation</strong>: diverse training data, regular bias audits, human oversight of AI decisions, fairness metrics.</div></div>`,quiz:{q:'An AI hiring tool rejects qualified candidates from certain demographics. This is most likely caused by:',opts:[{l:'A',t:'Overfitting',c:false},{l:'B',t:'Bias in the training data',c:true},{l:'C',t:'Insufficient computing power',c:false},{l:'D',t:'A too-small context window',c:false}],right:'If the training data reflects historical hiring biases (e.g., mostly hired one demographic), the AI will learn and replicate those patterns. The fix is diverse training data and bias auditing.',wrong:'AI bias comes from biased training data. The model learns patterns from historical data — if that data is biased, the outputs will be too.'}},
        {id:'ethics',title:'Ethical frameworks',rt:'3 min',content:`<p>Responsible AI principles:</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Transparency</strong> — users should know when they're interacting with AI. <strong>Accountability</strong> — humans must be responsible for AI decisions. <strong>Fairness</strong> — AI should not discriminate against protected groups. <strong>Privacy</strong> — AI must handle personal data according to regulations (GDPR, HIPAA). <strong>Explainability</strong> — stakeholders should understand how AI reached a decision ("black box" problem). <strong>Human oversight</strong> — critical decisions should always have a human in the loop.</div></div>`},
        {id:'privacy',title:'AI and data privacy',rt:'2 min',content:`<p>Privacy concerns with AI tools: <strong>1)</strong> Data sent to AI services may be stored or used for model training. <strong>2)</strong> Sensitive data (PII, PHI, financial) should never be entered into public AI tools without approval. <strong>3)</strong> Enterprise AI solutions offer data isolation and compliance controls. <strong>4)</strong> Always check the AI vendor's data handling policy. <strong>5)</strong> GDPR gives users the right to explanation for automated decisions.</p>`}
      ]},
      simulation:{location:'Innovation lab — HR compliance review',narrative:`HR has flagged that the new AI-powered <strong>resume screening tool is rejecting qualified candidates</strong> from underrepresented groups at a higher rate than others. Legal is concerned about discrimination liability. You need to <strong>investigate the bias, document findings, and implement a fix</strong> before the tool can be used again.`,objectives:['Audit AI screening results','Identify bias patterns','Review training data','Implement bias corrections','Test corrected model','Document findings for legal'],
        rackLayout:[{label:'Audit',units:[{t:'srv',leds:['r','a']},{t:'srv',leds:['a','g']},{t:'empty'}],status:'crit'},{label:'Analysis',units:[{t:'srv',leds:['g','g']},{t:'srv',leds:['g','g']},{t:'empty'}],status:'ok'},{label:'Remediate',units:[{t:'srv',leds:['g','g']},{t:'srv',leds:['g','g']},{t:'empty'}],status:'ok'}],
        checklist:[{id:0,text:'Audit AI screening results for demographic patterns',keys:['audit','screening','results','demographic','patterns','review']},{id:1,text:'Identify specific bias in the model',keys:['identify','bias','specific','what','cause','why']},{id:2,text:'Review the training data for representational gaps',keys:['training data','representational','gaps','dataset','review data','source']},{id:3,text:'Implement fairness corrections',keys:['implement','correct','fix','fairness','adjust','debias']},{id:4,text:'Test corrected model against diverse candidates',keys:['test','diverse','corrected','validate','verify','rerun']},{id:5,text:'Document findings and remediation for legal',keys:['document','legal','findings','report','compliance','write up']}],
        tools:[{id:'audit',label:'Audit results',ico:'\uD83D\uDCCA',cmd:'Audit AI screening results for demographic patterns'},{id:'identify',label:'Find bias',ico:'\uD83D\uDD0D',cmd:'Identify specific bias source in the model'},{id:'data',label:'Review data',ico:'\uD83D\uDDC2\uFE0F',cmd:'Review training data for representation gaps'},{id:'fix',label:'Apply fix',ico:'\uD83D\uDD27',cmd:'Implement fairness corrections to the model'},{id:'test',label:'Test model',ico:'\uD83E\uDDEA',cmd:'Test corrected model against diverse candidate pool'},{id:'radio',label:'Mentor',ico:'\uD83D\uDCE1',cmd:'Call AI mentor'}],
        responseMap:[{keys:['audit','screening','results','demographic','patterns','review results'],resp:'audit'},{keys:['identify','bias','specific','cause','why','source'],resp:'identify'},{keys:['training data','representational','gaps','dataset','review data','source data'],resp:'data'},{keys:['implement','correct','fix','fairness','adjust','debias','apply'],resp:'fix'},{keys:['test','diverse','corrected','validate','verify','rerun'],resp:'test'},{keys:['document','legal','findings','report','compliance','write'],resp:'document'},{keys:['mentor','help','guidance'],resp:'mentor'}],
        responses:{audit:{sn:'system',msg:'Audit results: <strong>68% acceptance rate for Group A</strong> vs <strong>41% for Group B</strong> with equivalent qualifications. The disparity is statistically significant. The model is clearly producing biased outcomes across demographic lines.',match:[0]},identify:{sn:'system',msg:'Bias source identified: The model weighs <strong>"university prestige"</strong> and <strong>"previous employer brand"</strong> heavily — both correlate with socioeconomic status and historical access disparities. It also penalizes resume gaps, disproportionately affecting caregivers.',match:[1]},data:{sn:'system',msg:'Training data analysis: Dataset contains <strong>5 years of historical hiring decisions</strong>. Group A represents 78% of past hires. The model learned to replicate existing hiring patterns — including their biases. Training data lacks diversity in successful candidate profiles.',match:[2]},fix:{sn:'system',msg:'Corrections applied: <strong>1)</strong> Removed university name and employer brand as ranking features. <strong>2)</strong> Added skills-based matching weighted equally. <strong>3)</strong> Neutralized resume gap penalties. <strong>4)</strong> Rebalanced training data with synthetic diverse examples. <strong>5)</strong> Added fairness constraint: acceptance rate variance between groups must be <5%.',match:[3]},test:{sn:'system',msg:'Corrected model results: <strong>Group A acceptance: 62%</strong>, <strong>Group B acceptance: 59%</strong> — within 5% fairness threshold. Qualification scores are now the primary differentiator. No statistically significant demographic bias detected.',match:[4]},document:{sn:'success',msg:'Legal report filed: documented original bias, root cause, corrective actions, and validation results. Recommended <strong>quarterly bias audits</strong> and <strong>human review of all AI rejections</strong> as ongoing safeguards. Legal approved tool reactivation with guardrails. <strong>AI-1028 complete.</strong>',match:[5]},mentor:{sn:'dispatch',msg:'Bias in AI is serious — start by auditing the actual outcomes, then trace back to the training data. Fix the data, fix the model.',match:[]},unknown:{sn:'dispatch',msg:'Start by auditing the screening results to see if there are demographic patterns in the outcomes.',match:[]}}
      }
    },
    // Chapter 4 — Machine Learning Basics
    {num:4,title:'Machine learning fundamentals',location:'Innovation lab — ML workbench',floor:2,floorName:'AI Technologies',ticket:'AI-1042',mission:'Sales team needs a customer churn prediction model — build and validate it',priority:'Priority 2 — Urgent',free:false,desc:'Supervised vs unsupervised learning, training data, models, overfitting, and validation.',examDomain:'Domain 1: AI Concepts',
      studyGuide:{docId:'DOC-AI-0400',subtitle:'Core machine learning concepts, model types, training processes, and evaluation.',sections:[
        {id:'types',title:'Types of machine learning',rt:'3 min',content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Supervised learning</strong> = model learns from labeled data (input→known output). Used for: classification (spam/not spam), regression (predict a number). <strong>Unsupervised learning</strong> = model finds patterns in unlabeled data. Used for: clustering (group similar customers), anomaly detection. <strong>Reinforcement learning</strong> = model learns by trial and error with rewards/penalties. Used for: game AI, robotics, optimization.</div></div>`,quiz:{q:'A model is trained to predict house prices based on historical sales data with known prices. This is an example of:',opts:[{l:'A',t:'Unsupervised learning',c:false},{l:'B',t:'Reinforcement learning',c:false},{l:'C',t:'Supervised learning',c:true},{l:'D',t:'Transfer learning',c:false}],right:'Supervised learning uses labeled data — the model learns the relationship between features (size, location) and the known output (price). It then predicts prices for new houses.',wrong:'Labeled data (known prices) = supervised learning. Unsupervised finds patterns without labels. Reinforcement uses rewards/penalties.'}},
        {id:'process',title:'Training process',rt:'3 min',content:`<p>How a model learns:</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>1) Collect data</strong> → clean and prepare it. <strong>2) Split data</strong> → training set (70-80%) and test set (20-30%). <strong>3) Choose algorithm</strong> → decision tree, neural network, etc. <strong>4) Train model</strong> → model finds patterns in training data. <strong>5) Evaluate</strong> → test on held-out data. <strong>6) Tune</strong> → adjust parameters to improve. <strong>Overfitting</strong> = model memorizes training data but fails on new data (too complex). <strong>Underfitting</strong> = model is too simple to capture patterns.</div></div>`},
        {id:'evaluation',title:'Model evaluation',rt:'2 min',content:`<p>How to measure if a model is good: <strong>Accuracy</strong> = % correct overall. <strong>Precision</strong> = of predicted positives, how many were actually positive. <strong>Recall</strong> = of actual positives, how many did we catch. <strong>F1 Score</strong> = balance of precision and recall. For business decisions, also consider: false positive cost vs false negative cost.</p>`}
      ]},

    // Chapter 5 — Data Fundamentals for AI
    {num:5,title:'Data fundamentals for AI',location:'Innovation lab — Data warehouse',floor:2,ticket:'AI-1056',mission:'Marketing data is messy — clean and prepare it for AI analysis',priority:'Priority 2 — Urgent',free:false,desc:'Data types, data quality, preprocessing, feature engineering, and data governance.',examDomain:'Domain 1: AI Concepts',
      studyGuide:{docId:'DOC-AI-0500',subtitle:'Understanding data quality, preparation, and governance for AI systems.',sections:[
        {id:'datatypes',title:'Data types for AI',rt:'3 min',content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Structured data</strong> = organized in rows/columns (databases, spreadsheets). Easy for AI to process. <strong>Unstructured data</strong> = no predefined format (emails, images, audio, social media posts). Requires preprocessing. <strong>Semi-structured</strong> = has some organization (JSON, XML, log files). <strong>Labeled data</strong> = has known correct answers (needed for supervised learning). <strong>Unlabeled data</strong> = no tags (used for unsupervised learning). Most real-world data is unstructured — and it's growing exponentially.</div></div>`},
        {id:'quality',title:'Data quality & preprocessing',rt:'3 min',content:`<p>AI outputs are only as good as the input data:</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Garbage in = garbage out</strong>. Data quality issues: <strong>Missing values</strong> — fill with averages, drop rows, or flag. <strong>Duplicates</strong> — identify and remove. <strong>Outliers</strong> — investigate (error or legitimate?). <strong>Inconsistent formats</strong> — standardize (dates, units, naming). <strong>Feature engineering</strong> = creating new useful fields from existing data (e.g., "days since last purchase" from purchase date).</div></div>`,quiz:{q:'A dataset has 15% missing values in a critical column. What is the BEST first step?',opts:[{l:'A',t:'Delete all rows with missing values',c:false},{l:'B',t:'Fill all missing values with zero',c:false},{l:'C',t:'Investigate why the data is missing',c:true},{l:'D',t:'Ignore the missing values',c:false}],right:'First understand WHY data is missing — is it random, systematic, or a data collection error? The cause determines the right fix. Blindly deleting or filling can introduce bias.',wrong:'Always investigate the cause first. Missing data might indicate a systematic issue that needs fixing at the source.'}},
        {id:'governance',title:'Data governance',rt:'2 min',content:`<p>Managing data responsibly: <strong>Data governance</strong> = policies for how data is collected, stored, used, and shared. Key principles: <strong>Data minimization</strong> — only collect what you need. <strong>Purpose limitation</strong> — use data only for stated purposes. <strong>Retention policies</strong> — don't keep data longer than necessary. <strong>Access controls</strong> — limit who can see sensitive data. <strong>Compliance</strong> — follow GDPR, HIPAA, CCPA requirements.</p>`}
      ]},

        responses:{audit:{sn:'system',msg:'Data audit results: <strong>45,000 records</strong>. Issues found: <strong>3,200 exact duplicates</strong> (7.1%), <strong>8,400 records with missing email</strong> (18.7%), phone formats inconsistent (mix of dashes, dots, spaces), dates in 3 different formats, and state field uses both abbreviations and full names.',match:[0]},dedup:{sn:'system',msg:'Deduplication complete: <strong>3,200 exact duplicates removed</strong>. Additionally found <strong>890 fuzzy matches</strong> (same person, slightly different spelling) — merged into single records keeping most recent data. Dataset now: <strong>40,910 unique records</strong>.',match:[1]},missing:{sn:'system',msg:'Missing value analysis: <strong>Email missing</strong> — these are in-store customers, filled with "in_store_only" flag instead of deleting. <strong>Purchase amount missing</strong> (2.1%) — filled with median value for their customer segment. <strong>Zip code missing</strong> (0.8%) — derived from city/state where possible, flagged remainder.',match:[2]},format:{sn:'system',msg:'Standardization applied: All phones now in <strong>(XXX) XXX-XXXX</strong> format. Dates converted to <strong>YYYY-MM-DD</strong>. States converted to <strong>2-letter abbreviations</strong>. Names trimmed and title-cased. Currency values rounded to 2 decimal places. Categorical values lowercased and whitespace-trimmed.',match:[3]},feature:{sn:'system',msg:'New features engineered: <strong>1)</strong> days_since_last_purchase. <strong>2)</strong> average_order_value. <strong>3)</strong> purchase_frequency (orders per month). <strong>4)</strong> customer_lifetime_value. <strong>5)</strong> engagement_score (based on email opens + site visits). These give the AI model much richer signals than raw data.',match:[4]},validate:{sn:'success',msg:'Final validation: <strong>40,910 clean records</strong>, 0 duplicates, <0.5% missing values (all handled), consistent formats, 5 new features. Dataset exported to AI pipeline. Marketing\'s customer segmentation model can now run on reliable data. <strong>AI-1056 complete.</strong>',match:[5]},mentor:{sn:'dispatch',msg:'Data prep is 80% of any AI project. Start with an audit to understand what\'s wrong, then systematically fix each issue.',match:[]},unknown:{sn:'dispatch',msg:'Start by auditing the data to see what quality issues exist. You need to understand the problems before fixing them.',match:[]}}
      }
    },
    // Chapter 6 — AI in the Workplace
    {num:6,title:'AI in the workplace',location:'Innovation lab — Operations center',floor:2,ticket:'AI-1070',mission:'IT department wants to automate ticket triage with AI — implement it',priority:'Priority 2 — Urgent',free:false,desc:'AI workflow automation, productivity tools, AI-assisted decision making, and change management.',examDomain:'Domain 2: AI in Practice',
      studyGuide:{docId:'DOC-AI-0600',subtitle:'Practical AI integration in business processes, automation opportunities, and change management.',sections:[
        {id:'automation',title:'AI workflow automation',rt:'3 min',content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t">AI can automate: <strong>Repetitive tasks</strong> — data entry, report generation, email sorting. <strong>Classification</strong> — ticket routing, document categorization, spam filtering. <strong>Summarization</strong> — meeting notes, document summaries, email digests. <strong>Content generation</strong> — draft responses, code suggestions, template filling. When implementing AI automation, ask: <strong>1)</strong> Is the task repetitive? <strong>2)</strong> Is there training data available? <strong>3)</strong> Is the cost of errors acceptable? <strong>4)</strong> Will humans review the output?</div></div>`},
        {id:'tools',title:'AI productivity tools',rt:'3 min',content:`<p>Common AI tools in the workplace:</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Microsoft Copilot</strong> — integrated into Office 365 for document drafting, spreadsheet analysis, presentation creation. <strong>ChatGPT/Claude</strong> — general-purpose AI assistants for research, writing, coding. <strong>GitHub Copilot</strong> — AI code completion for developers. <strong>Grammarly</strong> — AI writing assistant. <strong>Notion AI</strong> — workspace AI for notes and docs. Key principle: AI tools <strong>assist</strong> human workers — they don't replace the need for expertise and judgment.</div></div>`,quiz:{q:'A company wants to use AI to automatically respond to all customer complaints without any human review. What is the BIGGEST risk?',opts:[{l:'A',t:'The AI will be too slow',c:false},{l:'B',t:'AI may generate inappropriate or inaccurate responses',c:true},{l:'C',t:'AI tools are too expensive for this',c:false},{l:'D',t:'Customers prefer talking to AI',c:false}],right:'Without human review, AI may generate responses that are factually wrong (hallucinations), insensitive, or off-brand. Customer complaints are high-stakes — always have human oversight for sensitive communications.',wrong:'AI without human oversight can generate inaccurate, insensitive, or off-brand responses. High-stakes communications need human review.'}},
        {id:'change',title:'Change management for AI',rt:'2 min',content:`<p>Introducing AI into a workplace requires change management: <strong>1)</strong> Communicate WHY — help employees understand AI is a tool, not a replacement. <strong>2)</strong> Train — provide hands-on training with the specific AI tools. <strong>3)</strong> Start small — pilot in one department before rolling out company-wide. <strong>4)</strong> Measure — track metrics before and after AI implementation. <strong>5)</strong> Iterate — gather feedback and adjust. Resistance is normal — address fears directly and show how AI makes jobs easier, not obsolete.</p>`}
      ]},

e deployed to production. <strong>Results after first week:</strong> 93.5% routing accuracy, 2.1 hours/day freed for senior tech, average response time down 34%, zero missed critical tickets. The model improves daily as corrections feed back into training. <strong>AI-1070 complete.</strong>',match:[5]},mentor:{sn:'dispatch',msg:'Map the current process first — you need to know what you\'re replacing. Then configure, train, test, and always keep humans in the loop.',match:[]},unknown:{sn:'dispatch',msg:'Start by understanding the current ticket routing workflow before trying to automate it.',match:[]}}

    // Chapter 7 — AI Limitations & Hallucinations
    {num:7,title:'AI limitations & critical evaluation',location:'Innovation lab — QA testing room',floor:2,ticket:'AI-1085',mission:'Legal team used AI for contract review — found errors. Investigate and create safeguards',priority:'Priority 1 — Critical',free:false,desc:'AI hallucinations, confabulation, knowledge limitations, and output verification strategies.',examDomain:'Domain 3: AI Ethics',
      studyGuide:{docId:'DOC-AI-0700',subtitle:'Understanding what AI gets wrong, why it fails, and how to verify outputs.',sections:[
        {id:'hallucinations',title:'AI hallucinations',rt:'3 min',content:`<div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>AI hallucination</strong> = when AI generates information that sounds confident and plausible but is factually incorrect. Also called <strong>confabulation</strong>. Common examples: citing fake research papers, inventing statistics, creating fictional legal precedents, generating incorrect code that looks correct. <strong>Why it happens</strong>: LLMs predict the most likely next word — they don't verify facts. They have no concept of "truth." <strong>The danger</strong>: hallucinations look identical to correct outputs — you can't tell by reading alone.</div></div>`,quiz:{q:'An AI assistant confidently cites a research paper that doesn\'t exist. This is called:',opts:[{l:'A',t:'Overfitting',c:false},{l:'B',t:'A hallucination',c:true},{l:'C',t:'Bias',c:false},{l:'D',t:'Underfitting',c:false}],right:'AI hallucinations occur when the model generates plausible-sounding but fabricated information. LLMs predict likely text patterns — they don\'t verify facts. Always verify AI claims against primary sources.',wrong:'Fabricated but confident AI outputs are called hallucinations. The model predicted what a citation "should look like" without checking if it exists.'}},
        {id:'limits',title:'Knowledge limitations',rt:'3 min',content:`<p>What AI cannot do reliably:</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Real-time information</strong> — AI training data has a cutoff date. It doesn't know today's news. <strong>Math</strong> — LLMs struggle with complex calculations (they predict text, not compute). <strong>Reasoning about novel situations</strong> — AI applies patterns, not true understanding. <strong>Common sense</strong> — AI may miss obvious logical conclusions. <strong>Personal/private data</strong> — AI doesn't have access to your files unless you provide them. <strong>Predicting the future</strong> — AI finds patterns in past data but can't account for unprecedented events.</div></div>`},
        {id:'verification',title:'Output verification',rt:'2 min',content:`<p>How to verify AI outputs: <strong>1)</strong> Cross-reference with primary sources. <strong>2)</strong> Check citations — do they actually exist? <strong>3)</strong> Have domain experts review outputs. <strong>4)</strong> Test code in a sandbox before deploying. <strong>5)</strong> Run fact-checks on statistics and claims. <strong>6)</strong> Use multiple AI tools and compare outputs. Golden rule: <strong>trust but verify</strong> — use AI to draft, use humans to validate.</p>`}
      ]},
      simulation:{location:'Innovation lab — Legal & QA review',narrative:`The legal team used an AI assistant to <strong>review 50 vendor contracts</strong> and generate a compliance summary. The CLO (Chief Legal Officer) found <strong>3 fabricated legal references and 2 incorrect regulatory citations</strong> in the AI output. The board is concerned. You need to <strong>investigate what went wrong, assess the damage, and implement safeguards</strong>.`,objectives:['Audit all AI-generated legal outputs','Identify hallucinated content','Assess potential legal exposure','Build verification workflow','Test new safeguards','Present remediation to leadership'],

ate on known hallucinations.</strong>',match:[4]},present:{sn:'success',msg:'Remediation presented to leadership: Error caught early, no business impact. New workflow implemented with automated citation checking + mandatory human review. AI contract review can continue with safeguards — estimated to still save <strong>60% of manual review time</strong> while catching hallucinations. Board approved continued AI use with guardrails. <strong>AI-1085 complete.</strong>',match:[5]},mentor:{sn:'dispatch',msg:'This is why human oversight matters. AI can draft — but humans must verify. Build a process that catches hallucinations before they cause damage.',match:[]},unknown:{sn:'dispatch',msg:'Start by auditing all 50 contracts to understand the scope of the problem.',match:[]}}

      studyGuide:{docId:'DOC-AI-0800',subtitle:'Final review of all AI Essentials concepts.',sections:[
        {id:'review',title:'Final review',rt:'5 min',content:`<p>This final mission tests everything you've learned:</p><div class="kc"><div class="kc-l">Key concept — Full review</div><div class="kc-t"><strong>AI Concepts</strong>: ML types, LLMs, training data, model evaluation. <strong>Prompt Engineering</strong>: structure, techniques, iteration, guardrails. <strong>Ethics</strong>: bias detection, privacy, transparency, accountability. <strong>Data</strong>: quality, preprocessing, governance, feature engineering. <strong>Workplace AI</strong>: automation, tools, change management, human oversight. <strong>Limitations</strong>: hallucinations, verification, knowledge cutoffs, appropriate use cases. Remember: AI is a powerful tool that requires <strong>human judgment, ethical awareness, and continuous verification</strong>.</div></div>`}
