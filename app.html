<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CertOps Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>:root {
  --bg:#080b10;--panel:#0e1219;--panel2:#131925;--border:#1a2030;
  --cyan:#38bdf8;--green:#34d399;--amber:#fbbf24;--red:#f87171;
  --purple:#a78bfa;--orange:#fb923c;
  --text1:#e8eaed;--text2:#8b95a5;--dim:#3e4a5c;
  --glow-cyan:rgba(56,189,248,0.15);--glow-green:rgba(52,211,153,0.12);
  --glow-amber:rgba(251,191,36,0.12);--glow-purple:rgba(167,139,250,0.12);
  --glow-red:rgba(248,113,113,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;}
a{color:var(--cyan);text-decoration:none;cursor:pointer;}
.app{max-width:760px;margin:0 auto;padding:10px 12px 40px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideMsg{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(56,189,248,0.3)}50%{box-shadow:0 0 20px rgba(56,189,248,0.6)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes starBounce{0%{transform:scale(0)rotate(-30deg);opacity:0}70%{transform:scale(1.2)rotate(5deg)}100%{transform:scale(1)rotate(0);opacity:1}}
@keyframes barGrow{from{width:0}}
@keyframes glowPulse{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes troublePulse{0%,100%{box-shadow:0 0 8px rgba(248,113,113,0.1)}50%{box-shadow:0 0 16px rgba(248,113,113,0.25)}}

/* === HUD === */
.hud{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;flex-wrap:wrap;}
.hud-role{display:flex;align-items:center;gap:8px;}
.hud-avatar{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,#1e3a5f,#0e1f38);border:1px solid rgba(56,189,248,0.3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hud-info .name{font-size:12px;font-weight:600;line-height:1.2;}
.hud-info .rank{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan);}
.hud-stats{display:flex;gap:12px;margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;}
.hud-stat{display:flex;align-items:center;gap:4px;}
.hud-stat .dot{width:6px;height:6px;border-radius:50%;}

/* === HOME SCREEN === */
.home-header{text-align:center;padding:32px 16px 24px;}
.home-logo{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px;}
.home-logo .accent{color:var(--cyan);}
.home-sub{font-size:14px;color:var(--text2);}
.home-user{margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);}
.home-user .plan{color:var(--amber);text-transform:uppercase;letter-spacing:1px;}
.track-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
.track-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.track-card:hover{border-color:rgba(56,189,248,0.3);transform:translateX(4px);}
.track-top{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.track-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.track-icon.aplus{background:linear-gradient(135deg,rgba(56,189,248,0.12),rgba(56,189,248,0.04));border:1px solid rgba(56,189,248,0.2);}
.track-icon.netplus{background:linear-gradient(135deg,rgba(52,211,153,0.12),rgba(52,211,153,0.04));border:1px solid rgba(52,211,153,0.2);}
.track-icon.secplus{background:linear-gradient(135deg,rgba(248,113,113,0.12),rgba(248,113,113,0.04));border:1px solid rgba(248,113,113,0.2);}
.track-icon.aiess{background:linear-gradient(135deg,rgba(167,139,250,0.12),rgba(167,139,250,0.04));border:1px solid rgba(167,139,250,0.2);}
.track-info h3{font-size:16px;font-weight:600;margin-bottom:2px;}
.track-info .track-role{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--cyan);}
.track-desc{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:12px;}
.track-progress{display:flex;align-items:center;gap:10px;}
.tp-bar{flex:1;height:4px;background:rgba(56,189,248,0.1);border-radius:2px;overflow:hidden;}
.tp-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.tp-fill.aplus{background:var(--cyan);}
.tp-fill.netplus{background:var(--green);}
.tp-fill.secplus{background:var(--red);}
.tp-fill.aiess{background:var(--purple);}
.tp-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);white-space:nowrap;}
.track-free{position:absolute;top:12px;right:14px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--green);background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.15);padding:3px 8px;border-radius:4px;}
.upgrade-banner{background:linear-gradient(135deg,rgba(251,191,36,0.06),rgba(56,189,248,0.04));border:1px solid rgba(251,191,36,0.2);border-radius:10px;padding:16px;text-align:center;margin-bottom:16px;}
.upgrade-banner h3{font-size:14px;font-weight:600;margin-bottom:4px;}
.upgrade-banner p{font-size:12px;color:var(--text2);margin-bottom:10px;}
.btn-upgrade{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);color:var(--amber);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;padding:8px 24px;border-radius:6px;cursor:pointer;transition:all .2s;}
.btn-upgrade:hover{background:rgba(251,191,36,0.18);}

/* === TOP BAR === */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;}
.back-btn{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);cursor:pointer;display:flex;align-items:center;gap:4px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);padding:5px 12px;border-radius:6px;transition:all .2s;}
.back-btn:hover{background:rgba(56,189,248,0.16);}
.top-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.5px;}
.top-xp{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--amber);}

/* === CHAPTER MAP === */
.rank-banner{background:linear-gradient(135deg,rgba(56,189,248,0.05),rgba(167,139,250,0.04));border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:16px;}
.rb-icon{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,rgba(56,189,248,0.12),rgba(167,139,250,0.08));border:1px solid rgba(56,189,248,0.2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.rb-info{flex:1;}
.rb-info .rb-rank{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:2px;}
.rb-info .rb-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.rb-info .rb-desc{font-size:11.5px;color:var(--text2);line-height:1.5;}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.sum-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.sum-card .sn{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;}
.sum-card .sl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-top:2px;}
.overall-bar{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px;}
.ob-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;}
.ob-row span:first-child{color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:10px;}
.ob-row span:last-child{font-family:'JetBrains Mono',monospace;color:var(--cyan);}
.ob-track{height:5px;background:rgba(56,189,248,0.08);border-radius:3px;overflow:hidden;}
.ob-fill{height:100%;background:linear-gradient(90deg,var(--cyan),#0ea5e9);border-radius:3px;transition:width 1s ease;}
.ch-list{display:flex;flex-direction:column;gap:0;position:relative;padding-left:38px;}
.ch-spine{position:absolute;left:15px;top:0;bottom:0;width:2px;}
.spine-seg{position:absolute;left:0;width:2px;transition:all .5s;}
.spine-seg.done{background:var(--green);box-shadow:0 0 6px rgba(52,211,153,0.2);}
.spine-seg.active{background:var(--cyan);box-shadow:0 0 8px rgba(56,189,248,0.3);}
.spine-seg.locked{background:var(--border);}
.ch-row{position:relative;min-height:94px;margin-bottom:0;animation:slideIn .4s ease both;}
.ch-node{position:absolute;left:-38px;top:16px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;z-index:2;transition:all .3s;}
.ch-node.done{background:var(--green);color:#064e3b;box-shadow:0 0 12px rgba(52,211,153,0.3);}
.ch-node.active{background:var(--cyan);color:#0c4a6e;box-shadow:0 0 14px rgba(56,189,248,0.4);animation:pulse 2s ease infinite;}
.ch-node.locked{background:var(--border);color:#2a3040;}
.ch-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;margin-bottom:8px;}
.ch-card:hover:not(.is-locked){border-color:rgba(56,189,248,0.3);transform:translateX(4px);}
.ch-card.is-locked{opacity:0.4;cursor:default;}
.ch-card.is-locked:hover{transform:none;border-color:var(--border);}
.ch-card.is-active{border-color:rgba(56,189,248,0.35);background:linear-gradient(135deg,var(--panel),rgba(56,189,248,0.03));}
.ch-card.is-done{border-color:rgba(52,211,153,0.25);background:linear-gradient(135deg,var(--panel),rgba(52,211,153,0.04));opacity:0.85;}
.ch-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.ch-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:3px;}
.ch-tag.done{color:var(--green);background:var(--glow-green);border:1px solid rgba(52,211,153,0.2);}
.ch-tag.active{color:var(--cyan);background:var(--glow-cyan);border:1px solid rgba(56,189,248,0.2);}
.ch-tag.locked{color:var(--dim);background:rgba(62,74,92,0.12);border:1px solid rgba(62,74,92,0.15);}
.ch-tag.free{color:var(--green);background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.15);}
.ch-stars{display:flex;gap:2px;}
.ch-star{width:13px;height:13px;}
.ch-star svg{width:100%;height:100%;}
.ch-title{font-size:14px;font-weight:600;margin-bottom:2px;line-height:1.3;}
.ch-location{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--purple);margin-bottom:4px;}
.ch-desc{font-size:12px;color:var(--text2);line-height:1.5;}
.ch-meta{display:flex;align-items:center;gap:12px;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
.ch-meta .xp{color:var(--amber);}
.ch-meta .score{color:var(--green);}
.ch-new-badge{position:absolute;top:10px;right:12px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--cyan);background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);padding:2px 8px;border-radius:4px;animation:glowPulse 2s ease infinite;}
.ch-lock-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--dim);opacity:0.35;}
.floor-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:12px 0 8px 4px;display:flex;align-items:center;gap:8px;}
.floor-label::after{content:'';flex:1;height:1px;background:var(--border);}
.paywall-card{background:linear-gradient(135deg,rgba(251,191,36,0.05),rgba(56,189,248,0.03));border:1px solid rgba(251,191,36,0.2);border-radius:10px;padding:20px;text-align:center;margin:16px 0;}
.paywall-card h3{font-size:15px;font-weight:600;margin-bottom:6px;}
.paywall-card p{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.5;}

/* === STUDY GUIDE === */
.guide{animation:fadeUp .5s ease;}
.guide-banner{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.banner-top{padding:20px 20px 14px;background:linear-gradient(135deg,rgba(167,139,250,0.06),rgba(56,189,248,0.04));border-bottom:1px solid var(--border);position:relative;}
.banner-top .cls{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--purple);background:var(--glow-purple);border:1px solid rgba(167,139,250,0.2);padding:3px 10px;border-radius:4px;display:inline-block;margin-bottom:10px;}
.banner-top h1{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.5px;margin-bottom:4px;}
.banner-top .sub{font-size:12px;color:var(--text2);line-height:1.5;}
.banner-top .docid{position:absolute;top:16px;right:16px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);background:rgba(62,74,92,0.2);padding:4px 10px;border-radius:4px;border:1px solid rgba(62,74,92,0.15);}
.banner-meta{display:flex;gap:16px;padding:10px 20px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
.snav{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.snav::-webkit-scrollbar{display:none;}
.snav-btn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:7px 13px;border-radius:6px;background:var(--panel);border:1px solid var(--border);color:var(--dim);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.snav-btn:hover{border-color:var(--dim);color:var(--text2);}
.snav-btn.active{background:var(--glow-cyan);border-color:rgba(56,189,248,0.3);color:var(--cyan);}
.snav-btn .ck{color:var(--green);margin-right:3px;}
.sec{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.sec-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sec-hdr h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
.sec-hdr h2 .num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cyan);background:var(--glow-cyan);padding:2px 8px;border-radius:4px;border:1px solid rgba(56,189,248,0.2);}
.sec-hdr .rt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
.sec-body{padding:18px;}
.sec-body p{font-size:13.5px;line-height:1.75;color:var(--text2);margin-bottom:14px;}
.sec-body p strong{color:var(--text1);font-weight:500;}
.kc{background:rgba(56,189,248,0.04);border:1px solid rgba(56,189,248,0.12);border-radius:8px;padding:12px 14px;margin-bottom:14px;}
.kc .kc-l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan);margin-bottom:6px;}
.kc .kc-t{font-size:13px;line-height:1.65;color:var(--text2);}
.kc .kc-t strong{color:var(--text1);font-weight:600;}
.fn{background:rgba(251,191,36,0.04);border-left:3px solid rgba(251,191,36,0.4);border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:14px;}
.fn .fn-l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);margin-bottom:4px;}
.fn .fn-t{font-size:12.5px;line-height:1.6;color:var(--text2);}
.component-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.comp-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px;transition:all .2s;cursor:pointer;position:relative;}
.comp-card:hover{border-color:rgba(56,189,248,0.3);transform:translateY(-2px);}
.comp-card .cc-ico{font-size:20px;margin-bottom:4px;}
.comp-card .cc-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.comp-card .cc-desc{font-size:11px;color:var(--text2);line-height:1.4;}
.comp-card .cc-tag{position:absolute;top:8px;right:8px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;}

/* Quiz */
.qb{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px;}
.qb .qb-l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);margin-bottom:10px;}
.qb .qb-q{font-size:14px;font-weight:500;line-height:1.6;margin-bottom:12px;}
.qopts{display:flex;flex-direction:column;gap:6px;}
.qo{padding:10px 14px;background:var(--panel);border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;}
.qo:hover:not(.chosen){border-color:var(--dim);color:var(--text1);}
.qo .lt{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--dim);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid var(--border);flex-shrink:0;}
.qo.correct{background:var(--glow-green);border-color:rgba(52,211,153,0.3);color:var(--green);}
.qo.correct .lt{background:var(--green);color:var(--bg);border-color:var(--green);}
.qo.wrong{background:var(--glow-red);border-color:rgba(248,113,113,0.2);color:var(--red);opacity:.7;}
.qo.wrong .lt{border-color:var(--red);color:var(--red);}
.qo.chosen{pointer-events:none;}
.qexpl{margin-top:10px;padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.6;animation:fadeUp .3s ease;}
.qexpl.right{background:var(--glow-green);color:var(--green);border:1px solid rgba(52,211,153,0.15);}
.qexpl.wronge{background:var(--glow-red);color:var(--red);border:1px solid rgba(248,113,113,0.12);}

/* Progress footer */
.pf{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px;}
.pf-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.pf-top .pfl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);}
.pf-top .pfp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);}
.pf-bar{height:4px;background:rgba(56,189,248,0.1);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.pf-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width .6s ease;}
.pf-btns{display:flex;gap:8px;}
.pf-btns button{flex:1;padding:11px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-map{background:var(--panel2);border:1px solid var(--border);color:var(--text2);}
.btn-map:hover{border-color:var(--dim);color:var(--text1);}
.btn-go{background:var(--glow-cyan);border:1px solid rgba(56,189,248,0.3);color:var(--cyan);}
.btn-go:hover{background:rgba(56,189,248,0.2);box-shadow:0 0 16px rgba(56,189,248,0.1);}

/* === BRIEFING === */
.brief{animation:fadeUp .5s ease;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.brief-top{padding:24px 20px 16px;background:linear-gradient(135deg,rgba(248,113,113,0.05),rgba(251,191,36,0.04));border-bottom:1px solid var(--border);position:relative;}
.brief-top .pri{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--amber);background:var(--glow-amber);border:1px solid rgba(251,191,36,0.25);padding:3px 10px;border-radius:4px;display:inline-block;margin-bottom:10px;}
.brief-top .tkt{position:absolute;top:16px;right:16px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);background:rgba(62,74,92,0.2);padding:4px 10px;border-radius:4px;border:1px solid rgba(62,74,92,0.15);}
.brief-top h2{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:700;margin-bottom:4px;}
.brief-top .sloc{font-size:12px;color:var(--text2);}
.brief-body{padding:16px 20px;}
.brief-body .narr{font-size:13.5px;line-height:1.7;color:var(--text2);margin-bottom:16px;}
.brief-body .narr strong{color:var(--text1);font-weight:500;}
.brief-body h4{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple);margin-bottom:8px;}
.obj-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;color:var(--text2);}
.obj-row .bl{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0;}
.brief-btns{display:flex;gap:10px;padding-top:8px;}
.brief-btns button{flex:1;padding:13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-deploy{font-family:'Orbitron',sans-serif;background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--cyan);letter-spacing:1px;text-transform:uppercase;}
.btn-deploy:hover{background:rgba(56,189,248,0.2);box-shadow:0 0 20px rgba(56,189,248,0.15);}

/* === SIMULATION === */
.sim{animation:fadeUp .4s ease;}
.env{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.env-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);background:rgba(14,18,25,0.6);}
.env-hdr .loc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cyan);letter-spacing:1px;}
.env-hdr .alrt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--red);animation:blink 1.5s step-end infinite;}
.env-hdr .ok-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--green);}
.rack-bay{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px;}
.rack-bay.col3{grid-template-columns:repeat(3,1fr);}
.rack{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;transition:all .25s;position:relative;min-height:130px;}
.rack:hover{border-color:rgba(56,189,248,0.4);transform:translateY(-2px);}
.rack.trouble{border-color:rgba(248,113,113,0.4);animation:troublePulse 2s ease infinite;}
.rack.fixed{border-color:rgba(52,211,153,0.3);}
.rack-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;text-align:center;}
.rack-units{display:flex;flex-direction:column;gap:3px;}
.ru{height:10px;border-radius:2px;position:relative;overflow:hidden;}
.ru.server{background:linear-gradient(90deg,#1a2540,#1e2d4a);}
.ru.switch{background:linear-gradient(90deg,#1a2a1a,#1e3520);}
.ru.kvm{background:linear-gradient(90deg,#2a1a40,#351e50);border:1px solid rgba(167,139,250,0.15);}
.ru.pdu{background:linear-gradient(90deg,#2a2010,#302818);}
.ru.empty{background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.04);}
.ru .leds{position:absolute;right:4px;top:1.5px;display:flex;gap:2px;}
.led{width:4px;height:4px;border-radius:50%;}
.led.g{background:var(--green);box-shadow:0 0 4px var(--green);}
.led.a{background:var(--amber);box-shadow:0 0 4px var(--amber);}
.led.r{background:var(--red);box-shadow:0 0 4px var(--red);}
.led.off{background:var(--dim);}
.rack-status{font-family:'JetBrains Mono',monospace;font-size:9px;text-align:center;margin-top:6px;padding:3px 6px;border-radius:3px;}
.rack-status.ok{color:var(--green);background:var(--glow-green);}
.rack-status.crit{color:var(--red);background:var(--glow-red);}
.rack-status.warn{color:var(--amber);background:var(--glow-amber);}

.mt{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:10px;}
.mt-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.mt-hdr span{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--purple);}
.mt-hdr .pct{color:var(--cyan);}
.mt-bar{height:4px;background:rgba(56,189,248,0.1);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.mt-fill{height:100%;background:var(--cyan);border-radius:2px;transition:width .6s ease;}
.mt-objs{display:flex;flex-wrap:wrap;gap:6px;}
.mt-obj{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);color:var(--dim);transition:all .3s;}
.mt-obj.done{color:var(--green);border-color:rgba(52,211,153,0.3);background:var(--glow-green);}

.rlog{background:#080a0e;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;max-height:200px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:11.5px;line-height:1.6;}
.rlog::-webkit-scrollbar{width:3px;}
.rlog::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.rl{margin-bottom:4px;display:flex;gap:6px;animation:slideMsg .3s ease;}
.rl .sn{flex-shrink:0;font-weight:600;min-width:72px;}
.sn.dispatch{color:var(--purple);}
.sn.you{color:var(--cyan);}
.sn.system{color:var(--amber);}
.sn.success{color:var(--green);}
.rl .mg2{color:var(--text2);}
.rl .mg2 strong{color:var(--text1);font-weight:500;}

.tbelt{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.tl{display:flex;align-items:center;gap:5px;padding:7px 12px;background:var(--panel);border:1px solid var(--border);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);cursor:pointer;transition:all .2s;}
.tl:hover{border-color:var(--cyan);color:var(--cyan);background:var(--glow-cyan);}
.tl.active{border-color:var(--cyan);color:var(--cyan);background:var(--glow-cyan);}
.abar{display:flex;gap:8px;margin-bottom:8px;}
.abar input{flex:1;background:#080a0e;border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text1);outline:none;transition:border .2s;}
.abar input:focus{border-color:var(--cyan);}
.abar button{padding:9px 16px;background:var(--glow-cyan);border:1px solid rgba(56,189,248,0.3);color:var(--cyan);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;}

/* === DEBRIEF === */
.db{animation:fadeUp .5s ease;text-align:center;padding:8px 0;}
.db-badge{width:80px;height:80px;margin:0 auto 12px;border-radius:50%;background:linear-gradient(135deg,rgba(52,211,153,0.1),rgba(56,189,248,0.1));border:2px solid rgba(52,211,153,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;animation:popIn .6s ease;}
.db-rank{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:4px;}
.db-ttl{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;margin-bottom:3px;}
.db-sub{font-size:12px;color:var(--text2);margin-bottom:16px;}
.db-stars{display:flex;justify-content:center;gap:6px;margin-bottom:16px;}
.db-star{width:30px;height:30px;opacity:0;}
.db-star.earned{animation:starBounce .5s ease forwards;}
.db-star svg{width:100%;height:100%;}
.db-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.db-stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px;}
.db-stat .n{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;}
.db-stat .l{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-top:2px;}
.db-cl{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;text-align:left;}
.db-cl h4{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple);margin-bottom:10px;}
.db-ci{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;margin-bottom:4px;font-size:12px;animation:fadeUp .3s ease both;}
.db-ci.pass{background:var(--glow-green);color:var(--green);}
.db-ci.fail{background:var(--glow-red);color:var(--red);text-decoration:line-through;opacity:.6;}
.db-ci .mk{font-family:'JetBrains Mono',monospace;font-size:13px;flex-shrink:0;}
.db-acts{display:flex;gap:8px;margin-top:14px;}
.db-acts button{flex:1;padding:12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.db-acts .retry{background:var(--panel);border:1px solid var(--border);color:var(--text2);}
.db-acts .retry:hover{border-color:var(--dim);color:var(--text1);}
.db-acts .nxt{background:var(--glow-cyan);border:1px solid rgba(56,189,248,0.3);color:var(--cyan);}
.db-acts .nxt:hover{background:rgba(56,189,248,0.2);}

/* Popup */
.popup-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(8,11,16,0.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
.popup-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;animation:fadeUp .3s ease;}
.popup-card .pc-close{float:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);cursor:pointer;padding:4px 8px;border-radius:4px;border:1px solid var(--border);}
.popup-card h3{font-size:16px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.popup-card .pc-sub{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-bottom:14px;}
.popup-card .pc-body{font-size:13px;line-height:1.7;color:var(--text2);}
.popup-card .pc-body strong{color:var(--text1);font-weight:500;}
.popup-card .pc-body ul{margin:8px 0 8px 16px;list-style:none;}
.popup-card .pc-body ul li{padding:3px 0;position:relative;padding-left:14px;}
.popup-card .pc-body ul li::before{content:'>';position:absolute;left:0;color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:11px;}
.et{background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);border-radius:6px;padding:10px 12px;margin-top:12px;}
.et .et-l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple);margin-bottom:4px;}
.et .et-t{font-size:12px;line-height:1.5;color:var(--text2);}

/* Responsive */
@media(max-width:600px){
  .summary-row{grid-template-columns:repeat(2,1fr);}
  .rack-bay{grid-template-columns:repeat(2,1fr);}
  .component-grid{grid-template-columns:1fr;}
  .db-grid{grid-template-columns:1fr;}
}

/* === PRACTICE EXAM === */
.exam-select{animation:fadeUp .5s ease;}
.es-header{text-align:center;padding:20px 0;margin-bottom:12px;}
.es-header h2{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px;}
.es-header p{font-size:13px;color:var(--text2);}
.es-grid{display:flex;flex-direction:column;gap:10px;}
.es-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:16px;}
.es-card:hover{border-color:rgba(56,189,248,0.3);transform:translateX(4px);}
.es-ico{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:var(--glow-cyan);border:1px solid rgba(56,189,248,0.2);}
.es-info h3{font-size:15px;font-weight:600;margin-bottom:2px;}
.es-info .es-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);}
.es-info .es-desc{font-size:12px;color:var(--text2);margin-top:4px;}
.es-best{position:absolute;right:16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--green);}

.exam{animation:fadeUp .4s ease;}
.exam-hdr{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.exam-hdr .eh-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:600;}
.exam-hdr .eh-timer{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--amber);}
.exam-hdr .eh-timer.low{color:var(--red);animation:blink 1s step-end infinite;}
.exam-prog{display:flex;gap:3px;margin-bottom:10px;}
.exam-pip{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s;}
.exam-pip.answered{background:var(--green);}
.exam-pip.current{background:var(--cyan);}
.exam-pip.wrong-pip{background:var(--red);}

.eq-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.eq-top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(14,18,25,0.4);}
.eq-domain{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple);background:var(--glow-purple);padding:3px 10px;border-radius:4px;border:1px solid rgba(167,139,250,0.2);}
.eq-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);}
.eq-q{padding:18px 16px 14px;font-size:14.5px;font-weight:500;line-height:1.65;}
.eq-opts{padding:0 16px 16px;display:flex;flex-direction:column;gap:6px;}
.eq-opt{padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;}
.eq-opt:hover:not(.chosen){border-color:var(--dim);color:var(--text1);}
.eq-lt{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--dim);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:1px solid var(--border);flex-shrink:0;}
.eq-opt.correct{background:var(--glow-green);border-color:rgba(52,211,153,0.3);color:var(--green);}
.eq-opt.correct .eq-lt{background:var(--green);color:var(--bg);border-color:var(--green);}
.eq-opt.wrong{background:var(--glow-red);border-color:rgba(248,113,113,0.2);color:var(--red);opacity:.7;}
.eq-opt.wrong .eq-lt{border-color:var(--red);color:var(--red);}
.eq-opt.chosen{pointer-events:none;}
.eq-expl{margin:0 16px 16px;padding:12px 14px;border-radius:8px;font-size:12.5px;line-height:1.6;animation:fadeUp .3s ease;}
.eq-expl.right{background:var(--glow-green);color:var(--green);border:1px solid rgba(52,211,153,0.15);}
.eq-expl.wronge{background:var(--glow-red);color:var(--red);border:1px solid rgba(248,113,113,0.12);}
.eq-nav{display:flex;gap:8px;}
.eq-nav button{flex:1;padding:12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}

.er-card{text-align:center;animation:fadeUp .5s ease;padding:10px 0;}
.er-badge{width:80px;height:80px;margin:0 auto 14px;border-radius:50%;background:var(--panel);border:2px solid;display:flex;align-items:center;justify-content:center;animation:popIn .6s ease;}
.er-status{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:4px;}
.er-title{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text2);}
.er-score-big{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:800;margin-bottom:4px;}
.er-detail{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);margin-bottom:20px;}
.er-domains{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:left;margin-bottom:16px;}
.er-dh{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--purple);margin-bottom:12px;}
.er-dom{margin-bottom:10px;}
.er-dom:last-child{margin-bottom:0;}
.er-dom-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.er-dom-top span:first-child{color:var(--text2);}
.er-dom-top span:last-child{font-family:'JetBrains Mono',monospace;color:var(--text1);}
.er-dom-bar{height:5px;background:rgba(56,189,248,0.08);border-radius:3px;overflow:hidden;}
.er-dom-fill{height:100%;border-radius:3px;transition:width 1s ease;}
.er-actions{display:flex;gap:8px;}
.er-actions button{flex:1;padding:12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
</style>

<body>
<div id="app"></div>
<script>// A+ (220-1201 & 220-1202) — Data Center Technician → Desktop Support Engineer
window.DATA_APLUS = {
  id: 'aplus',
  name: 'CompTIA A+',
  code: '220-1201 & 220-1202',
  role: 'Data center & desktop support',
  icon: '\uD83D\uDC77',
  color: 'cyan',
  avatarBg: 'linear-gradient(135deg,#1e3a5f,#0e1f38)',
  rankProgression: ['Cadet technician','Junior technician','Technician II','Senior technician','Lead technician','Desktop support specialist','Systems administrator','Senior sysadmin'],
  chapters: [
    {
      num:1, title:"Server hardware fundamentals",
      location:"Training lab — Bay 1", floor:1, floorName:"Data center — Floor 1",
      ticket:"TKT-4821", mission:"Server unresponsive in Rack B3",
      priority:"Priority 2 — Urgent", free:true,
      desc:"Core components, form factors, motherboards, CPUs, RAM, storage, RAID, and power delivery.",
      examDomain:"Domain 3: Hardware",
      studyGuide: {
        docId:"DOC-TM-0100",
        subtitle:"Core components, form factors, and field identification for the data center technician.",
        sections:[
          {id:"overview",title:"System overview",rt:"2 min",content:`<p>As a data center technician, the server hardware in front of you is your battlefield. Before you can troubleshoot a down server, you need to know <strong>what's inside the machine</strong> and how every component talks to the others.</p><p>A typical rack-mounted server shares the same fundamental architecture as a desktop PC — but built for <strong>24/7 uptime, redundancy, and remote management</strong>.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t">The core components of any computer system: <strong>CPU</strong> (processing), <strong>RAM</strong> (volatile memory), <strong>Storage</strong> (persistent data), <strong>Motherboard</strong> (interconnect), <strong>PSU</strong> (power), and <strong>NIC</strong> (network). In servers, each of these is designed for redundancy and hot-swapability.</div></div><div class="fn"><div class="fn-l">Field note</div><div class="fn-t">In the data center, you rarely build from scratch. Your job is to <strong>identify failing components</strong>, swap them hot when possible, and get that server back online before the SLA clock runs out.</div></div>`},
          {id:"motherboard",title:"Motherboards & form factors",rt:"3 min",content:`<p>The <strong>motherboard</strong> is the central nervous system of every server. Everything plugs into it — CPU, RAM, storage, NICs, power.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>ATX</strong> (12" x 9.6") is the standard desktop form factor. <strong>E-ATX</strong> supports dual sockets for servers. <strong>Micro-ATX</strong> and <strong>Mini-ITX</strong> are smaller. For the A+ exam, know the physical dimensions and screw hole patterns.</div></div><p>Key motherboard components: <strong>CPU socket</strong> (LGA for Intel, PGA for older AMD), <strong>DIMM slots</strong> (RAM), <strong>PCIe slots</strong> (expansion), <strong>Chipset</strong> (traffic controller), <strong>BIOS/UEFI chip</strong> (firmware).</p><div class="fn"><div class="fn-l">Technician tip</div><div class="fn-t">If a server fails POST, your first suspects are: unseated RAM, failed CPU, or corrupted BIOS. LED diagnostic codes on the motherboard tell you which.</div></div>`,quiz:{q:"A server fails POST with an amber LED near the DIMM slots. Check first?",opts:[{l:"A",t:"Replace the CPU",c:false},{l:"B",t:"Reseat the RAM modules",c:true},{l:"C",t:"Flash the BIOS firmware",c:false},{l:"D",t:"Replace the motherboard",c:false}],right:"Amber LED near DIMM slots = memory issue. Reseat RAM first — listen for two clicks.",wrong:"LED location is your clue — near DIMMs means memory. Always reseat before replace."}},
          {id:"cpu",title:"CPUs & cooling",rt:"3 min",content:`<p>The <strong>CPU</strong> executes every instruction. Server CPUs (Intel Xeon, AMD EPYC) prioritize <strong>core count over clock speed</strong>.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Clock speed</strong> (GHz) = single-core speed. <strong>Core count</strong> = parallel threads. <strong>TDP</strong> (Thermal Design Power) = heat output = cooling requirement. Server CPUs often run 150W-350W TDP.</div></div><p>Cooling: servers use <strong>hot aisle / cold aisle</strong> layout. Cold air in front, hot exhaust out back. Missing blanking panels cause hot air recirculation.</p><div class="fn"><div class="fn-l">Field note</div><div class="fn-t">If someone installs a server backwards, it recirculates hot air. You'll see thermal alarms within minutes. Ideal server room: 64-75°F, 40-60% humidity.</div></div>`},
          {id:"ram",title:"RAM & memory",rt:"3 min",content:`<p><strong>RAM</strong> is short-term memory. Servers use <strong>ECC</strong> (Error-Correcting Code) memory — it detects and corrects single-bit errors.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>DDR4/DDR5</strong> — not interchangeable (different notch position). <strong>ECC</strong> = extra chip for parity. <strong>RDIMM</strong> (Registered) = buffer chip for stability. Install in matched pairs per motherboard manual.</div></div><div class="fn"><div class="fn-l">Technician tip</div><div class="fn-t">When seating DIMMs, listen for <strong>two clicks</strong> (both latches). One click = one side unseated = POST failure. The #1 rookie mistake.</div></div>`,quiz:{q:"Server throwing parity errors in system log with ECC RDIMMs. Run first?",opts:[{l:"A",t:"MemTest86 diagnostic",c:true},{l:"B",t:"chkdsk /f on boot drive",c:false},{l:"C",t:"CPU stress test",c:false},{l:"D",t:"RAID controller firmware update",c:false}],right:"MemTest86 tests every memory address and pinpoints the failing DIMM. Parity errors = RAM problem.",wrong:"Parity errors point to RAM, not storage or CPU. MemTest86 is the standard memory diagnostic."}},
          {id:"storage",title:"Storage & RAID",rt:"3 min",content:`<p>Data center storage: <strong>HDD</strong> (bulk capacity) and <strong>SSD/NVMe</strong> (speed). Servers use <strong>RAID</strong> for redundancy.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>RAID 0</strong> = striping (fast, no redundancy). <strong>RAID 1</strong> = mirroring. <strong>RAID 5</strong> = striping + parity (survives 1 failure). <strong>RAID 6</strong> = double parity (survives 2). <strong>RAID 10</strong> = mirror + stripe. Interfaces: SATA (6Gbps), SAS (12Gbps), NVMe (PCIe, fastest).</div></div><div class="fn"><div class="fn-l">Field note</div><div class="fn-t">Never pull two drives from a RAID 5 array simultaneously. It tolerates one failure only. Second failure during rebuild = data loss.</div></div>`,quiz:{q:"RAID 5 array (4 drives): one fails, second fails during rebuild. What happens?",opts:[{l:"A",t:"RAID 5 handles 2 failures",c:false},{l:"B",t:"Array degrades but stays online",c:false},{l:"C",t:"Total array failure — data lost",c:true},{l:"D",t:"Rebuild switches to new drive",c:false}],right:"RAID 5 = single parity. Second failure during rebuild = catastrophic. This is why RAID 6 exists.",wrong:"RAID 5 tolerates ONE failure only. Second failure = unrecoverable. RAID 6 or 10 is preferred."}},
          {id:"power",title:"Power & safety",rt:"3 min",content:`<p>Every server has <strong>dual redundant PSUs</strong>. If one fails, the other keeps the system alive.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>80 Plus</strong> (Bronze/Gold/Platinum/Titanium) = efficiency rating. <strong>PDU</strong> = Power Distribution Unit in rack. Key voltage rails: +3.3V, +5V, +12V. Modern servers draw most from +12V.</div></div><div class="fn"><div class="fn-l">Safety critical</div><div class="fn-t"><strong>ESD</strong> can destroy components at voltages you can't feel. Always wear an ESD wrist strap. Never open a PSU — capacitors hold lethal charge even unplugged.</div></div>`,quiz:{q:"Replacing a failed PSU in a server with redundant power. Correct procedure?",opts:[{l:"A",t:"Shut down server, unplug both PSUs, replace",c:false},{l:"B",t:"Hot-swap: pull failed PSU and insert replacement while running",c:true},{l:"C",t:"Unplug the PDU circuit first",c:false},{l:"D",t:"Open the failed PSU to check capacitors",c:false}],right:"Redundant PSUs = hot-swap. No shutdown needed. Never open a PSU — lethal capacitor charge.",wrong:"With redundant PSUs, hot-swap without shutdown. Never open a PSU casing."}}
        ]
      },

    {
      num:2, title:"Peripherals & display technology",
      location:"Data center floor 1 — Bay 3", floor:1,
      ticket:"TKT-4835", mission:"KVM failure across 3 racks — no console access",
      priority:"Priority 2 — Urgent", free:false,
      desc:"Monitors, KVM switches, USB standards, display interfaces, and peripheral troubleshooting.",
      examDomain:"Domain 3: Hardware",
      studyGuide:{docId:"DOC-TM-0200",subtitle:"Display interfaces, USB standards, KVM architecture, and peripheral troubleshooting.",sections:[
        {id:"overview",title:"Overview",rt:"2 min",content:`<p>You manage everything <strong>connected to servers</strong>. KVM switches, console cables, monitors, USB peripherals — when a KVM goes down, you lose <strong>eyes and hands on every server it controls</strong>.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>KVM</strong> = Keyboard, Video, Mouse. A KVM switch lets one console control multiple servers. IP-based KVMs allow remote console access over the network.</div></div>`},
        {id:"display",title:"Display interfaces",rt:"3 min",content:`<p>Every display connection has a specific interface. Know the <strong>connector type, max resolution, and signal type</strong>.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>VGA</strong> = analog, degrades over distance. <strong>DVI-D/HDMI/DisplayPort</strong> = digital. DP++ can output HDMI via passive adapter. HDMI-to-DP requires active adapter.</div></div>`,quiz:{q:"DP output to HDMI KVM input. What adapter?",opts:[{l:"A",t:"No adapter needed",c:false},{l:"B",t:"Passive DP++ to HDMI adapter",c:true},{l:"C",t:"Active adapter with signal conversion",c:false},{l:"D",t:"DVI-I to HDMI bridge",c:false}],right:"DP++ natively outputs HDMI signals through a passive adapter.",wrong:"DP++ can output HDMI passively. Active conversion only needed going HDMI→DP."}},
        {id:"usb",title:"USB standards",rt:"3 min",content:`<p><strong>USB 2.0</strong> = 480 Mbps. <strong>USB 3.0</strong> = 5 Gbps (blue port). <strong>USB 3.1 Gen 2</strong> = 10 Gbps. <strong>USB-C</strong> is a connector shape, not a speed standard.</p><div class="fn"><div class="fn-l">Field note</div><div class="fn-t">USB keyboard not working in BIOS? Enable <strong>USB Legacy Support</strong>. Some older servers need PS/2 for pre-boot access.</div></div>`},
        {id:"kvm",title:"KVM & console management",rt:"3 min",content:`<p><strong>Local KVM</strong>: physical switch in rack. <strong>KVM over IP</strong>: network-attached, browser access. <strong>IPMI/iLO/iDRAC</strong>: built-in management cards.</p><div class="fn"><div class="fn-l">Technician tip</div><div class="fn-t"><strong>Crash cart</strong> = rolling cart with monitor + keyboard. When KVM fails, it's your backup. Always keep one charged per floor.</div></div>`,quiz:{q:"Server accessible via SSH but KVM shows black screen. KVM works for others. Check first?",opts:[{l:"A",t:"Reboot the server",c:false},{l:"B",t:"Check video cable between server and KVM port",c:true},{l:"C",t:"Replace the KVM switch",c:false},{l:"D",t:"Update network drivers",c:false}],right:"Server responds to SSH = it's running. Issue is the video path for that port. Check the cable.",wrong:"SSH works = server is fine. Issue is isolated to video console path — check the cable."}},
        {id:"troubleshoot",title:"Peripheral troubleshooting",rt:"3 min",content:`<p>Systematic approach: <strong>1)</strong> Swap cable. <strong>2)</strong> Try different port. <strong>3)</strong> Test peripheral on known-good system. <strong>4)</strong> Check host (Device Manager, drivers, BIOS). <strong>5)</strong> If KVM issue, bypass and connect directly.</p><div class="fn"><div class="fn-l">Safety reminder</div><div class="fn-t">Before unplugging any cable from a running server, <strong>trace it end-to-end</strong>. Takes 10 seconds, prevents pulling a production network link.</div></div>`}
      ]},

    {num:3,title:"Storage devices & interfaces",location:"Data center floor 1 — Bay 6",floor:1,ticket:"TKT-4847",mission:"RAID array degraded — drive replacement needed",priority:"Priority 1 — Critical",free:false,desc:"HDD vs SSD internals, NVMe, SATA, SAS, hot-swap bays, and SMART monitoring.",examDomain:"Domain 3: Hardware",
      studyGuide:{docId:"DOC-TM-0300",subtitle:"Deep dive into storage technologies, interfaces, and RAID array management.",sections:[
        {id:"overview",title:"Storage overview",rt:"2 min",content:`<p>Storage is where data lives permanently. As a DC tech, you'll manage <strong>thousands of drives</strong> across hundreds of servers. Knowing the difference between drive types, interfaces, and RAID configurations is critical for fast troubleshooting.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>HDD</strong> = magnetic platters, mechanical arm. Measured in RPM (5400/7200/10K/15K). <strong>SSD</strong> = NAND flash, no moving parts. <strong>NVMe</strong> = SSD connected directly to PCIe bus, bypassing SATA bottleneck.</div></div>`},
        {id:"interfaces",title:"Storage interfaces",rt:"3 min",content:`<p>The interface determines bandwidth and compatibility.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>SATA III</strong> = 6 Gbps, single lane. Budget tier. <strong>SAS</strong> = 12 Gbps, dual-port for failover. Enterprise standard. <strong>NVMe (PCIe)</strong> = up to 32 Gbps (Gen 4 x4). Fastest available. <strong>M.2</strong> = form factor (not interface) — can carry SATA or NVMe.</div></div><div class="fn"><div class="fn-l">Field note</div><div class="fn-t">SAS backplanes accept SATA drives (pin compatible), but SATA backplanes do NOT accept SAS drives. Know this for drive replacements.</div></div>`,quiz:{q:"Which statement about M.2 is correct?",opts:[{l:"A",t:"M.2 always uses NVMe protocol",c:false},{l:"B",t:"M.2 is a form factor that can use SATA or NVMe",c:true},{l:"C",t:"M.2 drives are faster than all 2.5\" SSDs",c:false},{l:"D",t:"M.2 slots only exist on laptops",c:false}],right:"M.2 is a physical form factor. It can carry SATA (B-key, ~550 MB/s) or NVMe (M-key, ~7 GB/s). Check the key notch.",wrong:"M.2 is just a connector shape — the speed depends on whether it's SATA or NVMe inside."}},
        {id:"smart",title:"SMART monitoring",rt:"3 min",content:`<p><strong>S.M.A.R.T.</strong> (Self-Monitoring, Analysis, and Reporting Technology) is built into every drive. It tracks health metrics like reallocated sectors, temperature, and power-on hours.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t">Key SMART attributes: <strong>Reallocated Sector Count</strong> (bad sectors replaced from spare pool — rising = drive failing). <strong>Current Pending Sector</strong> (sectors waiting for reallocation). <strong>Temperature</strong>. Most RAID controllers monitor SMART and trigger alerts automatically.</div></div><div class="fn"><div class="fn-l">Technician tip</div><div class="fn-t">Don't wait for a drive to fail completely. When SMART shows rising reallocated sectors, schedule a <strong>proactive replacement</strong> during the next maintenance window. Predictive failure > reactive failure.</div></div>`},
        {id:"hotswap",title:"Hot-swap procedures",rt:"3 min",content:`<p>Server drive bays are designed for <strong>hot-swap</strong> — replace a failed drive without shutting down.</p><p><strong>Procedure:</strong> Identify the failed bay (amber LED). Press the release latch. Slide out the caddy. Insert the replacement drive. The RAID controller detects the new drive and begins <strong>automatic rebuild</strong>.</p><div class="fn"><div class="fn-l">Safety critical</div><div class="fn-t">Always verify you're pulling the <strong>correct drive</strong>. Double-check the bay number against the alert. Pulling the wrong drive from a degraded array = <strong>total data loss</strong>.</div></div>`,quiz:{q:"During a RAID 5 rebuild, what happens to performance?",opts:[{l:"A",t:"No impact — rebuilds happen in background",c:false},{l:"B",t:"Performance degrades during rebuild",c:true},{l:"C",t:"Server must be taken offline",c:false},{l:"D",t:"Only write performance is affected",c:false}],right:"Rebuilds consume I/O bandwidth and CPU on the RAID controller. Both read and write performance degrade until rebuild completes.",wrong:"RAID rebuilds are I/O intensive. Performance degrades for all operations until the rebuild finishes."}}
      ]},
      simulation:{location:"Data center floor 1 — Bay 6",narrative:`Monitoring alert: <strong>RAID 5 array in Rack C6</strong> has entered degraded state. One drive is showing SMART warnings and the controller has marked it as <strong>predictive failure</strong>. You need to identify the failing drive, verify the array status, and perform a hot-swap replacement before a second failure causes data loss. <strong>Time-sensitive — the array is vulnerable.</strong>`,objectives:["Check RAID controller status","Identify the failing drive bay","Verify SMART data on the drive","Prepare replacement drive","Perform hot-swap replacement","Confirm array rebuild started"],

    {num:4,title:"Networking hardware",location:"Data center floor 2 — MDF closet",floor:2,floorName:"Data center — Floor 2",ticket:"TKT-4862",mission:"Top-of-rack switch unresponsive — 12 hosts offline",priority:"Priority 1 — Critical",free:false,desc:"Switches, routers, patch panels, cable management, SFP modules, and PoE.",examDomain:"Domain 2: Networking",
      studyGuide:{docId:"DOC-TM-0400",subtitle:"Network hardware identification, switch and router fundamentals, and cabling standards.",sections:[
        {id:"overview",title:"Network hardware overview",rt:"2 min",content:`<p>In a data center, networking hardware moves data between servers, storage, and the outside world. You'll work with <strong>switches, routers, patch panels, and SFP modules</strong> daily.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>Switch</strong> = Layer 2, forwards frames by MAC address. <strong>Router</strong> = Layer 3, forwards packets by IP address. <strong>Patch panel</strong> = passive connection point between structured cabling and switch ports.</div></div>`},
        {id:"switches",title:"Switches & VLANs",rt:"3 min",content:`<p>Top-of-rack (TOR) switches connect all servers in a rack to the network fabric. <strong>Managed switches</strong> support VLANs, port security, and SNMP monitoring.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>VLAN</strong> = Virtual LAN. Logically segments network traffic. <strong>Trunk ports</strong> carry multiple VLANs (tagged). <strong>Access ports</strong> belong to a single VLAN (untagged). SFP/SFP+ modules slot into switches for fiber uplinks.</div></div>`,quiz:{q:"What is the purpose of a trunk port on a managed switch?",opts:[{l:"A",t:"Connects to a single server",c:false},{l:"B",t:"Carries traffic from multiple VLANs using tags",c:true},{l:"C",t:"Provides PoE to connected devices",c:false},{l:"D",t:"Blocks all traffic for security",c:false}],right:"Trunk ports carry tagged traffic from multiple VLANs simultaneously, typically between switches or to a router.",wrong:"Trunk ports tag frames with VLAN IDs so multiple VLANs can share one physical link."}},
        {id:"cabling",title:"Cabling & connectors",rt:"3 min",content:`<p>Know your cable types: <strong>Cat5e</strong> (1Gbps/100m), <strong>Cat6</strong> (10Gbps/55m), <strong>Cat6a</strong> (10Gbps/100m). <strong>Fiber</strong>: single-mode (long distance, yellow) vs multi-mode (short, orange/aqua).</p><div class="fn"><div class="fn-l">Field note</div><div class="fn-t"><strong>T568A vs T568B</strong> — both are valid wiring standards for RJ45. Pick one and be consistent. A crossover cable uses A on one end and B on the other (rare now with auto-MDI/X).</div></div>`},
        {id:"troubleshoot",title:"Switch troubleshooting",rt:"3 min",content:`<p>When a switch goes down: <strong>1)</strong> Check power and status LEDs. <strong>2)</strong> Check uplink connectivity. <strong>3)</strong> Console into the switch (serial/SSH). <strong>4)</strong> Check port status and error counters. <strong>5)</strong> Verify VLAN assignments.</p><div class="fn"><div class="fn-l">Technician tip</div><div class="fn-t">A switch that boots into <strong>ROM monitor mode</strong> (rommon>) has a corrupted IOS image. You'll need to TFTP a new image or recover from USB. Know how to enter rommon for the exam.</div></div>`}
      ]},
      simulation:{location:"Data center floor 2 — MDF closet",narrative:`The TOR switch in <strong>Rack F2</strong> has gone unresponsive. 12 servers have lost network connectivity. The switch management interface is unreachable. Physical access needed — get to the MDF closet and bring this switch back.`,objectives:["Check switch power and LEDs","Console into the switch","Verify switch firmware status","Check uplink SFP module","Reload the switch","Verify host connectivity restored"],

        responseMap:[{keys:["switch","power","led","status","check"],resp:"leds"},{keys:["console","serial","terminal","connect","cli"],resp:"console"},{keys:["firmware","ios","boot","rommon","image","version"],resp:"firmware"},{keys:["sfp","uplink","fiber","module","transceiver","optic"],resp:"sfp"},{keys:["reload","reboot","restart","recover","reset"],resp:"reload"},{keys:["verify","ping","connectivity","hosts","restored","test","online"],resp:"verify"},{keys:["dispatch","radio","help"],resp:"dispatch"}],
        responses:{leds:{sn:"system",msg:"Switch status: <strong>Power LED green</strong>, but System LED is <strong>solid amber</strong> — indicates a boot failure or firmware issue. Port LEDs are all dark.",match:[0]},console:{sn:"system",msg:"You connect via console cable. Terminal shows: <strong>rommon 1 ></strong> — the switch has dropped into ROM monitor mode. The IOS image failed to load.",match:[1]},firmware:{sn:"system",msg:"In rommon, you check the flash: the IOS image file is <strong>corrupted</strong> (bad checksum). A backup image exists in flash. You set the boot variable to the backup image.",match:[2]},sfp:{sn:"system",msg:"Uplink SFP module shows <strong>amber LED</strong>. You reseat the SFP — it clicks. The fiber patch looks clean, no visible damage. SFP LED turns off (normal — switch isn't booted yet).",match:[3]},reload:{sn:"system",msg:"You issue <strong>'boot'</strong> from rommon. Switch loads the backup IOS image. Boot sequence completes in 90 seconds. System LED turns <strong>solid green</strong>. Port LEDs begin lighting up as links negotiate.",match:[4]},verify:{sn:"success",msg:"You ping the 12 connected hosts: <strong>all 12 responding</strong>. Uplink SFP shows green link light. Switch management interface accessible via SSH. <strong>Ticket TKT-4862 resolved.</strong>",match:[5]},dispatch:{sn:"dispatch",msg:"NOC shows 12 hosts still offline. That switch needs to come back up ASAP.",match:[]},unknown:{sn:"dispatch",msg:"Focus on the switch. Get console access and figure out why it won't boot.",match:[]}}
      }

    {num:5,title:"Printers & multifunction devices",location:"Office annex — Print room",floor:2,ticket:"TKT-4878",mission:"Laser printer printing blank pages after toner swap",priority:"Priority 3 — Standard",free:false,desc:"Laser, inkjet, thermal, 3D printing. Maintenance kits, toner, paper jams.",examDomain:"Domain 3: Hardware",
      studyGuide:{docId:"DOC-TM-0500",subtitle:"Printer technologies, maintenance, and common troubleshooting scenarios.",sections:[
        {id:"overview",title:"Printer technologies",rt:"2 min",content:`<p>The A+ exam covers four printer types: <strong>Laser</strong> (toner, fuser, photosensitive drum), <strong>Inkjet</strong> (liquid ink, print head), <strong>Thermal</strong> (heat-sensitive paper), and <strong>3D</strong> (filament extrusion). Laser is by far the most common in enterprise environments.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t">Laser printing process (7 steps): <strong>Processing → Charging → Exposing → Developing → Transferring → Fusing → Cleaning</strong>. Know this order for the exam.</div></div>`},
        {id:"laser",title:"Laser printer deep dive",rt:"3 min",content:`<p>The <strong>imaging drum</strong> is charged to -600V by the charge roller. The laser writes the image (reducing charge where toner should stick). Toner is attracted to discharged areas. The transfer roller pulls toner onto paper. The <strong>fuser</strong> (heat + pressure) melts toner permanently.</p><div class="fn"><div class="fn-l">Technician tip</div><div class="fn-t">Blank pages after toner swap? The <strong>sealing tape</strong> wasn't removed from the new cartridge. Pull the cartridge and check. This is the #1 cause of blank page calls.</div></div>`,quiz:{q:"Laser printer prints blank pages after new toner install. Most likely cause?",opts:[{l:"A",t:"Fuser assembly has failed",c:false},{l:"B",t:"Sealing tape not removed from toner cartridge",c:true},{l:"C",t:"Imaging drum needs replacement",c:false},{l:"D",t:"Transfer roller is worn out",c:false}],right:"The sealing tape protects the toner during shipping. If not removed, no toner reaches the drum. Always check this first after a swap.",wrong:"After a toner swap, blank pages almost always = sealing tape still in place. Check before replacing anything else."}},
        {id:"maintenance",title:"Maintenance & supplies",rt:"3 min",content:`<p>Laser printers have <strong>maintenance kits</strong> (fuser, rollers, separation pads) rated for a specific page count (e.g., 200K pages). Inkjet printers need <strong>print head cleaning</strong> and <strong>ink cartridge alignment</strong>.</p><div class="fn"><div class="fn-l">Field note</div><div class="fn-t"><strong>Never</strong> use a regular vacuum on toner spills — toner particles are so fine they pass through the filter and damage the motor. Use a <strong>toner-rated vacuum</strong> with HEPA filtration.</div></div>`},
        {id:"troubleshoot",title:"Common printer issues",rt:"3 min",content:`<p><strong>Paper jams</strong>: check rollers for wear, verify paper weight matches specs, inspect paper path for debris. <strong>Streaks/lines</strong>: dirty or scratched drum, low toner. <strong>Ghost images</strong>: fuser not hot enough, drum not cleaning properly. <strong>Smearing</strong>: fuser failure (toner not bonding).</p>`}
      ]},

        responses:{panel:{sn:"system",msg:"Printer LCD shows: <strong>'Ready'</strong> with no error codes. Toner level indicator shows full. Paper tray is loaded. The printer <em>thinks</em> everything is fine.",match:[0]},cartridge:{sn:"system",msg:"You open the front panel and pull the toner cartridge. It slides out smoothly. You notice a <strong>yellow pull tab</strong> still attached to the side of the cartridge — the <strong>sealing tape has not been removed</strong>.",match:[1]},tape:{sn:"system",msg:"You pull the yellow tab firmly. A long strip of <strong>sealing tape</strong> peels away from the cartridge, exposing the toner roller. That was blocking all toner from reaching the drum. Classic mistake.",match:[2]},drum:{sn:"system",msg:"You inspect the imaging drum inside the printer. The green photosensitive surface is <strong>clean and undamaged</strong> — no scratches, no marks. Drum is fine.",match:[3]},test:{sn:"system",msg:"You reinstall the cartridge (clicks firmly into place) and send a test page. The printer processes and outputs a page with <strong>clear, crisp text and sharp graphics</strong>. Print quality is excellent.",match:[4]},confirm:{sn:"success",msg:"Test page looks perfect. You print a second page to confirm consistency — also perfect. You inform the admin about the sealing tape and close the ticket. <strong>Ticket TKT-4878 resolved.</strong>",match:[5]},dispatch:{sn:"dispatch",msg:"30 users waiting on that printer. Should be a quick fix — common toner swap issue.",match:[]},unknown:{sn:"dispatch",msg:"Focus on the printer. Start by checking what the admin did with the toner cartridge.",match:[]}}

    {num:6,title:"Power & environmental controls",location:"Data center floor 2 — Utility room",floor:2,ticket:"TKT-4891",mission:"UPS battery alarm — 8 minutes of backup remaining",priority:"Priority 1 — Critical",free:false,desc:"UPS systems, PDU management, generators, HVAC, fire suppression, and environmental monitoring.",examDomain:"Domain 3: Hardware",
      studyGuide:{docId:"DOC-TM-0600",subtitle:"Power infrastructure, UPS systems, environmental monitoring, and facility safety.",sections:[
        {id:"overview",title:"Power infrastructure",rt:"2 min",content:`<p>The data center's power chain: <strong>Utility feed → ATS (Automatic Transfer Switch) → UPS → PDU → Server PSU</strong>. Every link must work or servers go dark.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t"><strong>UPS</strong> (Uninterruptible Power Supply) provides battery backup during outages. <strong>Online/Double-conversion</strong> UPS continuously filters power through batteries — zero transfer time. <strong>Line-interactive</strong> UPS regulates voltage but has ~5ms transfer time. <strong>Standby</strong> UPS only activates on failure — 10-25ms transfer.</div></div>`},
        {id:"ups",title:"UPS systems",rt:"3 min",content:`<p>Data centers use <strong>online/double-conversion UPS</strong> for zero-downtime protection. Battery runtime depends on load — typical: 8-15 minutes, enough to ride through brief outages or for generators to start.</p><div class="fn"><div class="fn-l">Technician tip</div><div class="fn-t">UPS batteries have a 3-5 year lifespan. When the UPS starts alarming about battery health, <strong>don't ignore it</strong>. A UPS with dead batteries is just an expensive power strip.</div></div>`,quiz:{q:"Which UPS type provides zero transfer time to battery?",opts:[{l:"A",t:"Standby UPS",c:false},{l:"B",t:"Line-interactive UPS",c:false},{l:"C",t:"Online/double-conversion UPS",c:true},{l:"D",t:"Passive standby UPS",c:false}],right:"Online/double-conversion continuously runs power through the inverter and batteries. There's no 'transfer' because the battery is always in the circuit.",wrong:"Online/double-conversion UPS always runs through the battery circuit — zero transfer time because it's already on battery."}},
        {id:"environmental",title:"HVAC & fire suppression",rt:"3 min",content:`<p>Temperature: <strong>64-75°F (18-24°C)</strong>. Humidity: <strong>40-60%</strong>. Fire suppression: <strong>clean agent</strong> (FM-200, Novec 1230) — displaces oxygen without damaging equipment. Water-based sprinklers are a last resort.</p>`},
        {id:"monitoring",title:"Environmental monitoring",rt:"2 min",content:`<p>Sensors track temperature, humidity, water leaks, and smoke. <strong>SNMP traps</strong> send alerts to the NOC. <strong>Environmental monitoring units</strong> (EMUs) connect to multiple sensors per rack row.</p><div class="fn"><div class="fn-l">Field note</div><div class="fn-t">A water leak sensor under the raised floor once saved an entire DC from a burst pipe. Cost: $50 sensor. Saved: millions in equipment.</div></div>`}
      ]},

        responses:{ups:{sn:"system",msg:"UPS panel shows: <strong>ALARM: Battery Module 3 Fault</strong>. Load: 72%. Input: 208V AC (normal). Runtime: <strong>8 minutes</strong> (should be 25+). Bypass available.",match:[0]},utility:{sn:"system",msg:"Utility feed reads <strong>208V AC, stable</strong>. No brownout, no fluctuation. The power is fine — it's the battery backup that's degraded.",match:[1]},gen:{sn:"system",msg:"Generator control panel: <strong>Ready</strong> status. Diesel fuel at 92%. You initiate a manual test start — engine fires up in <strong>8 seconds</strong>. Auto-transfer switch confirms ready. Generator is good.",match:[2]},battery:{sn:"system",msg:"UPS has 4 battery modules. Module status: 1-OK, 2-OK, <strong>3-FAULT (internal short)</strong>, 4-OK. Module 3 is hot-swappable. Replacement module available in the utility room supply cage.",match:[3]},swap:{sn:"system",msg:"You pull the release handle on Module 3 and slide it out. Insert the replacement module — it locks with a click. UPS detects new module and begins <strong>charging sequence</strong>. Alarm clears after 30 seconds.",match:[4]},verify:{sn:"success",msg:"UPS panel now shows: <strong>All modules OK</strong>. Runtime: <strong>26 minutes</strong> at current load. All alarms cleared. Floor 2 power is fully protected again. <strong>Ticket TKT-4891 resolved.</strong>",match:[5]},dispatch:{sn:"dispatch",msg:"NOC is watching the UPS status remotely. 8 minutes of runtime is critical. Get that battery module swapped ASAP.",match:[]},unknown:{sn:"dispatch",msg:"Focus on the UPS. Check the status panel and find out which battery module is failing.",match:[]}}

    {num:7,title:"Laptop hardware & mobile devices",location:"Field ops — Site visit",floor:3,floorName:"Field operations",ticket:"TKT-4905",mission:"Executive laptop — no display, meeting in 30 min",priority:"Priority 2 — Urgent",free:false,desc:"Laptop disassembly, battery replacement, mobile device repair, and embedded systems.",examDomain:"Domain 1: Mobile Devices",
      studyGuide:{docId:"DOC-TM-0700",subtitle:"Laptop components, mobile device management, and field repair procedures.",sections:[
        {id:"overview",title:"Laptop vs desktop",rt:"2 min",content:`<p>Laptops use <strong>miniaturized components</strong>: SODIMM RAM, M.2 storage, integrated GPU, battery power management. Many parts are <strong>not user-serviceable</strong> — know what you can and can't replace in the field.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t">Replaceable in most laptops: <strong>RAM (SODIMM), Storage (M.2/2.5"), Battery, Wi-Fi card (M.2), keyboard</strong>. NOT replaceable: CPU (soldered), GPU (soldered on most), display panel (requires full disassembly).</div></div>`},
        {id:"display",title:"Laptop displays",rt:"3 min",content:`<p>Laptop displays connect via <strong>LVDS</strong> (older) or <strong>eDP</strong> (embedded DisplayPort, current). The display cable runs through the hinge. <strong>Backlight failure</strong> = screen appears very dim (use flashlight to see faint image). <strong>Inverter failure</strong> = same symptom on CCFL displays.</p><div class="fn"><div class="fn-l">Technician tip</div><div class="fn-t">External monitor test: if the laptop outputs video to an external display, the GPU is fine — the issue is the panel, cable, or inverter/backlight. If no external video either, suspect GPU or motherboard.</div></div>`,quiz:{q:"Laptop screen is very dim but you can see a faint image with a flashlight. Most likely?",opts:[{l:"A",t:"GPU failure",c:false},{l:"B",t:"Backlight or inverter failure",c:true},{l:"C",t:"Corrupted display driver",c:false},{l:"D",t:"Broken LCD panel",c:false}],right:"Faint image visible = LCD is working, but the backlight isn't illuminating it. On LED-backlit panels, it's the backlight driver. On older CCFL, it's the inverter.",wrong:"If you can see a faint image, the LCD panel and GPU are working. The issue is the backlight."}},
        {id:"mobile",title:"Mobile devices",rt:"3 min",content:`<p>Mobile device management: <strong>MDM</strong> (Mobile Device Management) for enterprise. Know the difference between <strong>BYOD, COPE, CYOD</strong> policies. Mobile hardware: <strong>SoC</strong> (System on Chip), soldered RAM, flash storage, cellular radios.</p>`},
        {id:"embedded",title:"Embedded systems & virtualization",rt:"2 min",content:`<p><strong>Embedded systems</strong> are single-purpose computers: <strong>SoC</strong> (System on Chip), <strong>RTOS</strong> (Real-Time OS), <strong>GPIO pins</strong>. Examples: Raspberry Pi, Arduino, industrial controllers, smart home devices.</p><div class="kc"><div class="kc-l">Key concept — Virtualization</div><div class="kc-t"><strong>Containers</strong> = lightweight virtualization that shares the host OS kernel (Docker, Podman). Faster to start than full VMs, used for microservices. <strong>VDI</strong> (Virtual Desktop Infrastructure) = desktops run as VMs on a server, users connect remotely via thin clients. <strong>Type 1 hypervisor</strong> (bare-metal: ESXi, Hyper-V Server) vs <strong>Type 2</strong> (hosted: VirtualBox, VMware Workstation).</div></div>`}
      ]},

    {num:8,title:"Final assessment — Full facility walkdown",location:"All floors — Full access",floor:3,ticket:"TKT-FINAL",mission:"Facility-wide audit: 5 critical tickets, 1 shift",priority:"Priority 1 — Critical",free:false,desc:"Multi-stage simulation combining all hardware domains. Prove you're A+ Core 1 ready.",examDomain:"All Domains",
      studyGuide:{docId:"DOC-TM-0800",subtitle:"Review all hardware domains before the final assessment.",sections:[
        {id:"review",title:"Final review",rt:"5 min",content:`<p>This is it — the final assessment. You'll face <strong>5 tickets across all domains</strong> in a single shift. Each ticket tests a different area: motherboards, storage, networking, peripherals, power, and mobile. Review your weak areas before deploying.</p><div class="kc"><div class="kc-l">Key concept</div><div class="kc-t">The CompTIA A+ Core 1 exam covers: <strong>Mobile Devices (15%)</strong>, <strong>Networking (20%)</strong>, <strong>Hardware (25%)</strong>, <strong>Virtualization & Cloud (11%)</strong>, and <strong>Troubleshooting (29%)</strong>. Hardware and Troubleshooting together make up over half the exam.</div></div><div class="fn"><div class="fn-l">Exam strategy</div><div class="fn-t">Performance-based questions (PBQs) appear first on the real exam. Don't panic — flag them and come back. Multiple-choice questions build confidence. Time management: ~90 minutes for ~90 questions.</div></div>`},
        {id:"domains",title:"Domain breakdown",rt:"3 min",content:`<p>Quick review of each domain focus area and what the exam emphasizes most heavily.</p><div class="kc"><div class="kc-l">Domain weights</div><div class="kc-t"><strong>1.0 Mobile Devices (15%)</strong> — laptop hardware, mobile OS, connectivity. <strong>2.0 Networking (20%)</strong> — TCP/IP, wireless, cabling. <strong>3.0 Hardware (25%)</strong> — motherboards, RAM, storage, peripherals, printers. <strong>4.0 Virtualization & Cloud (11%)</strong> — hypervisors, cloud models. <strong>5.0 Troubleshooting (29%)</strong> — methodology, hardware/network/mobile troubleshooting.</div></div>`}
      ]},
